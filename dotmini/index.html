<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Telegram Mini GPS App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: Arial;
      display: flex;
      flex-direction: column;
      background: #f5f5f5;
    }

    #map {
      height: 65vh;
      width: 100%;
    }

    #controls {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 10px;
    }

    button {
      height: 70px;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      color: white;
    }

    .orange { background: orange; }
    .green { background: green; }
    .red { background: red; }
    .blue { background: blue; }
  </style>
</head>

<body>

<div id="map"></div>

<div id="controls">
  <button class="orange" onclick="sendGPS('orange')">ORANGE</button>
  <button class="green" onclick="sendGPS('green')">GREEN</button>
  <button class="red" onclick="sendGPS('red')">RED</button>
  <button class="blue" onclick="sendGPS('blue')">BLUE</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- Telegram Mini App SDK -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script>
/* =========================
   TELEGRAM MINI APP INIT
========================= */
const tg = window.Telegram.WebApp;
tg.expand();

/* =========================
   BOT CONFIG (TEST ONLY)
========================= */
const BOT_TOKEN = "YOUR_TEST_TOKEN";
const CHAT_ID = "2141064153";

/* =========================
   MAP
========================= */
const map = L.map('map').setView([50.8503, 4.3517], 13);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 19
}).addTo(map);

/* =========================
   STATE
========================= */
let cachedPosition = null;
let mapCentered = false;

/* =========================
   DOT
========================= */
function createDot(lat, lng, color) {
  L.circleMarker([lat, lng], {
    radius: 7,
    color,
    fillColor: color,
    fillOpacity: 1
  }).addTo(map);
}

/* =========================
   TELEGRAM MESSAGE
========================= */
function sendToTelegram(lat, lng, color) {
  const user = tg.initDataUnsafe?.user;

  const text =
`📍 NEW MINI APP MARKER
🎨 Color: ${color}
👤 User: ${user?.first_name || "unknown"}
📍 ${lat}, ${lng}
🗺️ https://maps.google.com/?q=${lat},${lng}`;

  fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      chat_id: CHAT_ID,
      text: text
    })
  });
}

/* =========================
   GPS (ONE TIME ONLY)
========================= */
function getLocationOnce(cb) {
  if (cachedPosition) return cb(cachedPosition);

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      cachedPosition = {
        lat: pos.coords.latitude,
        lng: pos.coords.longitude
      };
      cb(cachedPosition);
    },
    () => alert("Enable location to use app"),
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

/* =========================
   MAIN ACTION
========================= */
function sendGPS(color) {
  getLocationOnce((pos) => {
    const lat = pos.lat;
    const lng = pos.lng;

    createDot(lat, lng, color);

    if (!mapCentered) {
      map.setView([lat, lng], 16);
      mapCentered = true;
    }

    sendToTelegram(lat, lng, color);
  });
}
</script>

</body>
</html>
