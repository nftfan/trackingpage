<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeuvenFlyers Training App</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f12;
  color: #fff;
  display: flex;
  justify-content: center;
  padding: 20px;
}

.app {
  width: 100%;
  max-width: 420px;
  background: #15151a;
  border-radius: 20px;
  padding: 18px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

h1 {
  font-size: 14px;
  text-align: center;
  margin-bottom: 10px;
  color: #aaa;
  letter-spacing: 1px;
}

.progress-bar {
  width: 100%;
  height: 8px;
  background: #2a2a33;
  border-radius: 20px;
  overflow: hidden;
  margin-bottom: 15px;
}

.progress {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #4da3ff, #4dff88);
  transition: 0.3s;
}

.card {
  background: #1b1b22;
  padding: 18px;
  border-radius: 16px;
  min-height: 220px;
  text-align: center;
  line-height: 1.6;
  font-size: 14px;
}

.buttons {
  display: flex;
  margin-top: 15px;
}

button {
  flex: 1;
  margin: 5px;
  padding: 12px;
  border: none;
  border-radius: 12px;
  font-size: 14px;
  cursor: pointer;
}

.back {
  background: #333;
  color: #fff;
}

.next {
  background: #4da3ff;
  color: #000;
  font-weight: bold;
}

button:disabled {
  opacity: 0.3;
}

a { color: #4da3ff; }
</style>
</head>

<body>

<div class="app">

<h1>LEUVEN FLYERS TRAINING</h1>

<div class="progress-bar">
  <div class="progress" id="progress"></div>
</div>

<div class="card" id="content"></div>

<div class="buttons">
  <button class="back" onclick="prevStep()">Back</button>
  <button class="next" onclick="nextStep()">Next</button>
</div>

</div>

<script>

const steps = [

/* ===================== */
/* SETUP */
/* ===================== */

`<b>Step 1</b><br><br>
Open this link:<br>
<a href="https://www.leuvenflyers.com/ms400/" target="_blank">
https://www.leuvenflyers.com/ms400/
</a>`,

`<b>Step 2</b><br><br>
Ask for FF ID in the staff chat`,

`<b>Step 3</b><br><br>
Enter your FF ID`,

`<b>Step 4</b><br><br>
Ask SEG NUMBER in staff chat`,

`<b>Step 5</b><br><br>
Enter SEG number and click focus`,

`<b>Step 6</b><br><br>
Go to start point (red box)`,

`<b>Step 7</b><br><br>
Say in chat: "I am at start point of my seg"`,

`<b>Step 8</b><br><br>
Click start button and enter your name`,

`<b>Step 9</b><br><br>
Wait for permission: "start your training"`,

/* ===================== */
/* RULES */
/* ===================== */

`<b>RULE 1</b><br><br>
You should follow the purple line`,

`<b>RULE 2</b><br><br>
You should only distribute flyers in the buildings above which purple line is going, do not go to the other / opposite side of road.`,

`<b>GREEN BUTTON</b><br><br>
You will click Green button when you see a mailbox.`,

`<b>ORANGE BUTTON</b><br><br>
You will then put flyer in mailbox and click Orange button to confirm delivery. (Because this is a training session therefore pretend that you have flyers in hand)`,

`<b>MULTIPLE MAILBOXES</b><br><br>
If there are many mailboxes in one building:<br>
Click Green button multiple times → put flyers → click Orange button each time.`,

`<b>STRICT RULE</b><br><br>
Every Green button click = 1 flyer → must click Orange button after.<br>
Green button clicks must be equal to Orange button clicks.`,

`<b>RED STICKER RULE</b><br><br>
If mailbox has red sticker:<br>
Click Red button → do NOT put flyer → do NOT click Orange button.`,

`<b>TASK</b><br><br>
Find all mailboxes in your way.<br>
You may enter buildings if doors are open.`,

`<b>END</b><br><br>
When you reach end of seg inform in chat.`,

/* ===================== */
/* EARNINGS */
/* ===================== */

`<b>SHIFT DURATION</b><br><br>
One shift duration is 3h.`,

`<b>EARNINGS</b><br><br>
You will earn 36 euros net income after completing 3h shift.<br><br>
You have to find 1000 mailboxes in 3H.<br><br>
If you distribute fast and find more than 1000 mailboxes in your shift you will earn more accordingly.`,

`<b>AMPLO ACCOUNT</b><br><br>
You must have activated Amplo account to get paid.<br><br>
Create account here:<br>
<a href="https://www.helloamplo.be/" target="_blank">
https://www.helloamplo.be/
</a>`,

`<b>PAYMENT INFO</b><br><br>
We will put you in a campaign with a FF id, there will be also other people working with you.<br><br>
Once all flyers in campaign are distributed you will receive money on Thursday in the bank account you entered during Amplo registration.<br><br>
The campaigns targets could be delivering 5000, 10,000, 20000 flyers.<br><br>
On average money arrives in two weeks after campaign ends.`,

`<b>IMPORTANT NOTE</b><br><br>
Dont ask any questions to Amplo about LeuvenFlyers.<br>
Amplo is a different company which only handles payments.<br><br>
Ask all your questions regarding Amplo, contracts, payments, jobs or any other question to us in chat.`,

/* ===================== */
/* FINAL INFO ADDED */
/* ===================== */

`<b>CAMPAIGNS & SCHEDULE</b><br><br>
We have campaigns throughout the year all over Belgium.<br><br>
You can do shifts according to your own schedule.<br><br>
Always keep an eye on our web app for new job opportunities:<br>
<a href="https://www.leuvenflyers.com/staff" target="_blank">
https://www.leuvenflyers.com/staff
</a><br><br>
Good luck & happy flyering 🚀`
];

let current = 0;

function update() {
  document.getElementById("content").innerHTML = steps[current];

  let progress = (current / (steps.length - 1)) * 100;
  document.getElementById("progress").style.width = progress + "%";

  document.querySelector(".back").disabled = current === 0;
  document.querySelector(".next").disabled = current === steps.length - 1;
}

function nextStep() {
  if (current < steps.length - 1) current++;
  update();
}

function prevStep() {
  if (current > 0) current--;
  update();
}

update();

</script>

</body>
</html>
