<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>Staff Chat Mobile</title>

<style>
:root {
  --bg:#0b0b0e;
  --panel:#141419;
  --text:#f2f2f7;
  --muted:#8b8b95;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:var(--bg);
  color:var(--text);
  font-family:Inter, sans-serif;
  height:100vh;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

/* HEADER */
header{
  padding:10px;
  font-size:11px;
  text-align:center;
  background:var(--panel);
}

/* SEARCH */
.search-bar{
  padding:8px;
  background:var(--panel);
}

.search-input{
  width:100%;
  padding:8px;
  font-size:10px;
  border-radius:6px;
  border:1px solid #333;
  background:#1a1a22;
  color:white;
}

/* CHAT */
.chat-container{
  flex:1;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

.chat-messages{
  flex:1;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
  padding:8px;
}

/* BUBBLES */
.bubble{
  max-width:85%;
  padding:8px;
  border-radius:10px;
  font-size:10px;
  line-height:1.3;
}

.bubble-staff{
  align-self:flex-end;
  background:linear-gradient(135deg,#4f8cff,#7a5cff);
  color:white;
}

.bubble-manager{background:#2a1f3d;align-self:flex-start;}
.bubble-alert{background:#3d1f1f;}
.bubble-warning{background:#3d331f;}
.bubble-training{background:#3d2a1f;}
.bubble-pickup{background:#1f3d2f;}
.bubble-payments{background:#1f2f3d;}

.sender{
  font-size:8px;
  opacity:.8;
  margin-bottom:2px;
}

.date-time{
  font-size:7px;
  opacity:.6;
  margin-top:4px;
  text-align:right;
}

.empty{
  text-align:center;
  color:var(--muted);
  font-size:10px;
  margin-top:30px;
}
</style>
</head>

<body>

<header>Staff Chat (Mobile)</header>

<div class="search-bar">
  <input id="searchInput" class="search-input" placeholder="Search..."/>
</div>

<div class="chat-container">
  <div class="chat-messages" id="chatMessages"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, query, orderByChild, limitToLast, endBefore, onValue } 
from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBWPCkYNw...",
  authDomain: "expandlf.firebaseapp.com",
  databaseURL: "https://expandlf-default-rtdb.firebaseio.com",
  projectId: "expandlf",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const container = document.getElementById("chatMessages");

let messages = [];
let oldestTimestamp = null;
let loading = false;
let search = "";

/* LOAD INITIAL (LATEST 30) */
function loadInitial(){
  const q = query(ref(db,"appStaffMessages"), orderByChild("timestamp"), limitToLast(30));

  onValue(q,(snap)=>{
    if(!snap.exists()) return;

    messages = Object.values(snap.val()).sort((a,b)=>a.timestamp-b.timestamp);
    oldestTimestamp = messages[0]?.timestamp || null;

    render();
    container.scrollTop = container.scrollHeight;
  });
}

/* LOAD OLDER */
function loadOlder(){
  if(loading || !oldestTimestamp) return;
  loading = true;

  const q = query(
    ref(db,"appStaffMessages"),
    orderByChild("timestamp"),
    endBefore(oldestTimestamp),
    limitToLast(20)
  );

  onValue(q,(snap)=>{
    loading = false;
    if(!snap.exists()) return;

    const older = Object.values(snap.val()).sort((a,b)=>a.timestamp-b.timestamp);

    if(older.length > 0){
      oldestTimestamp = older[0].timestamp;
      messages = [...older, ...messages];

      const prevHeight = container.scrollHeight;
      render();
      container.scrollTop = container.scrollHeight - prevHeight;
    }
  },{onlyOnce:true});
}

/* RENDER */
function render(){
  container.innerHTML = "";

  let filtered = messages;

  if(search){
    filtered = messages.filter(m =>
      (m.text||"").toLowerCase().includes(search) ||
      (m.sender||"").toLowerCase().includes(search)
    );
  }

  if(filtered.length === 0){
    container.innerHTML = `<div class="empty">No messages</div>`;
    return;
  }

  const roles = ["manager","alert","warning","training","pickup","payments"];

  filtered.forEach(m=>{
    const div = document.createElement("div");

    const isSystem = roles.includes(m.sender);
    let cls = "bubble " + (isSystem ? `bubble-${m.sender}` : "bubble-staff");

    div.className = cls;

    const d = new Date(m.timestamp);
    const time = `${d.getHours()}:${String(d.getMinutes()).padStart(2,"0")}`;

    div.innerHTML = `
      <div class="sender">${m.sender}</div>
      <div>${m.text}</div>
      <div class="date-time">${time}</div>
    `;

    container.appendChild(div);
  });
}

/* SCROLL EVENT (LOAD OLDER ON TOP) */
container.addEventListener("scroll", ()=>{
  if(container.scrollTop < 50){
    loadOlder();
  }
});

/* SEARCH */
document.getElementById("searchInput").addEventListener("input",(e)=>{
  search = e.target.value.toLowerCase();
  render();
});

loadInitial();
</script>

</body>
</html>
