<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RotiPani.Net</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Fraunces:opsz,wght@9..144,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root {
            --green:       #115740;
            --green-soft:  #4f8a6d;
            --green-dark:  #0c3e2e;
            --green-light: #e4f0ea;
            --white:       #ffffff;
            --text:        #111827;
            --text-muted:  #6b7280;
            --amber-bg:    #fffbeb;
            --shadow-lg:   0 12px 40px rgba(0,0,0,0.14), 0 3px 10px rgba(0,0,0,0.07);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; width: 100%; font-family: 'DM Sans', sans-serif; overflow: hidden; background: #e8e8e8; }
        #map { height: 100%; width: 100%; z-index: 1; }

        /* Marker Labels - Right Side */
        .rp-title-tooltip {
            background: var(--green-soft) !important;
            border: none !important;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15) !important;
            border-radius: 6px !important;
            padding: 4px 10px !important;
            font-size: 11px !important;
            font-weight: 600 !important;
            color: var(--white) !important;
            transition: opacity 0.2s ease;
        }
        .leaflet-tooltip-right:before { border-right-color: transparent !important; }

        /* Popup Container */
        .leaflet-popup-content-wrapper {
            background: var(--white);
            border-radius: 14px; padding: 0;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(0,0,0,0.06);
            overflow: hidden;
        }

        /* Pop Animation */
        @keyframes popup-pop {
            0% { transform: scale(0.4); opacity: 0; }
            70% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .custom-popup-animate .leaflet-popup-content-wrapper {
            animation: popup-pop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            transform-origin: bottom center;
        }

        .leaflet-popup-content { margin: 0 !important; width: 245px !important; }
        .leaflet-popup-close-button { display: none !important; }

        /* Card Content */
        .pc-img { width: 100%; height: 90px; object-fit: cover; display: block; background: #eee; }
        .pc-body { padding: 12px; }
        .pc-name { font-family: 'Fraunces', serif; font-size: 16px; font-weight: 700; color: var(--text); line-height: 1.2; margin-bottom: 6px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .pc-info-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 12px; }
        .pc-time { display: flex; align-items: center; gap: 4px; font-size: 10.5px; color: var(--text-muted); font-weight: 500; }
        .pc-get-btn { flex-shrink: 0; padding: 5px 12px; background: var(--green); color: #fff !important; border-radius: 7px; font-size: 10px; font-weight: 700; text-decoration: none; }
        
        .pc-chips { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .pc-chip { padding: 8px; border-radius: 10px; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
        
        .pc-chip-food { background: var(--green-light); border: 1px solid rgba(17, 87, 64, 0.05); }
        .pc-food-name { font-size: 12px; font-weight: 700; color: var(--green-dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .pc-food-desc { font-size: 9px; color: var(--green); opacity: 0.7; line-height: 1.1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .pc-chip-price { background: var(--amber-bg); border: 1px solid #fde68a; position: relative; }
        .pc-price-badge { font-size: 8px; background: #ef4444; color: #fff; padding: 1px 4px; border-radius: 4px; font-weight: 700; width: fit-content; margin-bottom: 2px; }
        .pc-price-offer { font-size: 14px; font-weight: 800; color: #92400e; line-height: 1; }
        .pc-price-persons { font-size: 8px; color: #b45309; margin-top: 1px; }

        .rp-marker { background: transparent; border: none; }

        #explore-btn {
            position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: var(--green); color: #fff;
            border: none; padding: 0 24px; height: 48px; border-radius: 24px;
            font-family: 'DM Sans', sans-serif; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div id="map"></div>
<button id="explore-btn"><span class="material-icons-round">local_offer</span>Explore Offers</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map', { zoomControl: false, attributionControl: false })
    .setView([31.5204, 74.3587], 15); // Focused more on the data cluster

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);

let markers = [];
let lastIdx = -1;

function makeIcon(active) {
    const fill = active ? '#0c3e2e' : '#115740';
    return L.divIcon({ 
        className: 'rp-marker', 
        html: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 38" style="width:28px;height:38px;"><path d="M14 0C6.268 0 0 6.268 0 14c0 10.456 12.67 22.512 13.503 23.324a0.7 0.7 0 0 0 .994 0C15.33 36.512 28 24.456 28 14 28 6.268 21.732 0 14 0z" fill="${fill}"/><circle cx="14" cy="14" r="6" fill="white"/></svg>`, 
        iconSize: [28, 38], iconAnchor: [14, 38], popupAnchor: [0, -40] 
    });
}

function buildPopup(p) {
    const disc = Math.round((1 - p.offerCost / p.originalCost) * 100);
    return `
        <img src="${p.banner}" class="pc-img">
        <div class="pc-body">
            <span class="pc-name">${p.title}</span>
            <div class="pc-info-row">
                <div class="pc-time"><span class="material-icons-round" style="font-size:14px">schedule</span>${p.time}</div>
                <a href="${p.url}" target="_blank" class="pc-get-btn">Get Offer</a>
            </div>
            <div class="pc-chips">
                <div class="pc-chip pc-chip-food">
                    <span class="pc-food-name">${p.food}</span>
                    <span class="pc-food-desc">${p.desc || 'Fresh Deal'}</span>
                </div>
                <div class="pc-chip pc-chip-price">
                    <div class="pc-price-badge">${disc}% OFF</div>
                    <span class="pc-price-offer">Rs ${p.offerCost}</span>
                    <span class="pc-price-persons">for ${p.persons} ${p.persons > 1 ? 'ppl' : 'person'}</span>
                </div>
            </div>
        </div>`;
}

async function initMap() {
    try {
        const response = await fetch('https://raw.githubusercontent.com/leuvenfd/rotipani/main/data/restaurants.json');
        const data = await response.json();

        data.forEach((p) => {
            const m = L.marker([p.lat, p.lng], { icon: makeIcon(false) }).addTo(map);
            
            m.bindTooltip(p.title, { 
                permanent: true, 
                direction: 'right', 
                offset: [15, -19],
                className: 'rp-title-tooltip' 
            });

            m.bindPopup(buildPopup(p), { 
                closeButton: false, 
                className: 'custom-popup-animate',
                minWidth: 245
            });
            
            m.on('click', () => m.setIcon(makeIcon(true)));
            m.on('popupclose', () => m.setIcon(makeIcon(false)));
            markers.push(m);
        });
        
        toggleLabels();
    } catch (error) {
        console.error('Error:', error);
    }
}

document.getElementById('explore-btn').addEventListener('click', () => {
    if (markers.length === 0) return;
    let idx;
    do { idx = Math.floor(Math.random() * markers.length); } while (idx === lastIdx && markers.length > 1);
    lastIdx = idx;

    const target = markers[idx];
    map.setView(target.getLatLng(), 17, { animate: false });
    setTimeout(() => { target.openPopup(); }, 50);
});

function toggleLabels() {
    const zoom = map.getZoom();
    markers.forEach(m => m.getTooltip().setOpacity(zoom < 14 ? 0 : 1));
}

map.on('zoomend', toggleLabels);
initMap();
</script>
</body>
</html>
