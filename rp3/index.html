<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RotiPani.Net</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

<style>
:root {
--green:#115740;--green-dark:#0c3e2e;--green-light:#e4f0ea;
--white:#fff;--text:#111827;--text-muted:#6b7280;
--amber-bg:#fffbeb;
--shadow:0 4px 24px rgba(0,0,0,0.1);
--shadow-lg:0 12px 40px rgba(0,0,0,0.14);
}

body,html{margin:0;height:100%;font-family:'DM Sans';overflow:hidden;background:#e8e8e8}
#map{height:100%}

.rp-title-tooltip{
background:#fff!important;border:none!important;
border-radius:20px!important;padding:4px 12px!important;
font-size:11px!important;font-weight:700!important;color:var(--green)!important;
}

.leaflet-popup-content-wrapper{
border-radius:14px;overflow:hidden;
box-shadow:var(--shadow-lg)
}
.leaflet-popup-content{margin:0!important;width:235px!important}
.leaflet-popup-close-button{display:none!important}

.pc-img{width:100%;height:86px;object-fit:cover}
.pc-body{padding:12px}

.pc-name{font-family:'Fraunces';font-size:15px;font-weight:700;margin-bottom:6px}

.pc-info-row{display:flex;justify-content:space-between;margin-bottom:10px}
.pc-time{font-size:10px;color:#6b7280}
.pc-get-btn{
background:var(--green);color:#fff;padding:4px 10px;
border-radius:7px;font-size:10px;text-decoration:none;font-weight:700
}

.pc-chips{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pc-chip{padding:8px;border-radius:10px}
.pc-chip-food{background:var(--green-light)}
.pc-chip-price{background:var(--amber-bg)}

#explore-btn{
position:absolute;bottom:28px;left:50%;
transform:translateX(-50%);
background:var(--green);color:#fff;border:none;
padding:12px 24px;border-radius:24px;
cursor:pointer;font-weight:600
}
</style>
</head>

<body>

<div id="map"></div>
<button id="explore-btn">Explore Food</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// INIT MAP
const map = L.map('map',{zoomControl:false,attributionControl:false})
.setView([31.5204,74.3587],12);

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
maxZoom:19
}).addTo(map);

const markers = [];

// ICON
function makeIcon(active){
const fill = active ? '#0c3e2e' : '#115740';
return L.divIcon({
className:'rp-marker',
html:`<svg viewBox="0 0 28 38" width="28">
<path d="M14 0C6 0 0 6 0 14c0 10 14 24 14 24s14-14 14-24C28 6 22 0 14 0z" fill="${fill}"/>
<circle cx="14" cy="14" r="6" fill="white"/>
</svg>`,
iconSize:[28,38],
iconAnchor:[14,38]
});
}

// POPUP
function buildPopup(p){
const disc = Math.round((1 - p.offerCost/p.originalCost)*100);
return `
<img src="${p.banner}" class="pc-img">
<div class="pc-body">

<div class="pc-name">${p.title}</div>

<div class="pc-info-row">
<span class="pc-time">${p.time}</span>
${p.url ? `<a href="${p.url}" class="pc-get-btn">Get</a>`:''}
</div>

<div class="pc-chips">

<div class="pc-chip pc-chip-food">
<b>${p.food}</b><br>${p.desc}
</div>

<div class="pc-chip pc-chip-price">
<small style="text-decoration:line-through">Rs ${p.originalCost}</small><br>
<b>Rs ${p.offerCost}</b><br>
${disc}% OFF
</div>

</div>
</div>`;
}

// LOAD FROM GITHUB
fetch('https://raw.githubusercontent.com/leuvenfd/rotipani/main/data/restaurants.json')
.then(res=>{
if(!res.ok) throw new Error("Failed JSON");
return res.json();
})
.then(restaurants=>{

restaurants.forEach(p=>{
const m = L.marker([p.lat,p.lng],{icon:makeIcon(false)}).addTo(map);

m.bindTooltip(p.title,{
permanent:true,
direction:'top',
className:'rp-title-tooltip'
});

m.bindPopup(buildPopup(p),{closeButton:false});

m.on('click',()=>m.setIcon(makeIcon(true)));
m.on('popupclose',()=>m.setIcon(makeIcon(false)));

markers.push(m);
});

toggleLabels();

})
.catch(err=>console.error(err));

// ZOOM TOOLTIP CONTROL
function toggleLabels(){
const zoom = map.getZoom();
markers.forEach(m=>{
if(zoom<14) m.getTooltip().setOpacity(0);
else m.getTooltip().setOpacity(1);
});
}
map.on('zoomend',toggleLabels);

// EXPLORE BUTTON
document.getElementById('explore-btn').onclick=()=>{
if(markers.length===0) return;

const i = Math.floor(Math.random()*markers.length);
map.flyTo(markers[i].getLatLng(),16,{duration:1.5});
map.once('moveend',()=>markers[i].openPopup());
};
</script>

</body>
</html>
