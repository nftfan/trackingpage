<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RotiPani.Net</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* Pakistani Flag Theme Colors */
        :root {
            --pak-green: #115740;
            --pak-green-hover: #0c3e2e;
            --pak-white: #ffffff;
            --text-main: #1d1d1f;
            --text-muted: #6e6e73;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            background-color: var(--pak-white);
        }

        /* Map Container */
        #map {
            height: 100%;
            width: 100%;
            z-index: 1;
        }

        /* Floating Random Button */
        #random-btn {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background-color: var(--pak-green);
            color: var(--pak-white);
            border: none;
            padding: 16px 32px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            box-shadow: 0 8px 24px rgba(17, 87, 64, 0.35);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            backdrop-filter: blur(4px);
        }

        #random-btn:hover, #random-btn:active {
            background-color: var(--pak-green-hover);
            transform: translateX(-50%) translateY(-4px);
            box-shadow: 0 12px 28px rgba(17, 87, 64, 0.45);
        }

        /* Beautiful Popup Styling */
        .leaflet-popup-content-wrapper {
            background: transparent;
            border-radius: 16px;
            padding: 0; 
            box-shadow: none;
            overflow: hidden;
        }
        
        .leaflet-popup-tip-container {
            display: none; /* Hide the default tip */
        }

        .leaflet-popup-content {
            margin: 0 !important;
            width: 250px !important; 
            text-align: left;
        }

        /* Modern Card Content Styling */
        .popup-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.18);
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.04);
            transform: translateY(-8px);
        }

        .popup-banner {
            width: 100%;
            height: 110px;
            display: block;
            position: relative;
        }

        .popup-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .banner-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(to top, rgba(0,0,0,0.4), transparent);
        }

        .popup-body {
            padding: 14px 18px 18px;
        }

        .restaurant-link {
            color: var(--text-main);
            text-decoration: none;
            font-size: 17px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            transition: color 0.2s ease;
            line-height: 1.2;
        }

        .restaurant-link:hover {
            color: var(--pak-green);
        }

        .restaurant-link .arrow-icon {
            color: var(--pak-green);
            background: rgba(17, 87, 64, 0.1);
            border-radius: 50%;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .restaurant-link:hover .arrow-icon {
            background: var(--pak-green);
            color: var(--pak-white);
            transform: translateX(2px) translateY(-2px);
        }

        .popup-details {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .detail-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .detail-row svg {
            color: var(--pak-green);
            opacity: 0.8;
            flex-shrink: 0;
        }
        
        /* Sleek SVG Pin */
        .transparent-marker {
            background: transparent;
            border: none;
        }

        .sleek-pin {
            filter: drop-shadow(0px 6px 8px rgba(0,0,0,0.35));
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .sleek-pin:hover {
            transform: scale(1.15) translateY(-4px);
        }

        /* ========================================================
           MOBILE RESPONSIVENESS (Max 11px fonts on mobile)
           ======================================================== */
        @media (max-width: 768px) {
            .leaflet-popup-content {
                width: 220px !important; /* Make card slightly smaller */
            }
            .restaurant-link {
                font-size: 11px !important;
                margin-bottom: 8px;
            }
            .detail-row {
                font-size: 10px !important; /* Kept slightly under 11px for hierarchy */
            }
            .detail-row svg {
                width: 14px;
                height: 14px;
            }
            #random-btn {
                font-size: 11px !important;
                padding: 12px 24px;
                bottom: 30px;
            }
            .restaurant-link .arrow-icon svg {
                width: 12px;
                height: 12px;
            }
        }
    </style>
</head>
