<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RotiPani.Net</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* Pakistani Flag Theme Colors */
        :root {
            --pak-green: #115740;
            --pak-green-hover: #0c3e2e;
            --pak-white: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            background-color: var(--pak-white);
        }

        /* Map Container */
        #map {
            height: 100%;
            width: 100%;
            z-index: 1;
        }

        /* Floating Random Button */
        #random-btn {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background-color: var(--pak-green);
            color: var(--pak-white);
            border: none;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 6px 15px rgba(0,0,0,0.25);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        #random-btn:hover, #random-btn:active {
            background-color: var(--pak-green-hover);
            transform: translateX(-50%) translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        /* Beautiful Popup Styling */
        .leaflet-popup-content-wrapper {
            background: #ffffff;
            border-radius: 12px;
            padding: 0; /* Removed padding to let image touch edges nicely */
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 1px solid rgba(0,0,0,0.05);
            overflow: hidden;
        }
        
        .leaflet-popup-tip {
            background: #ffffff;
            box-shadow: none;
        }

        .leaflet-popup-content {
            margin: 0 !important; /* Reset leaflet margin */
            width: 220px !important; /* Fixed width for card consistency */
            text-align: center;
        }

        /* Card Content Styling */
        .popup-banner {
            width: 100%;
            height: 100px;
            object-fit: cover;
            display: block;
        }

        .popup-body {
            padding: 12px 16px 16px;
        }

        .restaurant-link {
            color: var(--pak-green);
            text-decoration: none;
            font-size: 17px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 8px;
            transition: color 0.2s ease, transform 0.2s ease;
        }

        .restaurant-link:hover {
            color: var(--pak-green-hover);
            transform: translateY(-1px);
        }

        .popup-details {
            font-size: 13px;
            color: #444;
            line-height: 1.5;
            text-align: left;
            background: #f8f9fa;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #eee;
        }

        .popup-details span {
            display: block;
        }

        .popup-details strong {
            color: #222;
        }
        
        /* Sleek SVG Pin Shadow */
        .transparent-marker {
            background: transparent;
            border: none;
        }

        .sleek-pin {
            filter: drop-shadow(0px 6px 6px rgba(0,0,0,0.3));
            transition: transform 0.2s ease;
        }
        
        .sleek-pin:hover {
            transform: scale(1.1) translateY(-2px);
        }

    </style>
</head>
<body>

    <!-- Full Screen Map -->
    <div id="map"></div>
    
    <!-- Floating Random Button -->
    <button id="random-btn">
        <span style="font-size: 18px;">🎲</span> Random Bite
    </button>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize map
        const map = L.map('map', {
            zoomControl: false,
            attributionControl: false 
        }).setView([31.51673, 74.36465], 15);

        // Move zoom control
        L.control.zoom({ position: 'topright' }).addTo(map);

        // Sleek Map Tiles
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            maxZoom: 19
        }).addTo(map);

        // Beautiful SVG Map Pin Icon
        const svgPin = `
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512" class="sleek-pin" style="width: 36px; height: 36px;">
                <path fill="#115740" d="M172.268 501.67C26.97 291.031 0 269.413 0 192 0 85.961 85.961 0 192 0s192 85.961 192 192c0 77.413-26.97 99.031-172.268 309.67-9.535 13.774-29.93 13.773-39.464 0z"/>
                <circle cx="192" cy="192" r="70" fill="#ffffff"/>
            </svg>
        `;

        const elegantIcon = L.divIcon({
            className: 'transparent-marker',
            html: svgPin,
            iconSize: [36, 36],
            iconAnchor: [18, 36],
            popupAnchor: [0, -38] 
        });

        // Default Banner Image provided
        const defaultBanner = "https://i.postimg.cc/v8h717y3/image.png";

        // Restaurant Data Array with Time and Cost added
        const restaurants = [
            {
                title: "Lahori Bites",
                lat: 31.51673,
                lng: 74.36465,
                url: "https://www.leuvenflyers.com/rpt/",
                banner: defaultBanner,
                time: "11:00 AM - 1:00 AM",
                cost: "Rs 1,500",
                openByDefault: true
            },
            {
                title: "Gaddafi Stadium Eatery",
                lat: 31.52050, 
                lng: 74.36010,
                url: "#",
                banner: defaultBanner,
                time: "1:00 PM - 3:00 AM",
                cost: "Rs 800",
                openByDefault: false
            },
            {
                title: "Liberty Market Bites",
                lat: 31.51120, 
                lng: 74.37050,
                url: "#",
                banner: defaultBanner,
                time: "10:00 AM - 11:30 PM",
                cost: "Rs 1,200",
                openByDefault: false
            },
            {
                title: "Model Town Chai Dhaba",
                lat: 31.51400, 
                lng: 74.35400,
                url: "#",
                banner: defaultBanner,
                time: "4:00 PM - 4:00 AM",
                cost: "Rs 450",
                openByDefault: false
            }
        ];

        const markerObjects = [];

        // Loop through data and add markers
        restaurants.forEach(place => {
            const marker = L.marker([place.lat, place.lng], {icon: elegantIcon}).addTo(map);
            
            // Link icon logic
            const linkIcon = place.url !== '#' ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>` : '';
            
            // Modern Card Layout for Popup
            const popupContent = `
                <div class="popup-card">
                    <img src="${place.banner}" class="popup-banner" alt="${place.title}">
                    <div class="popup-body">
                        <a href="${place.url}" ${place.url !== '#' ? 'target="_blank"' : ''} class="restaurant-link">
                            ${place.title} ${linkIcon}
                        </a>
                        <div class="popup-details">
                            <span><strong>Opening Time:</strong><br>${place.time}</span>
                            <span style="margin-top: 6px;"><strong>Avg Cost:</strong> ${place.cost}</span>
                        </div>
                    </div>
                </div>
            `;
            
            marker.bindPopup(popupContent, {
                closeButton: false
            });

            markerObjects.push(marker);

            if(place.openByDefault) {
                marker.openPopup();
            }
        });

        // Logic for "Random Bite" Button
        document.getElementById('random-btn').addEventListener('click', () => {
            const randomIndex = Math.floor(Math.random() * markerObjects.length);
            const selectedMarker = markerObjects[randomIndex];
            
            map.flyTo(selectedMarker.getLatLng(), 16, {
                animate: true,
                duration: 1.5
            });

            setTimeout(() => {
                selectedMarker.openPopup();
            }, 1200);
        });
    </script>
</body>
</html>
