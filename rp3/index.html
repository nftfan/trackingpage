<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RotiPani.Net</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Fraunces:opsz,wght@9..144,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root {
            --green:       #115740;
            --green-dark:  #0c3e2e;
            --green-light: #e4f0ea;
            --white:       #ffffff;
            --text:        #111827;
            --text-muted:  #6b7280;
            --border:      #e5e7eb;
            --surface:     #f9fafb;
            --amber-bg:    #fffbeb;
            --shadow:      0 4px 24px rgba(0,0,0,0.10), 0 1px 4px rgba(0,0,0,0.06);
            --shadow-lg:   0 12px 40px rgba(0,0,0,0.14), 0 3px 10px rgba(0,0,0,0.07);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            height: 100%; width: 100%;
            font-family: 'DM Sans', sans-serif;
            overflow: hidden;
            background: #e8e8e8;
            -webkit-font-smoothing: antialiased;
        }
        #map { height: 100%; width: 100%; z-index: 1; }

        .leaflet-control-zoom {
            border: none !important;
            box-shadow: var(--shadow) !important;
            border-radius: 12px !important;
            overflow: hidden;
            margin-top: 16px !important;
            margin-right: 14px !important;
        }
        .leaflet-control-zoom-in,
        .leaflet-control-zoom-out {
            width: 40px !important; height: 40px !important;
            line-height: 40px !important; font-size: 20px !important;
            color: var(--text) !important; background: var(--white) !important;
            border: none !important; font-weight: 300 !important;
            transition: background 0.15s, color 0.15s !important;
        }
        .leaflet-control-zoom-in:hover,
        .leaflet-control-zoom-out:hover { background: var(--surface) !important; color: var(--green) !important; }
        .leaflet-control-zoom-in { border-bottom: 1px solid var(--border) !important; }
        .leaflet-control-attribution { display: none; }

        .leaflet-popup-content-wrapper {
            background: var(--white);
            border-radius: 14px; padding: 0;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(0,0,0,0.06);
            overflow: hidden;
        }
        .leaflet-popup-tip-container { margin-top: -1px; }
        .leaflet-popup-tip { background: var(--white); box-shadow: none; }
        .leaflet-popup-content { margin: 0 !important; width: 230px !important; }
        .leaflet-popup-close-button { display: none !important; }
        .leaflet-popup-content-wrapper {
            animation: popIn 0.2s cubic-bezier(0.34,1.56,0.64,1) both;
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.95) translateY(4px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Popup card */
        .pc-img { width: 100%; height: 86px; object-fit: cover; display: block; }
        .pc-body { padding: 10px 11px 11px; }

        .pc-title-row {
            display: flex; align-items: center;
            justify-content: space-between; gap: 6px;
            margin-bottom: 6px;
        }
        .pc-name {
            font-family: 'Fraunces', serif;
            font-size: 14px; font-weight: 700;
            color: var(--text); line-height: 1.2;
            flex: 1;
        }

        /* Get Offer button */
        .pc-get-btn {
            flex-shrink: 0;
            padding: 4px 10px;
            background: var(--green);
            color: #ffffff !important;
            border: none; border-radius: 7px;
            font-family: 'DM Sans', sans-serif;
            font-size: 11px; font-weight: 700;
            text-decoration: none; cursor: pointer;
            transition: background 0.15s, transform 0.12s;
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
            line-height: 1.6;
            display: inline-block;
        }
        .pc-get-btn:visited { color: #ffffff !important; }
        .pc-get-btn:hover { background: var(--green-dark); transform: translateY(-1px); }
        .pc-get-btn:active { transform: translateY(0); }

        .pc-time {
            display: flex; align-items: center; gap: 5px;
            font-size: 11.5px; color: var(--text-muted); font-weight: 500;
            margin-bottom: 8px;
        }
        .pc-time .material-icons-round { font-size: 13px; color: var(--text-muted); }

        /* Chips grid */
        .pc-chips {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        /* Base chip */
        .pc-chip {
            display: flex; flex-direction: column;
            align-items: flex-start;
            padding: 8px 9px; border-radius: 10px;
            gap: 0;
        }

        /* Food chip */
        .pc-chip-food { background: var(--green-light); justify-content: center; }
        .pc-chip-food-value {
            font-size: 14px; font-weight: 700;
            color: var(--green-dark); line-height: 1;
        }

        /* Price chip */
        .pc-chip-price {
            background: var(--amber-bg);
            border: 1px solid #fde68a;
        }
        .pc-price-top {
            display: flex; align-items: center; gap: 4px;
            margin-bottom: 2px;
        }
        .pc-price-original {
            font-size: 10px; font-weight: 600;
            color: #9ca3af;
            text-decoration: line-through;
            line-height: 1;
        }
        .pc-price-badge {
            font-size: 8.5px; font-weight: 800;
            color: #ffffff;
            background: #ef4444;
            border-radius: 4px;
            padding: 1px 4px;
            line-height: 1.5;
            letter-spacing: 0.2px;
        }
        .pc-price-offer {
            font-size: 15px; font-weight: 800;
            color: #92400e;
            line-height: 1;
            margin-bottom: 2px;
        }
        .pc-price-persons {
            font-size: 9.5px; font-weight: 500;
            color: #b45309;
            line-height: 1;
        }

        /* Marker */
        .rp-marker { background: transparent; border: none; }

        /* FAB */
        #explore-btn {
            position: absolute; bottom: 28px; left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: var(--green); color: #ffffff;
            border: none; padding: 0 26px; height: 52px;
            border-radius: 26px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14.5px; font-weight: 600; letter-spacing: 0.1px;
            box-shadow: 0 4px 20px rgba(17,87,64,0.38), 0 1px 4px rgba(0,0,0,0.1);
            cursor: pointer; display: flex; align-items: center; gap: 7px;
            white-space: nowrap;
            transition: background 0.18s, box-shadow 0.18s, opacity 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        #explore-btn .material-icons-round { font-size: 20px; }
        #explore-btn:active { opacity: 0.82; }
        #explore-btn.busy { pointer-events: none; opacity: 0.65; }
        @media (hover: hover) {
            #explore-btn:hover {
                background: var(--green-dark);
                box-shadow: 0 6px 24px rgba(17,87,64,0.44), 0 2px 6px rgba(0,0,0,0.1);
            }
        }
    </style>
</head>
<body>

<div id="map"></div>
<button id="explore-btn">
    <span class="material-icons-round">explore</span>
    Explore Food
</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map', { zoomControl: false, attributionControl: false })
    .setView([31.51673, 74.36465], 15);

L.control.zoom({ position: 'topright' }).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    maxZoom: 19
}).addTo(map);

function makeIcon(active) {
    const fill   = active ? '#0c3e2e' : '#115740';
    const shadow = active ? '0.32' : '0.20';
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 38"
        style="width:28px;height:38px;display:block;filter:drop-shadow(0 3px 6px rgba(0,0,0,${shadow}))">
        <path d="M14 0C6.268 0 0 6.268 0 14c0 10.456 12.67 22.512 13.503 23.324a0.7 0.7 0 0 0 .994 0C15.33 36.512 28 24.456 28 14 28 6.268 21.732 0 14 0z" fill="${fill}"/>
        <circle cx="14" cy="14" r="6" fill="white" opacity="0.95"/>
    </svg>`;
    return L.divIcon({
        className: 'rp-marker', html: svg,
        iconSize: [28, 38], iconAnchor: [14, 38], popupAnchor: [0, -42]
    });
}

const restaurants = [
    {
        title:        "Lahori Bites",
        lat: 31.51673, lng: 74.36465,
        url:          "https://www.leuvenflyers.com/rpt/",
        banner:       "https://i.postimg.cc/v8h717y3/image.png",
        time:         "11:00 AM – 1:00 AM",
        food:         "Nihari",
        persons:      2,
        originalCost: 2000,
        offerCost:    1500,
        openByDefault: true
    },
    {
        title:        "Gaddafi Stadium Eatery",
        lat: 31.52050, lng: 74.36010,
        url:          "",
        banner:       "https://i.postimg.cc/v8h717y3/image.png",
        time:         "1:00 PM – 3:00 AM",
        food:         "Shawarma",
        persons:      1,
        originalCost: 1100,
        offerCost:    800,
        openByDefault: false
    },
    {
        title:        "Liberty Market Bites",
        lat: 31.51120, lng: 74.37050,
        url:          "",
        banner:       "https://i.postimg.cc/v8h717y3/image.png",
        time:         "10:00 AM – 11:30 PM",
        food:         "Tikka",
        persons:      3,
        originalCost: 1600,
        offerCost:    1200,
        openByDefault: false
    },
    {
        title:        "Model Town Chai Dhaba",
        lat: 31.51400, lng: 74.35400,
        url:          "",
        banner:       "https://i.postimg.cc/v8h717y3/image.png",
        time:         "4:00 PM – 4:00 AM",
        food:         "Paratha",
        persons:      1,
        originalCost: 600,
        offerCost:    450,
        openByDefault: false
    }
];

function buildPopup(place) {
    const hasLink  = place.url && place.url.trim().length > 0;
    const getBtn   = hasLink
        ? `<a href="${place.url}" target="_blank" rel="noopener" class="pc-get-btn">Get Offer</a>`
        : '';
    const pLabel   = place.persons === 1 ? 'person' : 'persons';
    const discount = Math.round((1 - place.offerCost / place.originalCost) * 100);

    return `
        <div>
            <img src="${place.banner}" class="pc-img" alt="${place.title}" onerror="this.style.display='none'">
            <div class="pc-body">
                <div class="pc-title-row">
                    <span class="pc-name">${place.title}</span>
                    ${getBtn}
                </div>
                <div class="pc-time">
                    <span class="material-icons-round">schedule</span>${place.time}
                </div>
                <div class="pc-chips">
                    <div class="pc-chip pc-chip-food">
                        <span class="pc-chip-food-value">${place.food}</span>
                    </div>
                    <div class="pc-chip pc-chip-price">
                        <div class="pc-price-top">
                            <span class="pc-price-original">Rs ${place.originalCost.toLocaleString()}</span>
                            <span class="pc-price-badge">${discount}% OFF</span>
                        </div>
                        <span class="pc-price-offer">Rs ${place.offerCost.toLocaleString()}</span>
                        <span class="pc-price-persons">for ${place.persons} ${pLabel}</span>
                    </div>
                </div>
            </div>
        </div>`;
}

let activeIdx = null;
const markers = [];

restaurants.forEach((place, i) => {
    const marker = L.marker([place.lat, place.lng], { icon: makeIcon(false) }).addTo(map);
    marker.bindPopup(buildPopup(place), { closeButton: false, maxWidth: 230 });

    marker.on('click', () => {
        if (activeIdx !== null && activeIdx !== i) markers[activeIdx].setIcon(makeIcon(false));
        marker.setIcon(makeIcon(true));
        activeIdx = i;
    });

    marker.on('popupclose', () => {
        marker.setIcon(makeIcon(false));
        if (activeIdx === i) activeIdx = null;
    });

    markers.push(marker);

    if (place.openByDefault) {
        marker.setIcon(makeIcon(true));
        activeIdx = i;
        setTimeout(() => marker.openPopup(), 350);
    }
});

let flying = false;
document.getElementById('explore-btn').addEventListener('click', () => {
    if (flying) return;

    let idx = activeIdx;
    if (markers.length > 1) {
        while (idx === activeIdx) idx = Math.floor(Math.random() * markers.length);
    }

    flying = true;
    const btn = document.getElementById('explore-btn');
    btn.classList.add('busy');

    if (activeIdx !== null) markers[activeIdx].setIcon(makeIcon(false));
    map.closePopup();

    activeIdx = idx;
    markers[idx].setIcon(makeIcon(true));

    map.flyTo(markers[idx].getLatLng(), 16, { animate: true, duration: 1.0, easeLinearity: 0.25 });
    map.once('moveend', () => {
        markers[idx].openPopup();
        flying = false;
        btn.classList.remove('busy');
    });
});
</script>
</body>
</html>
