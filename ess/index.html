<!DOCTYPE html>
<html>
<head>
    <title>Email Scraper Dashboard</title>
    <style>
        body {
            font-family: Arial;
            max-width: 900px;
            margin: 40px auto;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 10px;
        }

        button {
            padding: 12px 18px;
            margin-top: 10px;
            background: #2d6cdf;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #1f4fbf;
        }

        #status {
            margin-top: 10px;
            font-weight: bold;
        }

        .box {
            margin-top: 20px;
            background: #f4f4f4;
            padding: 10px;
            border-radius: 6px;
        }

        .email {
            padding: 5px;
            border-bottom: 1px solid #ddd;
            font-family: monospace;
        }
    </style>
</head>

<body>

<h2>🚀 Email Scraper Control Panel</h2>

<p>Paste up to 100 websites (one per line):</p>

<textarea id="urls" placeholder="https://example.com
https://example.org"></textarea>

<br>

<button onclick="startScraping()">Start Scraping</button>

<div id="status"></div>

<hr>

<h3>📧 Firebase Emails</h3>

<button onclick="loadEmails()">Refresh Emails</button>

<div id="emails" class="box"></div>

<script>

// 🔥 YOUR RAILWAY API (IMPORTANT)
const API_URL = "https://allbe-production.up.railway.app/scrape";

// 🔥 FIREBASE URL
const FIREBASE_URL = "https://trackingclients-default-rtdb.firebaseio.com/emails.json";


// ---------------- START SCRAPING ----------------
async function startScraping() {
    let urls = document.getElementById("urls").value
        .split("\n")
        .map(u => u.trim())
        .filter(u => u.length > 0)
        .slice(0, 100);

    if (urls.length === 0) {
        alert("Please enter at least 1 website");
        return;
    }

    document.getElementById("status").innerText = "⏳ Scraping started...";

    try {
        let res = await fetch(API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ urls })
        });

        // 🔥 FIX: handle non-JSON responses safely
        const text = await res.text();

        let data;
        try {
            data = JSON.parse(text);
        } catch (e) {
            throw new Error("Server returned invalid response: " + text);
        }

        document.getElementById("status").innerText =
            "✅ Done! Emails found: " + data.total_emails;

        loadEmails();

    } catch (err) {
        document.getElementById("status").innerText =
            "❌ Error: " + err.message;
    }
}


// ---------------- LOAD FIREBASE EMAILS ----------------
async function loadEmails() {
    document.getElementById("emails").innerText = "Loading...";

    try {
        let res = await fetch(FIREBASE_URL);
        let data = await res.json();

        let list = [];

        for (let key in data) {
            if (data[key].email) {
                list.push(data[key].email);
            }
        }

        document.getElementById("emails").innerHTML =
            "<b>Total Emails:</b> " + list.length + "<br><br>" +
            list.map(e => `<div class="email">${e}</div>`).join("");

    } catch (err) {
        document.getElementById("emails").innerHTML =
            "❌ Error loading emails: " + err.message;
    }
}

// auto load on open
loadEmails();

</script>

</body>
</html>
