<!DOCTYPE html>
<html>
<head>
    <title>Email Scraper Dashboard</title>
    <style>
        body {
            font-family: Arial;
            max-width: 900px;
            margin: 40px auto;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 10px;
        }

        button {
            padding: 12px 18px;
            margin-top: 10px;
            background: #2d6cdf;
            color: white;
            border: none;
            cursor: pointer;
        }

        #status {
            margin-top: 10px;
            font-weight: bold;
        }

        .box {
            margin-top: 20px;
            background: #f4f4f4;
            padding: 10px;
        }

        .email {
            padding: 5px;
            border-bottom: 1px solid #ddd;
            font-family: monospace;
        }
    </style>
</head>

<body>

<h2>🚀 Email Scraper Control Panel</h2>

<textarea id="urls" placeholder="https://example.com
https://example.org"></textarea>

<br>

<button onclick="startScraping()">Start Scraping</button>

<div id="status"></div>

<hr>

<h3>📧 Firebase Emails</h3>

<button onclick="loadEmails()">Refresh Emails</button>

<div id="emails" class="box"></div>

<script>

// 🔥 YOUR CORRECT RAILWAY API
const API_URL = "https://allbe-production.up.railway.app/";

// 🔥 FIREBASE
const FIREBASE_URL = "https://trackingclients-default-rtdb.firebaseio.com/emails.json";

async function startScraping() {
    let urls = document.getElementById("urls").value
        .split("\n")
        .map(u => u.trim())
        .filter(u => u)
        .slice(0, 100);

    document.getElementById("status").innerText = "⏳ Scraping...";

    try {
        let res = await fetch(API_URL, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({urls})
        });

        let data = await res.json();

        document.getElementById("status").innerText =
            "✅ Done! Emails: " + data.total_emails;

        loadEmails();

    } catch (err) {
        document.getElementById("status").innerText =
            "❌ Error: " + err.message;
    }
}

async function loadEmails() {
    let res = await fetch(FIREBASE_URL);
    let data = await res.json();

    let list = [];

    for (let key in data) {
        if (data[key].email) {
            list.push(data[key].email);
        }
    }

    document.getElementById("emails").innerHTML =
        "<b>Total:</b> " + list.length + "<br><br>" +
        list.map(e => `<div class="email">${e}</div>`).join("");
}

loadEmails();

</script>

</body>
</html>
