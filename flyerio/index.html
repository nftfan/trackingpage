<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Flyerio — Find Local Services</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root {
  --bg: #f8f7f5;
  --surface: #ffffff;
  --ink: #1a1816;
  --ink-muted: #5c5750;
  --ink-light: #9b9590;
  --line: #e8e4df;
  --accent: #c8440e;
  --accent-light: #fdf3ef;
  --radius: 16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }

body { background: var(--bg); color: var(--ink); line-height: 1.5; display: flex; flex-direction: column; min-height: 100vh;}

/* ---- Welcome Screen (City Picker) ---- */
.welcome-screen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  overflow-y: auto;
}

.welcome-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 24px;
  padding: 48px 32px;
  max-width: 540px;
  width: 100%;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.06);
  animation: slideUp 0.4s ease;
  margin: auto;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.welcome-brand {
  font-family: 'Instrument Serif', serif;
  font-size: 52px;
  color: var(--ink);
  line-height: 1;
  margin-bottom: 24px;
}
.welcome-brand span { color: var(--accent); font-style: italic; }

.welcome-card h1 { font-size: 24px; margin-bottom: 8px; color: var(--ink); }
.welcome-card p { color: var(--ink-muted); font-size: 15px; margin-bottom: 24px; }

.welcome-search { position: relative; margin-bottom: 28px; }
.welcome-search input {
  width: 100%;
  padding: 14px 16px 14px 44px;
  border: 1.5px solid var(--line);
  border-radius: 99px;
  font-size: 15px;
  outline: none;
  background: var(--bg);
  transition: 0.2s;
}
.welcome-search input:focus { border-color: var(--accent); background: var(--surface); box-shadow: 0 0 0 3px var(--accent-light); }
.welcome-search i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--ink-light); font-size: 18px; }

.welcome-cities {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  justify-content: center;
  max-height: 300px;
  overflow-y: auto;
  padding: 4px;
}
.welcome-cities::-webkit-scrollbar { width: 6px; }
.welcome-cities::-webkit-scrollbar-thumb { background: var(--line); border-radius: 10px; }

.welcome-city-btn {
  padding: 12px 24px;
  background: var(--bg);
  border: 1.5px solid var(--line);
  border-radius: 99px;
  font-size: 15px;
  font-weight: 500;
  color: var(--ink);
  cursor: pointer;
  transition: 0.2s;
}
.welcome-city-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); transform: translateY(-2px); }
.welcome-city-btn.all-loc { background: var(--ink); color: #fff; border-color: var(--ink); }
.welcome-city-btn.all-loc:hover { background: var(--ink-muted); border-color: var(--ink-muted); color: #fff;}

/* ---- App Content Wrapper ---- */
#appContent { display: none; flex: 1; flex-direction: column; }

/* ---- Hero / Search Section ---- */
.hero {
  background: var(--surface);
  border-bottom: 1px solid var(--line);
  padding: 60px 24px 70px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}

.hero-title {
  font-family: 'Instrument Serif', serif;
  font-size: 72px;
  color: var(--ink);
  line-height: 1;
  margin-bottom: 24px;
  letter-spacing: 0.02em;
}
.hero-title span { color: var(--accent); font-style: italic; }

.hero-search-box {
  width: 100%;
  max-width: 560px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.search-top { display: flex; gap: 8px; }
.search-top input {
  flex: 1; padding: 16px 20px; border: 1.5px solid var(--line);
  border-radius: 12px; font-size: 16px; outline: none; transition: 0.2s; background: var(--bg);
}
.search-top input:focus { border-color: var(--accent); background: var(--surface); box-shadow: 0 0 0 3px var(--accent-light); }

.btn-search {
  background: var(--ink); color: #fff; border: none; border-radius: 12px;
  padding: 0 24px; font-size: 22px; cursor: pointer; transition: 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.btn-search:hover { background: var(--accent); }

.search-bottom select {
  width: 100%; padding: 14px 16px; border: 1.5px solid var(--line);
  border-radius: 12px; font-size: 15px; background: var(--bg); color: var(--ink-muted);
  outline: none; cursor: pointer; font-weight: 500;
}
.search-bottom select:focus { border-color: var(--accent); }

/* ---- Main Content ---- */
.main-container {
  max-width: 1200px; margin: 0 auto; padding: 32px 24px 60px; flex: 1; width: 100%;
}

/* ---- Flyer Grid ---- */
.flyer-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; margin-bottom: 40px;
}

/* ---- Flyer Card ---- */
.flyer-card {
  background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
  overflow: hidden; transition: 0.3s; display: flex; flex-direction: column;
}
.flyer-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.06); border-color: #d8d3cd; }

.flyer-img-wrap {
  width: 100%; aspect-ratio: 1 / 1.4; background: var(--bg); position: relative;
  display: flex; align-items: center; justify-content: center; border-bottom: 1px solid var(--line); cursor: zoom-in;
}
.flyer-img-wrap img {
  width: 100%; height: 100%; object-fit: contain; padding: 16px; border-radius: 28px; transition: transform 0.3s ease;
}
.flyer-card:hover .flyer-img-wrap img { transform: scale(1.02); }

.flyer-info { padding: 20px; flex: 1; display: flex; flex-direction: column; }
.flyer-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; color: var(--ink); line-height: 1.2; }
.flyer-category { font-size: 13px; font-weight: 500; color: var(--accent); margin-bottom: 12px; }
.flyer-loc { font-size: 13px; color: var(--ink-muted); display: flex; align-items: center; gap: 4px; margin-bottom: 16px; }

.card-buttons { margin-top: auto; display: flex; flex-direction: column; gap: 8px; }
.btn-card {
  display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%;
  padding: 12px; border-radius: 10px; font-weight: 600; font-size: 14px; text-decoration: none; cursor: pointer; transition: 0.2s;
}
.btn-card-primary { background: var(--bg); border: 1.5px solid var(--line); color: var(--ink); }
.btn-card-primary:hover { background: var(--surface); border-color: var(--ink); }
.btn-card-secondary { background: var(--accent-light); border: 1.5px solid var(--accent-light); color: var(--accent); }
.btn-card-secondary:hover { background: var(--accent); color: #fff; }

/* Load More Button */
.btn-load-more {
  display: inline-flex; align-items: center; justify-content: center; padding: 14px 32px;
  background: var(--surface); border: 1.5px solid var(--line); border-radius: 99px;
  font-size: 15px; font-weight: 600; color: var(--ink); cursor: pointer; transition: 0.2s;
}
.btn-load-more:hover { border-color: var(--ink); }
.load-more-wrap { text-align: center; display: none; }

/* Empty State / Loading */
.state-box { text-align: center; padding: 60px 20px; color: var(--ink-muted); grid-column: 1 / -1; }
.state-box i { font-size: 48px; color: var(--line); margin-bottom: 16px; }
.state-box h3 { font-family: 'Instrument Serif', serif; font-size: 28px; color: var(--ink); margin-bottom: 8px; }
@keyframes spin { 100% { transform: rotate(360deg); } }
.spin { animation: spin 1s linear infinite; display: inline-block; }

/* ---- Lightbox (Pop-up) — SMOOTH SCROLL FIX ---- */
.lightbox {
  display: none;
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(26, 24, 22, 0.9);
  z-index: 9999;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(5px);
  padding: 16px;
}
.lightbox.active { display: flex; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.lightbox-content {
  background: var(--surface);
  border-radius: 16px;
  max-width: 600px;
  width: 100%;
  max-height: 92vh; /* Gives breathing room on top and bottom */
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden; /* Clips the inner scroll area */
  box-shadow: 0 24px 60px rgba(0,0,0,0.4);
}

.lightbox-close {
  position: absolute;
  top: 12px;
  right: 12px;
  background: rgba(0,0,0,0.6);
  color: #fff;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  cursor: pointer;
  transition: 0.2s;
  z-index: 10;
}
.lightbox-close:hover { background: rgba(0,0,0,0.8); }

/* The single scrollable container inside the modal */
.lightbox-scroll-area {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch; /* Forces buttery smooth scrolling on iOS */
  display: flex;
  flex-direction: column;
}

.lightbox-img-area {
  background: var(--bg);
  padding: 24px;
  border-bottom: 1px solid var(--line);
  text-align: center;
}
.lightbox-img-area img {
  max-width: 100%;
  height: auto; /* Natural flow height */
  border-radius: 8px;
  display: inline-block;
  vertical-align: middle;
}

.lightbox-services {
  padding: 24px;
  background: var(--surface);
}
.lightbox-services h4 { font-size: 18px; margin-bottom: 16px; color: var(--ink); }
.lightbox-tags { display: flex; flex-wrap: wrap; gap: 8px; }
.lightbox-tag { font-size: 14px; background: var(--bg); border: 1px solid var(--line); color: var(--ink-muted); padding: 8px 14px; border-radius: 8px; }

/* ---- Footer ---- */
.footer { text-align: center; padding: 24px; border-top: 1px solid var(--line); background: var(--surface); color: var(--ink-light); font-size: 14px; margin-top: auto; }

/* ---- MOBILE SPECIFIC STYLES ---- */
@media (max-width: 767px) {
  .hero { padding: 40px 16px 50px; }
  .hero-title { font-size: 48px; margin-bottom: 16px; }
  
  .search-top input { font-size: 14px; padding: 12px 16px; }
  .btn-search { padding: 0 16px; font-size: 18px; }
  .search-bottom select { font-size: 14px; padding: 12px 16px; }

  .main-container { padding: 20px 12px 60px; }

  /* Force exactly 3 columns */
  .flyer-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 24px; }
  .flyer-card { border-radius: 8px; }
  
  .flyer-img-wrap { border-bottom: 0.5px solid var(--line); }
  .flyer-img-wrap img { padding: 6px; border-radius: 14px; }

  .flyer-info { padding: 8px; }
  .flyer-title { font-size: 11px; margin-bottom: 2px; }
  .flyer-category { font-size: 9px; margin-bottom: 6px; }
  .flyer-loc { font-size: 8px; margin-bottom: 6px; gap: 2px; }
  .flyer-loc i { font-size: 10px; }
  
  .card-buttons { gap: 4px; }
  .btn-card { font-size: 8.5px; padding: 6px 4px; gap: 3px; border-radius: 6px; }
  .btn-card i { font-size: 10px; }

  .lightbox-img-area { padding: 16px; }
  .lightbox-services { padding: 20px 16px; }
  .lightbox-services h4 { font-size: 16px; }
  .lightbox-tag { font-size: 12px; padding: 6px 10px; }
}
</style>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
</head>
<body>

<!-- Welcome Screen (City Picker) -->
<div class="welcome-screen" id="welcomeScreen">
  <div class="welcome-card">
    <div class="welcome-brand">Flyer<span>io</span></div>
    <h1>Where are you looking?</h1>
    <p>Select your city to discover local businesses and services.</p>
    
    <div class="welcome-search">
      <i class="ti ti-search"></i>
      <input type="text" id="welcomeCitySearch" placeholder="Search for a city..." oninput="filterWelcomeCities()">
    </div>

    <div class="welcome-cities" id="welcomeCitiesContainer">
      <i class="ti ti-loader spin" style="font-size: 24px; color: var(--ink-light);"></i>
    </div>
  </div>
</div>

<!-- Main App Wrapper -->
<div id="appContent">
  
  <!-- Hero & Search -->
  <div class="hero">
    <h1 class="hero-title">Flyer<span>io</span></h1>
    <div class="hero-search-box">
      <div class="search-top">
        <input type="text" id="searchInput" placeholder="Search businesses, categories, or services..." onkeypress="if(event.key==='Enter') filterData()">
        <button class="btn-search" onclick="filterData()"><i class="ti ti-search"></i></button>
      </div>
      <div class="search-bottom">
        <select id="locationSelect" onchange="filterData()">
          <option value="All">All Locations</option>
          <!-- Cities injected via JS -->
        </select>
      </div>
    </div>
  </div>

  <div class="main-container">
    <!-- Flyer Grid -->
    <div class="flyer-grid" id="flyerGrid"></div>

    <!-- Load More -->
    <div class="load-more-wrap" id="loadMoreWrap">
      <button class="btn-load-more" onclick="loadMore()">Load more flyers</button>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; Copyright LeuvenFlyers 2026. All rights reserved.</p>
  </footer>

</div>

<!-- Lightbox Pop-up (Fixed Scrolling) -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <div class="lightbox-content">
    <div class="lightbox-close" onclick="closeLightbox(event)">&times;</div>
    
    <!-- Smooth continuous scroll area -->
    <div class="lightbox-scroll-area">
      <div class="lightbox-img-area">
        <img id="lightbox-img" src="" alt="Flyer Full View">
      </div>
      <div class="lightbox-services">
        <h4>Services Offered</h4>
        <div class="lightbox-tags" id="lightbox-tags">
          <!-- Tags injected here -->
        </div>
      </div>
    </div>
    
  </div>
</div>

<script>
  // ---- Firebase Setup ----
  const firebaseConfig = {
    apiKey: "AIzaSyBWPCkYNw7gT_T7kcwbp5laZgIHac18bvE",
    authDomain: "expandlf.firebaseapp.com",
    databaseURL: "https://expandlf-default-rtdb.firebaseio.com",
    projectId: "expandlf",
    storageBucket: "expandlf.firebasestorage.app",
    messagingSenderId: "890066961009",
    appId: "1:890066961009:web:3a2ed1e7c2cf797f3751d0",
    measurementId: "G-QPRSX7ZVZ5"
  };
  
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const refListings = db.ref('directory/listings');

  // ---- State ----
  let allListings = [];
  let currentFiltered = [];
  let allAvailableCities = [];
  let displayLimit = 12; 
  let hasPassedWelcome = false;

  // ---- Fetch Data ----
  refListings.on('value', (snapshot) => {
    const data = snapshot.val();
    allListings = [];
    if (data) {
      allListings = Object.keys(data).map(key => ({
        id: key,
        ...data[key]
      })).sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
    }
    
    extractAndRenderCities();
    
    if (hasPassedWelcome) {
      filterData();
    }
  });

  function toTitleCase(str) {
    return str.replace(/\w\S*/g, txt => txt.charAt(0).toUpperCase() + txt.substr(1).toLowerCase());
  }

  // ---- Extract Unique Cities ----
  function extractAndRenderCities() {
    let cities = new Set();
    allListings.forEach(item => {
      let loc = item.search_data?.location;
      if (loc) cities.add(toTitleCase(loc.trim()));
    });

    allAvailableCities = Array.from(cities).sort();
    
    if (!hasPassedWelcome) {
      renderWelcomeCities(allAvailableCities);
    }
    
    updateDropdownCities(allAvailableCities);
  }

  function renderWelcomeCities(cities) {
    const container = document.getElementById('welcomeCitiesContainer');
    let html = `<button class="welcome-city-btn all-loc" onclick="startApp('All')">All Locations</button>`;
    
    if (cities.length === 0) {
      html += `<p style="width: 100%; color: var(--ink-light); font-size: 14px; margin-top: 10px;">No other cities available yet.</p>`;
    } else {
      cities.forEach(city => {
        html += `<button class="welcome-city-btn" onclick="startApp('${city.replace(/'/g, "\\'")}')">${city}</button>`;
      });
    }
    container.innerHTML = html;
  }

  function filterWelcomeCities() {
    const query = document.getElementById('welcomeCitySearch').value.toLowerCase();
    const filtered = allAvailableCities.filter(c => c.toLowerCase().includes(query));
    renderWelcomeCities(filtered);
  }

  function updateDropdownCities(cities) {
    const select = document.getElementById('locationSelect');
    const currentVal = select.value;
    
    let html = `<option value="All">All Locations</option>`;
    cities.forEach(city => {
      html += `<option value="${city}">${city}</option>`;
    });
    
    select.innerHTML = html;
    
    if (cities.includes(currentVal)) {
      select.value = currentVal;
    }
  }

  function startApp(city) {
    hasPassedWelcome = true;
    document.getElementById('locationSelect').value = city;
    
    document.getElementById('welcomeScreen').style.display = 'none';
    document.getElementById('appContent').style.display = 'flex';
    
    filterData();
  }

  // ---- Filtering Logic ----
  function filterData() {
    const searchQuery = document.getElementById('searchInput').value.toLowerCase();
    const activeCity = document.getElementById('locationSelect').value;
    displayLimit = 12; 
    
    currentFiltered = allListings.filter(item => {
      const loc = item.search_data?.location ? toTitleCase(item.search_data.location.trim()) : '';
      const name = (item.business_info?.name || '').toLowerCase();
      const cat = (item.search_data?.category || '').toLowerCase();
      const kws = (item.search_data?.services_and_keywords || []).map(k => k.toLowerCase());

      if (activeCity !== 'All' && loc !== activeCity) return false;

      if (searchQuery !== '') {
        const matchesName = name.includes(searchQuery);
        const matchesCat = cat.includes(searchQuery);
        const matchesKw = kws.some(k => k.includes(searchQuery));
        if (!matchesName && !matchesCat && !matchesKw) return false;
      }
      return true;
    });

    renderGrid();
  }

  // ---- Render Grid ----
  function renderGrid() {
    const grid = document.getElementById('flyerGrid');
    const loadMoreWrap = document.getElementById('loadMoreWrap');
    
    if (currentFiltered.length === 0) {
      grid.innerHTML = `
        <div class="state-box">
          <i class="ti ti-mood-empty"></i>
          <h3>No flyers found</h3>
          <p>Try adjusting your search or location.</p>
        </div>`;
      loadMoreWrap.style.display = 'none';
      return;
    }

    const toDisplay = currentFiltered.slice(0, displayLimit);
    let html = '';
    
    toDisplay.forEach(item => {
      const bInfo = item.business_info || {};
      const sData = item.search_data || {};
      
      const imgUrl = item.flyer_url || 'https://via.placeholder.com/400x600?text=No+Flyer+Image';
      const mapUrl = sData.google_map_url || '#';
      const hasMap = mapUrl !== '#';

      html += `
        <div class="flyer-card">
          <div class="flyer-img-wrap" onclick="openLightbox('${item.id}')" title="Click to view flyer">
            <img src="${imgUrl}" alt="${bInfo.name} flyer" loading="lazy">
          </div>
          <div class="flyer-info">
            <h3 class="flyer-title">${bInfo.name || 'Untitled Business'}</h3>
            <div class="flyer-category">${sData.category || 'Service'}</div>
            <div class="flyer-loc">
              <i class="ti ti-map-pin"></i> ${sData.location || 'Location not specified'}
            </div>
            
            <div class="card-buttons">
              <button class="btn-card btn-card-secondary" onclick="openLightbox('${item.id}')">
                <i class="ti ti-tags"></i> View Services
              </button>
              
              ${hasMap 
                ? `<a href="${mapUrl}" target="_blank" rel="noopener noreferrer" class="btn-card btn-card-primary">
                    <i class="ti ti-brand-google-maps"></i> View Map
                   </a>`
                : `<button class="btn-card btn-card-primary" disabled style="opacity:0.5; cursor:not-allowed;">
                    <i class="ti ti-map-pin-off"></i> No Map
                   </button>`
              }
            </div>
          </div>
        </div>
      `;
    });

    grid.innerHTML = html;

    if (currentFiltered.length > displayLimit) {
      loadMoreWrap.style.display = 'block';
    } else {
      loadMoreWrap.style.display = 'none';
    }
  }

  function loadMore() {
    displayLimit += 12;
    renderGrid();
  }

  // ---- Lightbox Logic ----
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');
  const lightboxTags = document.getElementById('lightbox-tags');

  function openLightbox(id) {
    const item = allListings.find(x => x.id === id);
    if (!item) return;

    lightboxImg.src = item.flyer_url || 'https://via.placeholder.com/400x600?text=No+Flyer+Image';
    
    const kws = item.search_data?.services_and_keywords || [];
    if (kws.length > 0) {
      lightboxTags.innerHTML = kws.map(k => `<span class="lightbox-tag">${toTitleCase(k.trim())}</span>`).join('');
    } else {
      lightboxTags.innerHTML = `<span style="color:var(--ink-light); font-size: 14px;">No specific services listed.</span>`;
    }

    lightbox.classList.add('active');
    document.body.style.overflow = 'hidden'; 
  }

  function closeLightbox(e) {
    if (e.target.id === 'lightbox' || e.target.classList.contains('lightbox-close')) {
      lightbox.classList.remove('active');
      setTimeout(() => { 
        lightboxImg.src = ''; 
        lightboxTags.innerHTML = '';
      }, 200);
      document.body.style.overflow = 'auto';
    }
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && lightbox.classList.contains('active')) {
      closeLightbox({ target: lightbox });
    }
  });

</script>
</body>
</html>
