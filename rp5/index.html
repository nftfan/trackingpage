<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RotiPani.Net</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Fraunces:opsz,wght@9..144,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root {
            --green:       #115740;
            --green-dark:  #0c3e2e;
            --green-light: #e4f0ea;
            --white:       #ffffff;
            --text:        #111827;
            --text-muted:  #6b7280;
            --amber-bg:    #fffbeb;
            --shadow-lg:   0 12px 40px rgba(0,0,0,0.14), 0 3px 10px rgba(0,0,0,0.07);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; width: 100%; font-family: 'DM Sans', sans-serif; overflow: hidden; background: #e8e8e8; }
        #map { height: 100%; width: 100%; z-index: 1; }

        /* Location permission overlay */
        #location-overlay {
            position: fixed; inset: 0; z-index: 2000;
            background: rgba(0,0,0,0.55);
            display: flex; align-items: flex-end; justify-content: center;
            padding-bottom: 40px;
            backdrop-filter: blur(3px);
        }
        #location-card {
            background: var(--white);
            border-radius: 20px;
            padding: 28px 24px 24px;
            width: min(360px, calc(100vw - 32px));
            box-shadow: var(--shadow-lg);
            text-align: center;
        }
        .loc-icon {
            width: 56px; height: 56px; border-radius: 16px;
            background: var(--green-light);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px;
        }
        .loc-title {
            font-family: 'Fraunces', serif;
            font-size: 20px; font-weight: 700;
            color: var(--text); margin-bottom: 8px;
        }
        .loc-desc {
            font-size: 13px; color: var(--text-muted);
            line-height: 1.5; margin-bottom: 22px;
        }
        .loc-btn-allow {
            width: 100%; padding: 13px;
            background: var(--green); color: #fff;
            border: none; border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px; font-weight: 700;
            cursor: pointer; margin-bottom: 10px;
            transition: background 0.15s;
        }
        .loc-btn-allow:hover { background: var(--green-dark); }
        .loc-btn-skip {
            width: 100%; padding: 11px;
            background: transparent; color: var(--text-muted);
            border: 1px solid #e5e7eb; border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px; font-weight: 500;
            cursor: pointer; transition: background 0.15s;
        }
        .loc-btn-skip:hover { background: #f9fafb; }

        /* Status pill */
        #status-pill {
            position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
            z-index: 1000;
            background: var(--white);
            border-radius: 999px;
            padding: 6px 14px 6px 10px;
            font-size: 12px; font-weight: 600;
            color: var(--text);
            box-shadow: 0 2px 12px rgba(0,0,0,0.13);
            display: flex; align-items: center;
            gap: 6px;
            white-space: nowrap;
            opacity: 0; transition: opacity 0.3s;
            pointer-events: none;
        }
        #status-pill.visible { opacity: 1; }
        #status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--green); flex-shrink: 0;
        }

        /* No nearby toast */
        #no-nearby {
            position: absolute; bottom: 110px; left: 50%; transform: translateX(-50%);
            z-index: 1000;
            background: #1f2937; color: #fff;
            border-radius: 10px; padding: 10px 18px;
            font-size: 13px; font-weight: 500;
            white-space: nowrap;
            opacity: 0; transition: opacity 0.3s;
            pointer-events: none;
        }
        #no-nearby.visible { opacity: 1; }

        /* Marker labels */
        .rp-title-tooltip {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            font-size: 12px !important;
            font-weight: 800 !important;
            color: var(--green) !important;
            text-shadow: 1px 1px 0px #fff, -1px -1px 0px #fff, 1px -1px 0px #fff, -1px 1px 0px #fff;
            transition: opacity 0.2s ease;
        }
        .leaflet-tooltip-right:before { border-right-color: transparent !important; }

        /* Popup */
        .leaflet-popup-content-wrapper {
            background: var(--white);
            border-radius: 14px; padding: 0;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(0,0,0,0.06);
            overflow: hidden;
        }
        @keyframes popup-pop {
            0% { transform: scale(0.4); opacity: 0; }
            70% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .custom-popup-animate .leaflet-popup-content-wrapper {
            animation: popup-pop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            transform-origin: bottom center;
        }
        .leaflet-popup-content { margin: 0 !important; width: 250px !important; }
        .leaflet-popup-close-button { display: none !important; }

        /* Card content */
        .pc-img { width: 100%; height: auto; object-fit: cover; display: block; background: #eee; }
        .pc-body { padding: 14px; }
        .pc-name { font-family: 'Fraunces', serif; font-size: 17px; font-weight: 700; color: var(--text); line-height: 1.2; margin-bottom: 6px; display: block; }
        .pc-info-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 12px; }
        .pc-time { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-muted); font-weight: 500; }
        .pc-whatsapp-btn {
            flex-shrink: 0; display: flex; align-items: center; gap: 5px;
            padding: 6px 11px; background: #25d366; color: #fff !important;
            border-radius: 8px; font-size: 11px; font-weight: 700;
            text-decoration: none; transition: background 0.15s ease;
        }
        .pc-whatsapp-btn:hover { background: #1ebe5d; }
        .pc-whatsapp-btn svg { flex-shrink: 0; }
        .pc-chips { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 10px; align-items: stretch; }
        .pc-chip { padding: 10px; border-radius: 12px; display: flex; flex-direction: column; min-width: 0; }
        .pc-chip-food { background: var(--green-light); border: 1px solid rgba(17, 87, 64, 0.05); }
        .pc-food-name { font-size: 13px; font-weight: 700; color: var(--green-dark); margin-bottom: 2px; }
        .pc-food-desc { font-size: 10px; color: var(--green); opacity: 0.8; line-height: 1.3; word-wrap: break-word; overflow: visible; }
        .pc-chip-price { background: var(--amber-bg); border: 1px solid #fde68a; justify-content: center; }
        .pc-price-badge { font-size: 9px; background: #ef4444; color: #fff; padding: 2px 5px; border-radius: 5px; font-weight: 700; width: fit-content; margin-bottom: 4px; }
        .pc-price-offer { font-size: 15px; font-weight: 800; color: #92400e; line-height: 1; }
        .pc-price-persons { font-size: 9px; color: #b45309; margin-top: 3px; }

        .rp-marker { background: transparent; border: none; }

        /* Explore button */
        #explore-btn {
            position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: var(--green);
            border: none; width: 64px; height: 64px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 6px 24px rgba(0,0,0,0.28);
            transition: background 0.2s ease, box-shadow 0.2s ease;
            padding: 0;
            animation: float 3s ease-in-out infinite;
        }
        #explore-btn:hover { background: var(--green-dark); box-shadow: 0 10px 32px rgba(0,0,0,0.34); }
        #explore-btn:active { transform: translateX(-50%) scale(0.92); animation: none; }
        @keyframes float {
            0%   { transform: translateX(-50%) translateY(0px); }
            50%  { transform: translateX(-50%) translateY(-7px); }
            100% { transform: translateX(-50%) translateY(0px); }
        }
    </style>
</head>
<body>

<div id="map"></div>

<!-- Location permission overlay -->
<div id="location-overlay">
    <div id="location-card">
        <div class="loc-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#115740" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
                <circle cx="12" cy="9" r="2.5"/>
            </svg>
        </div>
        <div class="loc-title">Find deals near you</div>
        <div class="loc-desc">Share your location so we can show you food offers within 50 km. We never store your location.</div>
        <button class="loc-btn-allow" id="btn-allow">Allow location access</button>
        <button class="loc-btn-skip" id="btn-skip">Skip, show all offers</button>
    </div>
</div>

<!-- Status pill -->
<div id="status-pill">
    <div id="status-dot"></div>
    <span id="status-text"></span>
</div>

<!-- No nearby toast -->
<div id="no-nearby">No offers found within 50 km 😕</div>

<!-- Explore button -->
<button id="explore-btn" aria-label="Explore offers">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" width="34" height="34" fill="none">
        <ellipse cx="18" cy="26" rx="13" ry="3.5" fill="rgba(255,255,255,0.18)"/>
        <path d="M6 18 Q6 28 18 28 Q30 28 30 18 Z" fill="rgba(255,255,255,0.22)" stroke="rgba(255,255,255,0.7)" stroke-width="1.2"/>
        <ellipse cx="18" cy="18" rx="12" ry="3.5" fill="rgba(255,255,255,0.55)"/>
        <g stroke="rgba(255,255,255,0.85)" stroke-width="1.4" stroke-linecap="round">
            <path d="M13 15 Q12 12 13 9 Q14 6 13 3"/>
            <path d="M18 14 Q17 11 18 8 Q19 5 18 2"/>
            <path d="M23 15 Q22 12 23 9 Q24 6 23 3"/>
        </g>
        <style>
            @keyframes steam1 { 0%,100%{opacity:0.9;transform:translateY(0) scaleX(1)} 50%{opacity:0.3;transform:translateY(-3px) scaleX(1.2)} }
            @keyframes steam2 { 0%,100%{opacity:0.9;transform:translateY(0) scaleX(1)} 50%{opacity:0.3;transform:translateY(-3px) scaleX(0.8)} }
            @keyframes steam3 { 0%,100%{opacity:0.9;transform:translateY(0) scaleX(1)} 50%{opacity:0.3;transform:translateY(-3px) scaleX(1.1)} }
        </style>
    </svg>
</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map', { zoomControl: false, attributionControl: false })
    .setView([31.5204, 74.3587], 15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '© OpenStreetMap contributors',
    subdomains: ['a', 'b', 'c']
}).addTo(map);

let markers = [];
let lastMarker = null;
let userLat = null;
let userLng = null;
let useLocationFilter = false;
let noNearbyTimer = null;

// Haversine distance in km
function distanceKm(lat1, lng1, lat2, lng2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 +
              Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
              Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function makeIcon(active) {
    const fill = active ? '#0c3e2e' : '#115740';
    return L.divIcon({
        className: 'rp-marker',
        html: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 12 12" style="width:12px;height:12px;overflow:visible"><circle cx="6" cy="6" r="5" fill="${fill}" stroke="white" stroke-width="1.5"/></svg>`,
        iconSize: [12, 12],
        iconAnchor: [6, 6],
        popupAnchor: [0, -10]
    });
}

const whatsappIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>`;

function buildPopup(p) {
    const disc = Math.round((1 - p.offerCost / p.originalCost) * 100);
    const waUrl = p.whatsapp
        ? `https://wa.me/${p.whatsapp}?text=${encodeURIComponent('Hi! I saw your offer on RotiPani.Net – ' + p.title)}`
        : p.url;
    return `
        <img src="${p.banner}" class="pc-img">
        <div class="pc-body">
            <span class="pc-name">${p.title}</span>
            <div class="pc-info-row">
                <div class="pc-time"><span class="material-icons-round" style="font-size:15px">schedule</span>${p.time}</div>
                <a href="${waUrl}" target="_blank" class="pc-whatsapp-btn">${whatsappIcon}WhatsApp</a>
            </div>
            <div class="pc-chips">
                <div class="pc-chip pc-chip-food">
                    <span class="pc-food-name">${p.food}</span>
                    <span class="pc-food-desc">${p.desc}</span>
                </div>
                <div class="pc-chip pc-chip-price">
                    <div class="pc-price-badge">${disc}% OFF</div>
                    <span class="pc-price-offer">Rs ${p.offerCost}</span>
                    <span class="pc-price-persons">for ${p.persons} ${p.persons > 1 ? 'ppl' : 'person'}</span>
                </div>
            </div>
        </div>`;
}

function showStatusPill(text) {
    const pill = document.getElementById('status-pill');
    document.getElementById('status-text').textContent = text;
    pill.classList.add('visible');
}

function showNoNearby() {
    const el = document.getElementById('no-nearby');
    el.classList.add('visible');
    clearTimeout(noNearbyTimer);
    noNearbyTimer = setTimeout(() => el.classList.remove('visible'), 3000);
}

function getNearbyMarkers() {
    if (!useLocationFilter || userLat === null) return markers;
    return markers.filter(m => {
        const ll = m.getLatLng();
        return distanceKm(userLat, userLng, ll.lat, ll.lng) <= 50;
    });
}

document.getElementById('explore-btn').addEventListener('click', () => {
    const pool = getNearbyMarkers();
    if (pool.length === 0) { showNoNearby(); return; }

    // Pick a random marker from pool, avoiding repeating the last one
    let pick;
    let attempts = 0;
    do {
        pick = pool[Math.floor(Math.random() * pool.length)];
        attempts++;
    } while (pick === lastMarker && pool.length > 1 && attempts < 20);
    lastMarker = pick;

    map.setView(pick.getLatLng(), 17, { animate: false });
    setTimeout(() => { pick.openPopup(); }, 50);
});

function placeUserDot(lat, lng) {
    L.circleMarker([lat, lng], {
        radius: 8,
        fillColor: '#3b82f6',
        color: '#fff',
        weight: 2.5,
        fillOpacity: 1,
        zIndexOffset: 1000
    }).addTo(map).bindTooltip('You are here', { permanent: false, direction: 'top' });
}

function onLocationGranted(pos) {
    userLat = pos.coords.latitude;
    userLng = pos.coords.longitude;
    useLocationFilter = true;

    placeUserDot(userLat, userLng);
    map.setView([userLat, userLng], 13);

    const count = getNearbyMarkers().length;
    showStatusPill(`📍 ${count} offer${count !== 1 ? 's' : ''} within 50 km`);
    document.getElementById('location-overlay').style.display = 'none';
}

function onLocationDenied() {
    useLocationFilter = false;
    showStatusPill('Showing all offers');
    document.getElementById('location-overlay').style.display = 'none';
}

document.getElementById('btn-allow').addEventListener('click', () => {
    if (!navigator.geolocation) { onLocationDenied(); return; }
    navigator.geolocation.getCurrentPosition(onLocationGranted, onLocationDenied, {
        enableHighAccuracy: true,
        timeout: 10000
    });
});

document.getElementById('btn-skip').addEventListener('click', onLocationDenied);

async function initMap() {
    try {
        const response = await fetch('https://raw.githubusercontent.com/leuvenfd/rotipani/main/data/restaurants.json');
        const data = await response.json();

        data.forEach((p) => {
            const m = L.marker([p.lat, p.lng], { icon: makeIcon(false) }).addTo(map);

            m.bindTooltip(p.title, {
                permanent: true,
                direction: 'right',
                offset: [10, 0],
                className: 'rp-title-tooltip'
            });

            m.bindPopup(buildPopup(p), {
                closeButton: false,
                className: 'custom-popup-animate',
                minWidth: 250
            });

            m.on('click', () => m.setIcon(makeIcon(true)));
            m.on('popupclose', () => m.setIcon(makeIcon(false)));
            markers.push(m);
        });

        toggleLabels();
    } catch (error) {
        console.error('Error loading restaurant data:', error);
    }
}

function toggleLabels() {
    const zoom = map.getZoom();
    markers.forEach(m => {
        if (m.getTooltip()) m.getTooltip().setOpacity(zoom < 14 ? 0 : 1);
    });
}

map.on('zoomend', toggleLabels);
initMap();
</script>
</body>
</html>
