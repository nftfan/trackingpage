
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Editor</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#000;width:100%;height:100vh;overflow:hidden;display:flex;flex-direction:column}

  /* TAB BAR — 10px tall */
  #tabbar{
    height:10px;display:flex;align-items:stretch;
    background:#000;flex-shrink:0;overflow:hidden;
  }
  .tab{
    display:flex;align-items:center;justify-content:center;
    padding:0 6px;cursor:pointer;font-size:6px;
    font-family:'Courier New',monospace;letter-spacing:.05em;
    color:rgba(0,0,0,0.5);white-space:nowrap;overflow:hidden;
    opacity:.45;transition:opacity .15s;position:relative;gap:3px;
    border-right:1px solid rgba(0,0,0,.3);
  }
  .tab:hover{opacity:.8}
  .tab.active{opacity:1;color:rgba(0,0,0,.7)}
  .tab-x{
    font-size:6px;cursor:pointer;opacity:.6;
    line-height:1;margin-top:-1px;
  }
  .tab-x:hover{opacity:1}
  #tab-add{
    width:10px;height:10px;display:flex;align-items:center;justify-content:center;
    background:#111;border:none;color:#333;font-size:10px;cursor:pointer;
    flex-shrink:0;transition:color .1s;
  }
  #tab-add:hover{color:#888}

  /* EDITOR */
  .editor-wrap{display:flex;flex:1;overflow:hidden;width:100%}
  #line-numbers{
    padding:10px 8px;background:#000;color:#444;
    text-align:right;user-select:none;border-right:1px solid #1a1a1a;
    min-width:42px;overflow:hidden;white-space:pre;line-height:1.6;
    font-size:10px;font-family:'Courier New',Courier,monospace;flex-shrink:0;
  }
  #code-content{
    flex:1;background:#000;color:#d4d4d4;border:none;outline:none;
    resize:none;padding:10px 14px;font-family:'Courier New',Courier,monospace;
    font-size:10px;line-height:1.6;overflow:auto;white-space:pre;
    tab-size:2;caret-color:#fff;
  }
  #code-content::selection{background:#264f78}
  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-thumb{background:#222;border-radius:2px}
  ::-webkit-scrollbar-track{background:#000}
</style>
</head>
<body>
  <div id="tabbar">
    <button id="tab-add" onclick="addTab()" title="+">+</button>
  </div>
  <div class="editor-wrap">
    <div id="line-numbers">1</div>
    <textarea id="code-content" spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>
  </div>

<script>
  const textarea  = document.getElementById('code-content');
  const lineNums  = document.getElementById('line-numbers');
  const tabbar    = document.getElementById('tabbar');

  const COLORS = ['#3b82f6','#22c55e','#f59e0b','#ef4444','#a855f7','#06b6d4','#f97316','#ec4899','#14b8a6','#84cc16'];
  let tabs = [], activeId = null, counter = 1;

  function colorFor(idx){ return COLORS[idx % COLORS.length]; }

  function addTab(name, code){
    const id = 't' + Date.now();
    const idx = tabs.length;
    tabs.push({ id, name: name || ('tab-' + counter++), code: code || '', color: colorFor(idx) });
    renderTabs();
    switchTab(id);
  }

  function closeTab(id, e){
    e && e.stopPropagation();
    const idx = tabs.findIndex(t => t.id === id);
    if (idx < 0) return;
    tabs.splice(idx, 1);
    if (!tabs.length){ addTab(); return; }
    if (activeId === id) switchTab(tabs[Math.min(idx, tabs.length-1)].id);
    else renderTabs();
  }

  function switchTab(id){
    if (activeId){ const c = tabs.find(t => t.id === activeId); if(c) c.code = textarea.value; }
    activeId = id;
    const t = tabs.find(t => t.id === id);
    if (!t) return;
    textarea.value = t.code;
    updateLineNumbers();
    renderTabs();
    textarea.focus();
  }

  function renderTabs(){
    document.querySelectorAll('.tab').forEach(el => el.remove());
    const addBtn = document.getElementById('tab-add');
    tabs.forEach(t => {
      const div = document.createElement('div');
      div.className = 'tab' + (t.id === activeId ? ' active' : '');
      div.style.background = t.color;
      div.style.minWidth = '36px';
      div.onclick = () => switchTab(t.id);
      div.innerHTML = `<span>${esc(t.name)}</span><span class="tab-x" onclick="closeTab('${t.id}',event)">✕</span>`;
      tabbar.insertBefore(div, addBtn);
    });
  }

  function updateLineNumbers(){
    const n = textarea.value.split('\n').length;
    let s = ''; for(let i=1;i<=n;i++) s += i + '\n';
    lineNums.textContent = s;
    lineNums.scrollTop = textarea.scrollTop;
  }

  textarea.addEventListener('input', () => {
    updateLineNumbers();
    const c = tabs.find(t => t.id === activeId); if(c) c.code = textarea.value;
  });
  textarea.addEventListener('scroll', () => { lineNums.scrollTop = textarea.scrollTop; });
  textarea.addEventListener('keydown', e => {
    if (e.key === 'Tab'){
      e.preventDefault();
      const s = textarea.selectionStart, en = textarea.selectionEnd;
      textarea.value = textarea.value.substring(0,s) + '  ' + textarea.value.substring(en);
      textarea.selectionStart = textarea.selectionEnd = s + 2;
      updateLineNumbers();
    }
  });

  function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  addTab('tab-1');
</script>
</body>
</html>
