
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Editor</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#000;width:100%;height:100vh;overflow:hidden}
  .editor-wrap{display:flex;height:100vh;width:100%}
  #line-numbers{
    padding:10px 8px;background:#000;color:#444;
    text-align:right;user-select:none;border-right:1px solid #1a1a1a;
    min-width:42px;overflow:hidden;white-space:pre;line-height:1.6;
    font-size:10px;font-family:'Courier New',Courier,monospace;flex-shrink:0;
  }
  #code-content{
    flex:1;background:#000;color:#d4d4d4;border:none;outline:none;
    resize:none;padding:10px 14px;font-family:'Courier New',Courier,monospace;
    font-size:10px;line-height:1.6;overflow:auto;white-space:pre;
    tab-size:2;caret-color:#fff;
  }
  #code-content::selection{background:#264f78}
  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-thumb{background:#222;border-radius:2px}
  ::-webkit-scrollbar-track{background:#000}
</style>
</head>
<body>
  <div class="editor-wrap">
    <div id="line-numbers">1</div>
    <textarea id="code-content" spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>
  </div>
  <script>
    const textarea = document.getElementById('code-content');
    const lineNumbers = document.getElementById('line-numbers');

    function updateLineNumbers() {
      const lines = textarea.value.split('\n').length;
      let nums = '';
      for (let i = 1; i <= lines; i++) nums += i + '\n';
      lineNumbers.textContent = nums;
      lineNumbers.scrollTop = textarea.scrollTop;
    }

    textarea.addEventListener('input', updateLineNumbers);
    textarea.addEventListener('scroll', () => { lineNumbers.scrollTop = textarea.scrollTop; });
    textarea.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const s = textarea.selectionStart, en = textarea.selectionEnd;
        textarea.value = textarea.value.substring(0, s) + '  ' + textarea.value.substring(en);
        textarea.selectionStart = textarea.selectionEnd = s + 2;
        updateLineNumbers();
      }
    });

    updateLineNumbers();
    textarea.focus();
  </script>
</body>
</html>
