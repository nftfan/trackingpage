
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI FlyerBook</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0f0f0f;
    --paper: #f5f0e8;
    --cream: #ede7d9;
    --accent: #e63027;
    --muted: #8a8070;
    --border: #ccc4b4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--ink);
    padding: 0 40px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 4px solid var(--accent);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: var(--paper);
    letter-spacing: 2px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-ai {
    background: var(--accent);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 3px 7px;
    border-radius: 4px;
    align-self: center;
    margin-bottom: 2px;
  }

  .flyer-count {
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* MAIN GALLERY */
  main {
    padding: 36px 40px 60px;
    max-width: 1280px;
    margin: 0 auto;
  }

  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }

  .gallery-item {
    border-radius: 24px;
    overflow: hidden;
    cursor: pointer;
  }

  .gallery-item img {
    width: 100%;
    height: auto;
    display: block;
  }

  /* LIGHTBOX */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.18s ease;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  .lightbox.hidden { display: none; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .lightbox img {
    max-width: 88vw;
    max-height: 90vh;
    object-fit: contain;
    border-radius: 20px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
  }

  .lightbox-close {
    position: absolute;
    top: 24px;
    right: 28px;
    background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(255,255,255,0.18);
    color: #fff;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .lightbox-close:hover { background: var(--accent); border-color: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-ai">AI</span>
    FlyerBook
  </div>
  <div class="flyer-count" id="flyer-count"></div>
</header>

<main>
  <div class="gallery-grid" id="gallery-grid"></div>
</main>

<div class="lightbox hidden" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="flyer">
</div>

<script>
  const flyers = [
    "https://res.cloudinary.com/dvbwmtdwh/image/upload/v1778496726/c9063a01-9532-4e79-80ae-eb70f7deaabe_lomlx7.png",
    "https://res.cloudinary.com/dvbwmtdwh/image/upload/v1778409467/51dc301d-5461-44bc-acc6-ac784666c5e0_lmeyez.png",
    "https://res.cloudinary.com/dvbwmtdwh/image/upload/v1778409665/1441c2d0-bd13-4cd7-b22d-e6f38f2f6af6_ci0yjl.png",
    "https://res.cloudinary.com/dvbwmtdwh/image/upload/v1778263075/92b0ad45-fac9-4ce8-867d-64af6e0e7d9c_klrlag.png",
    "https://res.cloudinary.com/dvbwmtdwh/image/upload/v1778409790/15d58005-5af6-470d-ad3f-9d13d2fa8e70_vwrovv.png"
  ];

  const grid = document.getElementById('gallery-grid');
  document.getElementById('flyer-count').textContent = `${flyers.length} flyers`;

  flyers.forEach((src, i) => {
    const item = document.createElement('div');
    item.className = 'gallery-item';
    item.onclick = () => openLightbox(src);
    item.innerHTML = `<img src="${src}" alt="Flyer ${i + 1}" loading="lazy">`;
    grid.appendChild(item);
  });

  function openLightbox(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.add('hidden');
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeLightbox();
  });
</script>
</body>
</html>
