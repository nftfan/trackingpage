<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>LeuvenFlyers App</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0b0b0e;
    color: white;
    overflow: hidden;
  }

  .view {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 70px;
    display: none;
  }

  .view iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  .active {
    display: block;
  }

  /* Bottom Nav */
  .nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 70px;
    background: #141419;
    display: flex;
    border-top: 1px solid #222;
  }

  .nav button {
    flex: 1;
    background: none;
    border: none;
    color: #aaa;
    font-size: 12px;
  }

  .nav button.active {
    color: #4f8cff;
  }
</style>
</head>

<body>

<!-- Views -->
<div id="map" class="view active">
  <iframe src="https://www.leuvenflyers.com/ms400"></iframe>
</div>

<div id="start" class="view">
  <iframe src="https://www.leuvenflyers.com/ti/"></iframe>
</div>

<div id="contract" class="view">
  <iframe src="https://www.leuvenflyers.com/bid/"></iframe>
</div>

<div id="payments" class="view">
  <iframe src="https://www.leuvenflyers.com/vsp/"></iframe>
</div>

<div id="profile" class="view">
  <iframe src="https://www.leuvenflyers.com/staff/"></iframe>
</div>

<!-- Bottom Navigation -->
<div class="nav">
  <button onclick="openTab('map', this)" class="active">📍 Map</button>
  <button onclick="openTab('start', this)">🚀 Start</button>
  <button onclick="openTab('contract', this)">📄 Contract</button>
  <button onclick="openTab('payments', this)">💳 Pay</button>
  <button onclick="openTab('profile', this)">👤 Me</button>
</div>

<script>
  const tg = window.Telegram.WebApp;

  tg.ready();
  tg.expand(); // FULLSCREEN

  function openTab(id, el) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');

    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
  }
</script>

</body>
</html>
