<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Compact Flat Calendar & Tracker</title>
    
    <!-- PWA & Mobile App Meta Tags -->
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tracker">

    <!-- Performance hints -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- PWA Manifest & Icons -->
    <link rel="manifest" href="https://raw.githubusercontent.com/leuvenfd/coinfun/refs/heads/main/and.json">
    <link rel="apple-touch-icon" href="https://www.iconpacks.net/icons/2/free-time-icon-3487-thumb.png">
    <link rel="apple-touch-startup-image" href="https://www.iconpacks.net/icons/2/free-time-icon-3487-thumb.png">

    <!-- Google Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --border-color: #2d2d2d;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent-color: #bb86fc;
            --red-line: #ff3b30;
            
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-size: 10px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            box-shadow: none !important;
            text-shadow: none !important;
        }

        body, html {
            height: 100dvh; 
            background-color: var(--bg-color);
            color: var(--text-primary);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            overscroll-behavior-y: none;
        }

        .material-icons {
            font-size: 18px;
            color: var(--text-secondary);
        }

        /* Top Header */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--surface-color);
            padding: calc(6px + var(--safe-top)) 8px 6px 8px;
            border-bottom: 1px solid var(--border-color);
        }

        .header-left, .header-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .date-input {
            background-color: var(--bg-color);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 4px;
            outline: none;
            color-scheme: dark;
            text-transform: uppercase;
            width: 95px;
        }

        .week-square, .day-count-square {
            background-color: var(--border-color);
            color: var(--text-primary);
            border-radius: 2px;
            padding: 2px 4px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 16px;
        }

        .day-count-square {
            background-color: var(--accent-color);
            color: var(--bg-color);
        }

        #current-date-text {
            color: var(--text-secondary);
            margin-right: 2px;
            font-weight: 600;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 4px;
            -webkit-tap-highlight-color: transparent;
        }

        /* App Tabs Bar */
        #tabs-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background-color: var(--surface-color);
            padding: 8px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .tab-item {
            display: flex;
            flex-direction: row; 
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            cursor: pointer;
            gap: 3px; 
            -webkit-tap-highlight-color: transparent;
        }

        .tab-item .material-icons {
            font-size: 7px; 
            transition: color 0.2s;
        }

        .tab-item span.tab-label {
            font-size: 7px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .tab-item.active, .tab-item.active .material-icons {
            color: var(--accent-color);
        }

        /* Main Content Views */
        .view-container {
            flex: 1;
            display: none;
            overflow: hidden;
            background-color: var(--bg-color);
            position: relative;
            padding-bottom: var(--safe-bottom);
        }

        .view-container.active {
            display: flex;
            flex-direction: column;
        }

        /* Sleek Days Sub-header (Calendar View) */
        #sleek-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
            padding: 2px 8px 4px 8px;
        }

        #sleek-bar * {
            font-size: 7px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        #weekdays {
            display: flex;
            gap: 12px;
            padding-left: 4px;
        }

        .weekday { color: var(--text-secondary); }
        .weekday.active { color: var(--red-line); }
        #real-time-clock { color: var(--text-primary); }

        /* Timeline (Calendar View) */
        #timeline {
            flex: 1;
            overflow: hidden; 
            position: relative;
        }

        #timeline-inner {
            display: grid;
            grid-template-rows: repeat(12, 1fr); 
            grid-template-columns: 1fr 1fr; 
            grid-auto-flow: column; 
            height: 100%;
        }

        .hour-row {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            min-height: 0; 
        }

        .hour-row:nth-child(n+13) { border-left: 1px solid var(--border-color); }

        .time-label {
            width: 24px; 
            padding: 4px;
            text-align: center; 
            color: var(--text-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; 
            background-color: var(--bg-color);
            z-index: 2; 
        }

        .content-area {
            flex-grow: 1;
            position: relative;
            overflow: hidden; 
        }

        .hour-input {
            width: 160%; 
            height: 160%; 
            transform: scale(0.625);
            transform-origin: top left;
            font-size: 16px !important; 
            background: transparent;
            border: none;
            color: var(--text-primary);
            padding: 0 10px; 
            outline: none;
            border-radius: 0;
            -webkit-appearance: none;
        }

        .hour-input::placeholder {
            color: var(--text-secondary);
            opacity: 0.3;
        }

        #current-time-line {
            position: absolute;
            left: 0;
            right: 0;
            height: 1px;
            background-color: var(--red-line);
            z-index: 10;
            pointer-events: none;
            display: none; 
        }

        #current-time-line::before {
            content: '';
            position: absolute;
            left: -3px;
            top: -3px;
            width: 7px;
            height: 7px;
            background-color: var(--red-line);
            border-radius: 50%;
        }

        /* Generic List View & Forms */
        .list-view {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            flex: 1;
        }

        .view-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .view-title {
            font-size: 14px;
            font-weight: bold;
            color: var(--accent-color);
            text-transform: uppercase;
        }

        /* Horizontal Tabs for Categories/Labels */
        .category-tabs-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            flex: 1;
            padding-right: 12px;
            scrollbar-width: none; 
        }
        .category-tabs-container::-webkit-scrollbar {
            display: none; 
        }

        .category-tab {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-primary);
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .category-tab.active {
            background-color: var(--tab-color, var(--accent-color));
            border-color: var(--tab-color, var(--accent-color));
            color: #000;
        }

        .view-list {
            list-style: none;
        }

        .list-item {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .list-item a, .list-item .item-title {
            color: var(--text-primary);
            text-decoration: none;
            font-size: 13px;
            line-height: 1.4;
            display: flex;
            align-items: center;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .list-item .item-desc {
            color: var(--text-primary);
            font-size: 11px;
            line-height: 1.4;
            margin-bottom: 6px;
        }

        .list-item .item-meta {
            font-size: 10px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .item-label-badge {
            font-size: 8px;
            padding: 2px 6px;
            border-radius: 8px;
            font-weight: bold;
            color: #000;
            display: inline-block;
            margin-bottom: 4px;
        }

        .loading-text {
            padding: 12px;
            color: var(--text-secondary);
            font-size: 12px;
            text-align: center;
        }

        /* Form Styles */
        .form-container {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--surface-color);
            display: none;
        }

        .form-input {
            width: 100%;
            background-color: var(--bg-color);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 8px;
            margin-bottom: 8px;
            outline: none;
            font-size: 12px;
        }

        .color-picker-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .color-picker-input {
            background: none;
            border: none;
            cursor: pointer;
            width: 24px;
            height: 24px;
            padding: 0;
            border-radius: 4px;
            outline: none;
        }

        textarea.form-input {
            resize: vertical;
            min-height: 60px;
        }

        .form-actions {
            display: flex;
            gap: 8px;
        }

        .btn-primary, .btn-secondary {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 11px;
            text-align: center;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: var(--bg-color);
        }

        .btn-secondary {
            background-color: var(--border-color);
            color: var(--text-primary);
        }

        /* Photos View Styles */
        .photos-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            padding: 2px;
        }
        .photo-item {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            cursor: pointer;
            background-color: var(--surface-color);
        }
        .photo-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #000;
            z-index: 99999;
            display: none; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .photo-modal img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .photo-modal-actions {
            position: absolute;
            top: max(env(safe-area-inset-top, 20px), 20px);
            right: 20px;
            display: flex;
            gap: 16px;
            background: rgba(0,0,0,0.5);
            padding: 8px;
            border-radius: 8px;
            z-index: 100000;
        }
        .photo-modal-actions .action-btn {
            color: #fff;
        }

        /* Table styles for Trips */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            color: var(--text-primary);
        }
        .data-table th {
            padding: 8px 6px;
            text-align: left;
            color: var(--accent-color);
            border-bottom: 1px solid var(--border-color);
        }
        .data-table td {
            padding: 12px 6px;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }
        .data-table td:last-child, .data-table th:last-child {
            text-align: right;
        }

    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <button class="action-btn" id="btn-prev"><span class="material-icons">chevron_left</span></button>
            <input type="date" id="date-picker" class="date-input">
            <button class="action-btn" id="btn-next"><span class="material-icons">chevron_right</span></button>
        </div>
        <div class="header-right">
            <div id="day-count" class="day-count-square" title="Days since Jan 21, 1989"></div>
            <div id="week-number" class="week-square" title="Week of the year"></div>
            <span id="current-date-text"></span>
            <button class="action-btn" id="btn-today"><span class="material-icons">today</span></button>
        </div>
    </header>

    <div id="tabs-bar">
        <div class="tab-item active" data-target="calendar-view">
            <span class="material-icons">calendar_today</span>
            <span class="tab-label">Calendar</span>
        </div>
        <div class="tab-item" data-target="news-view">
            <span class="material-icons">article</span>
            <span class="tab-label">News</span>
        </div>
        <div class="tab-item" data-target="email-view">
            <span class="material-icons">email</span>
            <span class="tab-label">Email</span>
        </div>
        <div class="tab-item" data-target="trips-view">
            <span class="material-icons">commute</span>
            <span class="tab-label">Trips</span>
        </div>
        <div class="tab-item" data-target="photos-view">
            <span class="material-icons">photo_library</span>
            <span class="tab-label">Photos</span>
        </div>
    </div>

    <!-- CALENDAR VIEW -->
    <div id="calendar-view" class="view-container active">
        <div id="sleek-bar">
            <div id="weekdays">
                <span class="weekday" data-day="1">M</span>
                <span class="weekday" data-day="2">T</span>
                <span class="weekday" data-day="3">W</span>
                <span class="weekday" data-day="4">T</span>
                <span class="weekday" data-day="5">F</span>
                <span class="weekday" data-day="6">S</span>
                <span class="weekday" data-day="0">S</span>
            </div>
            <div id="real-time-clock">00:00</div>
        </div>

        <div id="timeline">
            <div id="timeline-inner">
                <!-- Hours generated via JS -->
            </div>
        </div>
    </div>

    <!-- NEWS VIEW -->
    <div id="news-view" class="view-container list-view">
        <div class="view-header" style="padding: 10px 12px; gap: 4px;">
            <div class="category-tabs-container" id="news-category-tabs">
                <!-- Injected via JS -->
            </div>
            <button class="action-btn" id="btn-add-news-topic" title="Add Topic">
                <span class="material-icons" style="color:var(--accent-color);">add</span>
            </button>
            <button class="action-btn" id="btn-refresh-news" title="Refresh News">
                <span class="material-icons" style="color:var(--text-primary);">refresh</span>
            </button>
        </div>

        <div class="form-container" id="news-topic-form">
            <input type="text" id="news-topic-input" class="form-input" placeholder="Enter custom topic (e.g. Finance)">
            <div class="form-actions">
                <button class="btn-secondary" id="btn-cancel-topic">Cancel</button>
                <button class="btn-primary" id="btn-save-topic">Add Topic</button>
            </div>
        </div>

        <ul class="view-list" id="news-list">
            <div class="loading-text">Loading headlines...</div>
        </ul>
    </div>

    <!-- EMAIL VIEW -->
    <div id="email-view" class="view-container list-view">
        <div class="view-header" style="flex-direction: column; align-items: stretch; gap: 8px; padding: 10px 12px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div class="view-title">Emails</div>
                <button class="action-btn" id="btn-show-email-form"><span class="material-icons" style="color:var(--accent-color);">add_circle</span></button>
            </div>
            <div class="category-tabs-container" id="email-category-tabs">
                <!-- Dynamically populated labels -->
            </div>
        </div>
        
        <div class="form-container" id="email-form">
            <div style="display: flex; gap: 8px;">
                <select id="email-direction" class="form-input" style="width: auto; padding-right: 2px;">
                    <option value="To">To</option>
                    <option value="From">From</option>
                </select>
                <input type="text" id="email-to-from" class="form-input" placeholder="Email Address" style="flex: 1;">
            </div>
            <input type="text" id="email-subject" class="form-input" placeholder="Subject">
            
            <div style="display: flex; gap: 8px;">
                <datalist id="email-labels-list"></datalist>
                <input type="text" id="email-label" class="form-input" list="email-labels-list" placeholder="Label (e.g., Work)" style="flex: 1;" autocomplete="off">
                <div class="color-picker-row">
                    <input type="color" id="email-label-color" class="color-picker-input" value="#03a9f4">
                </div>
            </div>

            <textarea id="email-body" class="form-input" placeholder="Body..."></textarea>
            
            <div class="form-actions">
                <button class="btn-secondary" id="btn-cancel-email">Cancel</button>
                <button class="btn-primary" id="btn-save-email">Save Email</button>
            </div>
        </div>

        <ul class="view-list" id="email-list">
            <div class="loading-text">Loading emails...</div>
        </ul>
    </div>

    <!-- TRIPS VIEW -->
    <div id="trips-view" class="view-container list-view">
        <div class="view-header">
            <div class="view-title">Trips</div>
            <button class="action-btn" id="btn-show-trip-form">
                <span class="material-icons" style="color:var(--accent-color);">add_circle</span>
            </button>
        </div>

        <div class="form-container" id="trip-form">
            <input type="text" id="trip-start" class="form-input" placeholder="Start Location">
            <input type="text" id="trip-end" class="form-input" placeholder="End Location">
            
            <div style="display: flex; gap: 8px; margin-bottom: 8px; align-items: center;">
                <input type="date" id="trip-date" class="form-input" style="flex: 1; margin-bottom: 0;">
                <div class="color-picker-row" style="margin-bottom: 0;">
                    <input type="color" id="trip-color" class="color-picker-input" value="#4caf50">
                </div>
            </div>
            
            <div class="form-actions">
                <button class="btn-secondary" id="btn-cancel-trip">Cancel</button>
                <button class="btn-primary" id="btn-save-trip">Save Trip</button>
            </div>
        </div>

        <div style="padding: 12px; overflow-x: auto;">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Start</th>
                        <th>End</th>
                        <th>Date</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="trips-table-body">
                    <tr><td colspan="4" class="loading-text">Loading trips...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- PHOTOS VIEW -->
    <div id="photos-view" class="view-container list-view">
        <div class="view-header">
            <div class="view-title">Photos</div>
            <input type="file" id="photo-upload-input" accept="image/*" multiple style="display: none;">
            <button class="action-btn" id="btn-add-photo">
                <span class="material-icons" style="color:var(--accent-color);">add_photo_alternate</span>
            </button>
        </div>
        <div class="photos-grid" id="photos-grid">
            <!-- Photos appended here via JS -->
        </div>
        <div id="photos-empty-state" class="loading-text" style="display: none;">No photos added yet.</div>
    </div>

    <!-- Fullscreen Photo Modal -->
    <div class="photo-modal" id="photo-modal">
        <div class="photo-modal-actions">
            <button class="action-btn" id="btn-delete-photo"><span class="material-icons" style="color:var(--red-line);">delete</span></button>
            <button class="action-btn" id="btn-close-modal"><span class="material-icons">close</span></button>
        </div>
        <img id="photo-modal-img" src="" alt="Full size photo">
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, get, child, remove, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBWPCkYNw7gT_T7kcwbp5laZgIHac18bvE",
            authDomain: "expandlf.firebaseapp.com",
            databaseURL: "https://expandlf-default-rtdb.firebaseio.com",
            projectId: "expandlf",
            storageBucket: "expandlf.firebasestorage.app",
            messagingSenderId: "890066961009",
            appId: "1:890066961009:web:3a2ed1e7c2cf797f3751d0",
            measurementId: "G-QPRSX7ZVZ5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const datePicker = document.getElementById('date-picker');
        const currentDateText = document.getElementById('current-date-text');
        const weekNumberText = document.getElementById('week-number');
        const dayCountText = document.getElementById('day-count');
        const timelineInner = document.getElementById('timeline-inner');
        
        let selectedDateStr = "";
        let saveTimeout = null;
        
        let newsLoaded = false;
        let emailsLoaded = false;
        let photosLoaded = false;
        let tripsLoaded = false;

        let timeLineElement = document.createElement('div');
        timeLineElement.id = 'current-time-line';

        // -------------------------
        // UI TABS LOGIC
        // -------------------------
        document.querySelectorAll('.tab-item').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.view-container').forEach(v => v.classList.remove('active'));

                tab.classList.add('active');
                const targetView = tab.getAttribute('data-target');
                document.getElementById(targetView).classList.add('active');

                if (targetView === 'news-view' && !newsLoaded) {
                    initNews();
                } else if (targetView === 'email-view' && !emailsLoaded) {
                    loadEmails();

        function compressImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800; 
                        const MAX_HEIGHT = 800;
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_WIDTH) {
                                height *= MAX_WIDTH / width;
                                width = MAX_WIDTH;
                            }
                        } else {
                            if (height > MAX_HEIGHT) {
                                width *= MAX_HEIGHT / height;
                                height = MAX_HEIGHT;
                            }
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6));
                    };
                    img.onerror = reject;
                };
                reader.onerror = reject;
            });
        }

        photoUploadInput.addEventListener('change', async (e) => {
            const files = e.target.files;
            if (!files || files.length === 0) return;

            for (let file of files) {
                try {
                    const compressedBase64 = await compressImage(file);
                    localPhotos.unshift({ id: Date.now() + Math.random(), data: compressedBase64 });
                } catch (err) {
                    console.error("Error processing image:", err);
                }
            }
            savePhotosToLocalStorage();
            renderPhotos();
            photoUploadInput.value = '';

        function formatDateForInput(d) {
            return `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`;
        }

        function getWeekNumber(d) {
            d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        }

        function updateDateDisplay(dateStr) {
            const [y, m, d] = dateStr.split('-');
            const dateObj = new Date(y, m - 1, d);
            
            weekNumberText.innerText = getWeekNumber(dateObj);

            const baseDateUTC = Date.UTC(1989, 0, 21);
            const targetDateUTC = Date.UTC(dateObj.getFullYear(), dateObj.getMonth(), dateObj.getDate());
            const daysSince = Math.floor((targetDateUTC - baseDateUTC) / (1000 * 60 * 60 * 24));
            dayCountText.innerText = daysSince;

            const options = { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' };
            currentDateText.innerText = dateObj.toLocaleDateString('en-US', options);

            document.querySelectorAll('.weekday').forEach(el => el.classList.remove('active'));
            const dayOfWeek = dateObj.getDay(); 
            const activeSpan = document.querySelector(`.weekday[data-day="${dayOfWeek}"]`);
            if (activeSpan) activeSpan.classList.add('active');
        }

        function renderHours() {
            for (let hour = 0; hour < 24; hour++) {
                let row = document.createElement('div');
                row.className = 'hour-row';
                
                let timeLabel = document.createElement('div');
                timeLabel.className = 'time-label';
                timeLabel.innerText = `${hour}`; 
                
                let contentArea = document.createElement('div');
                contentArea.className = 'content-area';
                contentArea.id = `content-${hour}`; 

                let input = document.createElement('input');
                input.type = 'text';
                input.className = 'hour-input';
                input.id = `input-${hour}`;
                input.placeholder = '...';
                
                input.addEventListener('input', () => {
                    clearTimeout(saveTimeout);
                    saveTimeout = setTimeout(() => {
                        saveData();
                    }, 500);
                });

                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') input.blur(); 
                });

                contentArea.appendChild(input);
                row.appendChild(timeLabel);
                row.appendChild(contentArea);
                timelineInner.appendChild(row);
            }
        }

        function saveData() {
            let dayData = {};
            let hasData = false;

            for (let hour = 0; hour < 24; hour++) {
                let val = document.getElementById(`input-${hour}`).value;
                if (val.trim() !== "") {
                    dayData[hour] = val;
                    hasData = true;
                }
            }
            
            const dbRef = ref(db, 'calendar/' + selectedDateStr);
            const request = hasData ? set(dbRef, dayData) : remove(dbRef);
            request.catch(console.error);
        }

        function loadData() {
            for (let hour = 0; hour < 24; hour++) {
                let el = document.getElementById(`input-${hour}`);
                if (el) el.value = "";
            }
            
            get(child(ref(db), `calendar/${selectedDateStr}`)).then((snapshot) => {
                if (snapshot.exists()) {
                    let dayData = snapshot.val();
                    for (let hour in dayData) {
                        let el = document.getElementById(`input-${hour}`);
                        if (el) el.value = dayData[hour];
                    }
                }
            }).catch(console.error);
        }

        function changeDateByOffset(offsetDays) {
            const [y, m, d] = selectedDateStr.split('-');
            const dateObj = new Date(y, m - 1, d);
            dateObj.setDate(dateObj.getDate() + offsetDays);
            
            const newDateStr = formatDateForInput(dateObj);
            
            clearTimeout(saveTimeout);
            saveData();

            selectedDateStr = newDateStr;
            datePicker.value = selectedDateStr;
            updateDateDisplay(selectedDateStr);
            loadData();
            updateCurrentTimeLine();
        }

        datePicker.addEventListener('change', (e) => {
            const newDateStr = e.target.value;
            if (!newDateStr) {
                datePicker.value = selectedDateStr;
                return;
            }
            
            clearTimeout(saveTimeout);
            saveData();

            selectedDateStr = newDateStr;
            updateDateDisplay(selectedDateStr);
            loadData();
            updateCurrentTimeLine(); 
        });

        document.getElementById('btn-prev').addEventListener('click', () => changeDateByOffset(-1));
        document.getElementById('btn-next').addEventListener('click', () => changeDateByOffset(1));

        function updateCurrentTimeLine() {
            const todayStr = formatDateForInput(new Date());
            if (selectedDateStr !== todayStr) {
                timeLineElement.style.display = 'none';
                return;
            }

            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            
            const contentArea = document.getElementById(`content-${hours}`);
            if (contentArea) {
                contentArea.appendChild(timeLineElement);
                timeLineElement.style.top = `${(minutes / 60) * 100}%`;
                timeLineElement.style.display = 'block'; 
            }
        }

        function updateRealTimeClock() {

            document.getElementById('real-time-clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }

        function goToToday() {
            const today = new Date();
            const todayStr = formatDateForInput(today);

            if (selectedDateStr !== todayStr) {
                clearTimeout(saveTimeout);
                saveData(); 
                selectedDateStr = todayStr;
                datePicker.value = selectedDateStr;
                updateDateDisplay(selectedDateStr);
                loadData();
                updateCurrentTimeLine();
            }
        }

        document.getElementById('btn-today').addEventListener('click', goToToday);

        // Init
        renderHours(); 

        let today = new Date();
        selectedDateStr = formatDateForInput(today);
        datePicker.value = selectedDateStr;
        updateDateDisplay(selectedDateStr);

        updateCurrentTimeLine();
        updateRealTimeClock();
        loadData(); 
        
        setInterval(updateCurrentTimeLine, 60000);
        setInterval(updateRealTimeClock, 1000);
    </script>
