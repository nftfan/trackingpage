<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Compact Flat Calendar & Tracker</title>
    
    <!-- PWA & Mobile App Meta Tags -->
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tracker">

    <!-- Performance hints -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- PWA Manifest & Icons -->
    <link rel="manifest" href="https://raw.githubusercontent.com/leuvenfd/coinfun/refs/heads/main/and.json">
    <link rel="apple-touch-icon" href="https://www.iconpacks.net/icons/2/free-time-icon-3487-thumb.png">
    <link rel="apple-touch-startup-image" href="https://www.iconpacks.net/icons/2/free-time-icon-3487-thumb.png">

    <!-- Google Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --border-color: #2d2d2d;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent-color: #bb86fc;
            --red-line: #ff3b30;
            
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-size: 10px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            box-shadow: none !important;
            text-shadow: none !important;
        }

        body, html {
            height: 100dvh; 
            background-color: var(--bg-color);
            color: var(--text-primary);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            overscroll-behavior-y: none;
        }

        .material-icons {
            font-size: 18px;
            color: var(--text-secondary);
        }

        /* Top Header */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--surface-color);
            padding: calc(6px + var(--safe-top)) 8px 6px 8px;
        }

        .header-left, .header-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .date-input {
            background-color: var(--bg-color);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 4px;
            outline: none;
            color-scheme: dark;
            text-transform: uppercase;
        }

        .week-square {
            background-color: var(--border-color);
            color: var(--text-primary);
            border-radius: 2px;
            padding: 2px 4px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 16px;
        }

        #current-date-text {
            color: var(--text-secondary);
            margin-right: 2px;
            font-weight: 600;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 4px;
            -webkit-tap-highlight-color: transparent;
        }

        /* Sleek Days Sub-header */
        #sleek-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
            padding: 2px 8px 4px 8px;
        }

        #sleek-bar * {
            font-size: 7px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        #weekdays {
            display: flex;
            gap: 12px;
            padding-left: 4px;
        }

        .weekday {
            color: var(--text-secondary);
        }

        .weekday.active {
            color: var(--red-line);
        }

        #real-time-clock {
            color: var(--text-primary);
        }

        /* Two-Column Grid Timeline */
        #timeline {
            flex: 1;
            overflow: hidden; 
            background-color: var(--bg-color);
            position: relative;
            padding-bottom: var(--safe-bottom);
        }

        #timeline-inner {
            display: grid;
            grid-template-rows: repeat(12, 1fr); 
            grid-template-columns: 1fr 1fr; 
            grid-auto-flow: column; 
            height: 100%;
        }

        .hour-row {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            min-height: 0; 
            background-color: var(--bg-color);
        }

        .hour-row:nth-child(n+13) {
            border-left: 1px solid var(--border-color);
        }

        .time-label {
            width: 24px; 
            padding: 4px;
            text-align: center; 
            color: var(--text-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; 
            background-color: var(--bg-color);
            z-index: 2; 
        }

        .content-area {
            flex-grow: 1;
            position: relative;
            overflow: hidden; 
        }

        /* iOS Anti-Zoom Trick */
        .hour-input {
            width: 160%; 
            height: 160%; 
            transform: scale(0.625);
            transform-origin: top left;
            font-size: 16px !important; 
            background: transparent;
            border: none;
            color: var(--text-primary);
            padding: 0 10px; 
            outline: none;
            border-radius: 0;
            -webkit-appearance: none;
        }

        .hour-input::placeholder {
            color: var(--text-secondary);
            opacity: 0.3;
        }

        /* Current Time Line */
        #current-time-line {
            position: absolute;
            left: 0;
            right: 0;
            height: 1px;
            background-color: var(--red-line);
            z-index: 10;
            pointer-events: none;
            display: none; 
        }

        #current-time-line::before {
            content: '';
            position: absolute;
            left: -3px;
            top: -3px;
            width: 7px;
            height: 7px;
            background-color: var(--red-line);
            border-radius: 50%;
        }

    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <input type="date" id="date-picker" class="date-input">
        </div>
        <div class="header-right">
            <div id="week-number" class="week-square"></div>
            <span id="current-date-text"></span>
            <button class="action-btn" id="btn-today"><span class="material-icons">today</span></button>
        </div>
    </header>

    <div id="sleek-bar">
        <div id="weekdays">
            <span class="weekday" data-day="1">M</span>
            <span class="weekday" data-day="2">T</span>
            <span class="weekday" data-day="3">W</span>
            <span class="weekday" data-day="4">T</span>
            <span class="weekday" data-day="5">F</span>
            <span class="weekday" data-day="6">S</span>
            <span class="weekday" data-day="0">S</span>
        </div>
        <div id="real-time-clock">00:00</div>
    </div>

    <div id="timeline">
        <div id="timeline-inner">
            <!-- Hours generated via JS -->
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, get, child, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBWPCkYNw7gT_T7kcwbp5laZgIHac18bvE",
            authDomain: "expandlf.firebaseapp.com",
            databaseURL: "https://expandlf-default-rtdb.firebaseio.com",
            projectId: "expandlf",
            storageBucket: "expandlf.firebasestorage.app",
            messagingSenderId: "890066961009",
            appId: "1:890066961009:web:3a2ed1e7c2cf797f3751d0",
            measurementId: "G-QPRSX7ZVZ5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const datePicker = document.getElementById('date-picker');
        const currentDateText = document.getElementById('current-date-text');
        const weekNumberText = document.getElementById('week-number');
        const timelineInner = document.getElementById('timeline-inner');
        
        let selectedDateStr = "";
        let saveTimeout = null;

        let timeLineElement = document.createElement('div');
        timeLineElement.id = 'current-time-line';

        function formatDateForInput(d) {
            return `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`;
        }

        function getWeekNumber(d) {
            d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        }

        function updateDateDisplay(dateStr) {
            const [y, m, d] = dateStr.split('-');
            const dateObj = new Date(y, m - 1, d);
            
            weekNumberText.innerText = getWeekNumber(dateObj);

            const options = { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' };
            currentDateText.innerText = dateObj.toLocaleDateString('en-US', options);

            // Update Sleek Bar Day Indicator
            document.querySelectorAll('.weekday').forEach(el => el.classList.remove('active'));
            const dayOfWeek = dateObj.getDay(); 
            const activeSpan = document.querySelector(`.weekday[data-day="${dayOfWeek}"]`);
            if (activeSpan) activeSpan.classList.add('active');
        }

        function renderHours() {
            for (let hour = 0; hour < 24; hour++) {
                let row = document.createElement('div');
                row.className = 'hour-row';
                
                let timeLabel = document.createElement('div');
                timeLabel.className = 'time-label';
                timeLabel.innerText = `${hour}`; 
                
                let contentArea = document.createElement('div');
                contentArea.className = 'content-area';
                contentArea.id = `content-${hour}`; 

                let input = document.createElement('input');
                input.type = 'text';
                input.className = 'hour-input';
                input.id = `input-${hour}`;
                input.placeholder = '...';
                
                input.addEventListener('input', () => {
                    clearTimeout(saveTimeout);
                    saveTimeout = setTimeout(() => {
                        saveData();
                    }, 500);
                });

                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') input.blur(); 
                });

                contentArea.appendChild(input);
                row.appendChild(timeLabel);
                row.appendChild(contentArea);
                timelineInner.appendChild(row);
            }
        }

        function saveData() {
            let dayData = {};
            let hasData = false;

            for (let hour = 0; hour < 24; hour++) {
                let val = document.getElementById(`input-${hour}`).value;
                if (val.trim() !== "") {
                    dayData[hour] = val;
                    hasData = true;
                }
            }
            
            const dbRef = ref(db, 'calendar/' + selectedDateStr);
            const request = hasData ? set(dbRef, dayData) : remove(dbRef);
            request.catch(console.error);
        }

        function loadData() {
            for (let hour = 0; hour < 24; hour++) {
                let el = document.getElementById(`input-${hour}`);
                if (el) el.value = "";
            }
            
            get(child(ref(db), `calendar/${selectedDateStr}`)).then((snapshot) => {
                if (snapshot.exists()) {
                    let dayData = snapshot.val();
                    for (let hour in dayData) {
                        let el = document.getElementById(`input-${hour}`);
                        if (el) el.value = dayData[hour];
                    }
                }
            }).catch(console.error);
        }

        datePicker.addEventListener('change', (e) => {
            const newDateStr = e.target.value;
            if (!newDateStr) {
                datePicker.value = selectedDateStr;
                return;
            }
            
            clearTimeout(saveTimeout);
            saveData();

            selectedDateStr = newDateStr;
            updateDateDisplay(selectedDateStr);
            loadData();
            updateCurrentTimeLine(); 
        });

        function updateCurrentTimeLine() {
            const todayStr = formatDateForInput(new Date());
            if (selectedDateStr !== todayStr) {
                timeLineElement.style.display = 'none';
                return;
            }

            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            
            const contentArea = document.getElementById(`content-${hours}`);
            if (contentArea) {
                contentArea.appendChild(timeLineElement);
                timeLineElement.style.top = `${(minutes / 60) * 100}%`;
                timeLineElement.style.display = 'block'; 
            }
        }

        function updateRealTimeClock() {
            const now = new Date();
            document.getElementById('real-time-clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }

        function goToToday() {
            const today = new Date();
            const todayStr = formatDateForInput(today);

            if (selectedDateStr !== todayStr) {
                clearTimeout(saveTimeout);
                saveData(); 
                selectedDateStr = todayStr;
                datePicker.value = selectedDateStr;
                updateDateDisplay(selectedDateStr);
                loadData();
                updateCurrentTimeLine();
            }
        }

        document.getElementById('btn-today').addEventListener('click', goToToday);

        // Init
        renderHours(); 

        let today = new Date();
        selectedDateStr = formatDateForInput(today);
        datePicker.value = selectedDateStr;
        updateDateDisplay(selectedDateStr);

        updateCurrentTimeLine();
        updateRealTimeClock();
        loadData(); 
        
        setInterval(updateCurrentTimeLine, 60000);
        setInterval(updateRealTimeClock, 1000); // Tick clock every second
    </script>
</body>
</html>
