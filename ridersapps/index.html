
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>LeuvenPoint - Live Tasks</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f12" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <style>
    :root { --bg:#0b0b0e; --panel:#141419; --muted:#8b8b95; --text:#f2f2f7; --accent:#10b981; --accent-2:#059669; --radius-lg:12px; --radius-md:10px; }
    
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{min-height:100vh;background:var(--bg);color:var(--text);font:14px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;font-weight:400;overflow-y:auto;scroll-behavior:smooth;}
    .app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;gap:7px;padding:env(safe-area-inset-top,6px) 10px env(safe-area-inset-bottom,6px);}
   
    /* Loaders & Headers */
    .loader-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; transition: opacity 0.3s ease; }
    .loader-overlay.hidden { opacity: 0; pointer-events: none; }
    .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-left-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
    .loader-text { color: var(--muted); font-size: 13px; font-weight:400; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    
    header{display:flex;align-items:center;gap:8px;padding:7px 11px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius-md);flex-shrink:0;}
    .logo{width:26px;height:26px;display:grid;place-items:center;background:radial-gradient(120% 120% at 20% 20%,#3b82f6,#10b981);border-radius:7px;flex-shrink:0;}
    .header-title{font-size:14px;flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; letter-spacing: 0.5px;}
    .user-pill{font-size:11px;color:#a7f3d0;background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);padding:2px 7px;border-radius:999px;display:none;align-items:center;gap:5px;flex-shrink:0;}
    .user-pill button{appearance:none;border:0;background:transparent;color:#6ee7b7;cursor:pointer;font-size:11px;outline:none;font-weight:400;}
   
    /* Map */
    .map-card{border-radius:var(--radius-lg);overflow:hidden;border:1px solid rgba(255,255,255,.08);background:#0f0f12;flex-shrink:0; position:relative;}
    #map{height:250px;width:100%;}
    .leaflet-container{background:#0f0f12;outline:none;font-family:inherit;}
    .leaflet-control-attribution{display:none!important;}

    /* White Rectangle Tooltip Popups */
    .map-note-tooltip {
      background: #ffffff !important;
      border: none !important;
      color: #111111 !important;
      font-size: 11px !important;
      font-weight: 400 !important;
      border-radius: 6px !important;
      padding: 8px 12px !important;
      white-space: pre-wrap !important;
      word-wrap: break-word !important;
      min-width: 150px !important;
      max-width: 200px !important;
      height: auto !important;
      text-align: left !important;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15) !important;
      line-height: 1.4 !important;
      text-transform: none !important;
      letter-spacing: 0 !important;
    }
    .map-note-tooltip.pickup-tooltip { border-left: 3px solid #ef4444 !important; }
    .map-note-tooltip.dropoff-tooltip { border-left: 3px solid #10b981 !important; }
    .leaflet-tooltip-top:before { border-top-color: #ffffff !important; }
    .leaflet-tooltip-bottom:before { border-bottom-color: #ffffff !important; }

    /* Dot Icons & Animations */
    .dot-icon-container { position: relative; width: 60px; height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
    .radar-pulse { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 30px; height: 30px; background: rgba(59,130,246,0.3); border-radius: 50%; animation: radar-ping 1.5s cubic-bezier(0, 0, 0.2, 1) infinite; z-index: 1; }
    @keyframes radar-ping { 75%, 100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; } }
    
    .dot-circle { width: 14px; height: 14px; border-radius: 50%; border: 2.5px solid #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.4); z-index: 2; position: relative; }
    .dot-red { background-color: #ef4444; }
    .dot-green { background-color: #10b981; }
    .dot-blue { background-color: #3b82f6; width: 16px; height: 16px; }

    /* Controls & Buttons */
    .btn-action { 
      appearance: none; cursor: pointer; border-radius: 10px; padding: 14px 8px;
      display: flex; align-items: center; justify-content: center; gap:6px;
      color: #ffffff; font-size: 14px; letter-spacing: 0.5px; text-transform: uppercase;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); outline: none; border: none; font-weight:400; width: 100%;
    }
    .btn-action:active:not([disabled]) { transform: scale(0.95); filter: brightness(1.2); }
    .btn-action[disabled] { opacity: 0.4; cursor: not-allowed; transform: none; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.05); color: #888; }
    .btn-primary { background: linear-gradient(135deg,var(--accent),var(--accent-2)); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); }
    
    /* Cards Layout */
    .orders-section { display: flex; flex-direction: column; margin-top: 4px; }
    .orders-header { padding: 8px 10px; font-size: 13px; color: #e5e7ff; display: flex; justify-content: space-between; align-items: center; letter-spacing:0.5px; text-transform: uppercase;}
    .orders-header span:last-child { font-size: 11px; color: var(--muted); text-transform: none; letter-spacing: 0; }
    .orders-list { display: flex; flex-direction: column; gap: 10px; padding-bottom: 20px;}
    
    .order-card { 
      background: rgba(255,255,255,0.03); 
      border: 1px solid rgba(255,255,255,0.07); 
      border-radius: var(--radius-md); 
      padding: 14px; 
      display: flex; 
      flex-direction: column; 
      gap: 12px;
      transition: background 0.3s;
    }
    .order-card:hover { background: rgba(255,255,255,0.05); }
    .order-card.active-card { border-color: rgba(16, 185, 129, 0.3); background: rgba(16, 185, 129, 0.05); }

    /* Completed Card Styles */
    .completed-card {
      background: rgba(20, 20, 25, 0.4); 
      border-color: rgba(255, 255, 255, 0.02);
    }
    .completed-card .order-id, 
    .completed-card .pin-badge, 
    .completed-card .tl-done, 
    .completed-card .tl-issue, 
    .completed-card .tl-time,
    .completed-card .card-note-label, 
    .completed-card span {
      color: #71717a !important; 
    }
    .completed-card .pin-badge {
      background: rgba(255,255,255,0.03) !important;
      border-color: transparent !important;
      padding: 3px 8px; border-radius: 6px; font-size: 11px;
    }

    .order-card-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; }
    .order-id { font-size: 16px; color: #a5b4fc; letter-spacing: 1px; font-family: monospace; }
    .status-badge { display: inline-block; padding: 3px 8px; border-radius: 6px; font-size: 11px; letter-spacing: 0.5px; text-transform: uppercase; }
    .status-pending { background: rgba(245, 158, 11, 0.15); color: #fcd34d; border: 1px solid rgba(245, 158, 11, 0.3); }

    /* Timeline inside Card */
    .timeline { display: flex; flex-direction: column; gap: 8px; }
    .tl-step { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; }
    .tl-done { color: #10b981; }
    .tl-active { color: #60a5fa; animation: alert-pulse 1.5s infinite alternate ease-in-out; }
    .tl-time { color: var(--muted); font-family: monospace; font-size: 10px; margin-left: auto; padding-left: 10px; }

    @keyframes alert-pulse { 0% { opacity: 0.6; } 100% { opacity: 1; text-shadow: 0 0 8px currentColor; } }
    
    /* Notes inside Card */
    .card-notes-container { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
    .card-note-box { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; gap: 6px; }
    .card-note-row { display: flex; gap: 8px; color: #cbd5ff; line-height: 1.4; align-items: flex-start; font-size: 12px;}
    .card-note-label { text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }

    .chat-badge { background: #ef4444; color: #fff; border-radius: 50%; padding: 2px 6px; font-size: 10px; line-height: 1; display: inline-flex; align-items: center; justify-content: center;}

    /* Pin Input Group */
    .pin-input-group { display: flex; gap: 8px; margin-top: 4px; }
    .pin-input { flex: 1; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: #fff; font-size: 14px; border-radius: 8px; padding: 0 12px; outline: none; font-family: monospace; letter-spacing: 2px; text-align: center;}
    .pin-input:focus { border-color: var(--accent); }

    /* Modals & Inputs */
    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:9998;}
    .modal-backdrop.show{display:flex;}
    .modal{width:min(90vw,340px);background:var(--panel);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:20px; display: flex; flex-direction: column;}
    .btn-clear { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color:#fff; }
    .btn-modal{height:44px;border-radius:10px;border:0;cursor:pointer;padding:0 16px;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent-2));outline:none; font-size:14px; letter-spacing:0.5px;}
    .btn-modal:active { transform: scale(0.95); }
    .error{color:#ff8a8a;font-size:12px;min-height:14px;padding-top:5px; text-align:center;}
    
    .toast{position:fixed;z-index:9999;left:50%;bottom:22px;transform:translateX(-50%);background:#1a1a22;border:1px solid rgba(255,255,255,.1);padding:10px 18px;border-radius:10px;color:var(--text);font-size:14px;opacity:0;transition:opacity .2s; letter-spacing:0.5px;}
    .toast.show{opacity:1;}

    /* Chat Modal */
    .chat-modal { height: 60vh; max-height: 450px; padding: 15px; }
    .chat-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,.1); padding-bottom: 12px; margin-bottom: 12px; font-size:15px; letter-spacing:0.5px;}
    .chat-close { background:transparent; border:none; color:var(--muted); font-size:24px; cursor:pointer; outline:none; line-height:1;}
    .chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-right: 4px; }
    .chat-msg { background: rgba(255,255,255,.05); padding: 10px 14px; border-radius: 12px; font-size: 13px; color: #e5e7ff; max-width: 85%; align-self: flex-start; line-height:1.4;}
    .chat-msg.mine { background: rgba(16,185,129,.2); align-self: flex-end; border-bottom-right-radius: 2px; }
    .chat-msg-meta { font-size: 10px; color: var(--muted); margin-bottom: 4px; letter-spacing:0.3px;}
    .chat-input-area { display: flex; gap: 8px; margin-top: 14px; }
    .chat-input { flex: 1; border-radius: 8px; padding: 0 14px; border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.04); color: var(--text); outline: none; font-size: 14px; text-transform: none;}
    .btn-chat-send { background: linear-gradient(135deg,var(--accent),var(--accent-2)); color: #fff; border: none; padding: 0 18px; border-radius: 8px; cursor: pointer; outline:none; font-size:13px; letter-spacing:0.5px;}
    .btn-chat-send:active { transform: scale(0.95); }
  </style>
</head>
<body>

<div id="loaderOverlay" class="loader-overlay">
  <div class="spinner"></div>
  <div class="loader-text">Connecting to LeuvenPoint...</div>
</div>

<div class="app">
  <!-- Header -->
  <header>
    <div class="logo">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
    </div>
    <div class="header-title">LeuvenPoint Dashboard</div>
    <div id="userPill" class="user-pill">
      <span id="userPillText"></span>
      <button id="changeUserBtn">Logout</button>
    </div>
  </header>

  <!-- Map -->
  <div class="map-card" id="mapCardTop">
    <div id="map"></div>
  </div>

  <!-- Active Task Section (Only shows when user accepted a task) -->
  <div class="orders-section" id="activeDeliverySection" style="display:none;">
    <div class="orders-header">
      <span style="color:#6ee7b7;">Active Task</span>
    </div>
    <div class="orders-list" id="activeOrderList">
      <!-- Active card injected here dynamically -->
    </div>
  </div>

  <!-- Available Tasks Section -->
  <div class="orders-section" id="availableOrdersSection">
    <div class="orders-header">
      <span>Available Tasks</span>
      <span id="availableCount">0 Pending</span>
    </div>
    <div class="orders-list" id="availableOrdersList">
      <div style="text-align:center; padding:30px; color:var(--muted); font-size:13px;">No available tasks nearby.</div>
    </div>
  </div>

  <!-- Completed Tasks & Earnings Section -->
  <div class="orders-section" id="completedOrdersSection">
    <div class="orders-header">
      <span>Completed Tasks</span>
      <span id="earningsTotal" style="color:#10b981; font-weight:bold;">€0.00</span>
    </div>
    <div class="orders-list" id="completedOrdersList">
      <div style="text-align:center; padding:30px; color:var(--muted); font-size:13px;">No completed tasks yet.</div>
    </div>
  </div>

</div>

<div id="toast" class="toast"></div>

<!-- Registration & Login Simple Modal -->
<div id="loginBackdrop" class="modal-backdrop">
  <div class="modal">
    <h2 style="font-size:18px; margin-bottom:4px; font-weight:400; letter-spacing:0.5px;">Tasker Login</h2>
    <p style="font-size:12px;color:var(--muted);margin-bottom:16px;">Enter your Tasker ID (e.g., LP2345) and a password to login or register.</p>

    <!-- Tasker ID Input -->
    <input id="userIdInput" style="width:100%; height:44px; border-radius:10px; padding:0 12px; border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.04); color:var(--text); font-size:15px; outline:none; font-weight:400; margin-bottom:10px; text-transform:uppercase;" type="text" placeholder="Tasker ID (e.g. LP2345)" autocomplete="off" autocapitalize="characters">

    <!-- Password Input -->
    <input id="passwordInput" style="width:100%; height:44px; border-radius:10px; padding:0 12px; border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.04); color:var(--text); font-size:15px; outline:none; font-weight:400; margin-bottom:14px;" type="password" placeholder="Password">

    <div style="display:flex; gap:10px;">
      <button id="btnAuthLogin" class="btn-clear" style="flex:1; border-radius:10px; font-size:14px; cursor:pointer; height:44px; color:#fff;">Login</button>
      <button id="btnAuthRegister" class="btn-modal" style="flex:1;">Register</button>
    </div>
    
    <div id="loginError" class="error"></div>
  </div>
</div>

<!-- Chat Modal -->
<div id="chatBackdrop" class="modal-backdrop">
  <div class="modal chat-modal">
    <div class="chat-header">
      <span>Chat with Requester</span>
      <button id="chatCloseBtn" class="chat-close">&times;</button>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
      <input id="chatInput" class="chat-input" type="text" placeholder="Type a message..." autocomplete="off">
      <button id="chatSendBtn" class="btn-chat-send">Send</button>
    </div>
  </div>
</div>

<!-- Firebase & Leaflet -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { getDatabase, ref, update, onValue, off, push, get, set } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBuBB-Cha7eLG1O7SxOTfFt8e6hVAWjkxI",
    authDomain: "tokentransfer-4a9b3.firebaseapp.com",
    databaseURL: "https://tokentransfer-4a9b3-default-rtdb.firebaseio.com",
    projectId: "tokentransfer-4a9b3",
    storageBucket: "tokentransfer-4a9b3.firebasestorage.app"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // Core State
  let currentUserId = null;
  let allOrdersUnsub = null;
  let riderLocationWatch = null;
  
  let availableOrders = [];
  let completedOrders = [];
  let activeOrder = null;
  
  // Preview State
  let previewOrderId = null;

  // Render Check Caches 
  let currentMapStateStr = null; 
  let lastRenderedActiveStateStr = null;

  // Chat State
  let activeChatPath = null;
  let chatUnsub = null;
  let currentChatPath = null;
  let lastReadTimestamps = JSON.parse(localStorage.getItem('riderChatLastRead') || '{}');

  // DOM Elements
  const loaderOverlay = document.getElementById('loaderOverlay');
  const availableOrdersSection = document.getElementById('availableOrdersSection');
  const availableOrdersList = document.getElementById('availableOrdersList');
  const availableCount = document.getElementById('availableCount');
  
  const activeDeliverySection = document.getElementById('activeDeliverySection');
  const activeOrderList = document.getElementById('activeOrderList');

  const completedOrdersList = document.getElementById('completedOrdersList');
  const earningsTotal = document.getElementById('earningsTotal');

  // Auth Elements
  const loginBackdrop = document.getElementById('loginBackdrop');
  const userIdInput = document.getElementById('userIdInput');
  const passwordInput = document.getElementById('passwordInput');
  const btnAuthLogin = document.getElementById('btnAuthLogin');
  const btnAuthRegister = document.getElementById('btnAuthRegister');
  const loginError = document.getElementById('loginError');

  const chatBackdrop = document.getElementById('chatBackdrop');
  const chatCloseBtn = document.getElementById('chatCloseBtn');
  const chatMessages = document.getElementById('chatMessages');
  const chatInput = document.getElementById('chatInput');
  const chatSendBtn = document.getElementById('chatSendBtn');

  // Map Setup
  const map = L.map('map', { zoomControl:false, attributionControl:false }).setView([50.8, 4.7], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:19 }).addTo(map);
  const mapLayerGroup = L.layerGroup().addTo(map);

  let mapPolyline = null;
  let liveRiderMarker = null;

  function makeDotIcon(colorClass, labelText, pulsing = false) {
    let labelHtml = labelText ? `<div class="compact-label">${labelText}</div>` : '';
    let pulseHtml = pulsing ? `<div class="radar-pulse"></div>` : '';
    return L.divIcon({
      className: '',
      html: `<div class="dot-icon-container">${pulseHtml}<div class="dot-circle ${colorClass}"></div>${labelHtml}</div>`,
      iconSize: [60, 60],
      iconAnchor: [30, 30] 
    });
  }

  function showToast(text) {
    const toast = document.getElementById('toast');
    toast.textContent = text;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  function formatTime(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  function markChatAsRead(path) {
    lastReadTimestamps[path] = Date.now();
    localStorage.setItem('riderChatLastRead', JSON.stringify(lastReadTimestamps));
  }

  // --- Rendering UI ---

  const STATUS_FLOW = [
    { key: 'pending', label: 'Waiting for Tasker' },
    { key: 'started', label: 'Heading to Start Location' },
    { key: 'arrived', label: 'Arrived at Start Location' },
    { key: 'picked_up', label: 'Task in Progress' },
    { key: 'delivered', label: 'Task Completed' }
  ];

  function renderMap() {
    let targetStateStr = activeOrder ? `active_${activeOrder.dbKey}` : `avail_${availableOrders.map(o=>o.dbKey).join(',')}_prev_${previewOrderId}`;
    
    if (currentMapStateStr === targetStateStr) return; 
    currentMapStateStr = targetStateStr;

    mapLayerGroup.clearLayers();
    mapPolyline = null;
    
    if (liveRiderMarker) {
        liveRiderMarker.addTo(mapLayerGroup);
    }

    if (activeOrder) {
      const pIcon = makeDotIcon('dot-red', 'START'); 
      const dIcon = makeDotIcon('dot-green', 'END');

      let pm = L.marker([activeOrder.pickup.lat, activeOrder.pickup.lng], { icon: pIcon }).addTo(mapLayerGroup);
      if(activeOrder.pickup.note) pm.bindTooltip(activeOrder.pickup.note, { permanent: true, direction: 'top', offset: [0, -25], className: 'map-note-tooltip pickup-tooltip' }).openTooltip();

      let dm = L.marker([activeOrder.dropoff.lat, activeOrder.dropoff.lng], { icon: dIcon }).addTo(mapLayerGroup);
      if(activeOrder.dropoff.note) dm.bindTooltip(activeOrder.dropoff.note, { permanent: true, direction: 'top', offset: [0, -25], className: 'map-note-tooltip dropoff-tooltip' }).openTooltip();

      mapPolyline = L.polyline([
        [activeOrder.pickup.lat, activeOrder.pickup.lng],
        [activeOrder.dropoff.lat, activeOrder.dropoff.lng]
      ], { color: '#10b981', weight: 4, dashArray: '8 8', opacity: 0.8 }).addTo(mapLayerGroup);
      
      map.fitBounds(mapPolyline.getBounds(), { padding: [40, 40] });

    } else if (previewOrderId) {
      const po = availableOrders.find(o => o.dbKey === previewOrderId);
      if (po) {
          const pIcon = makeDotIcon('dot-red', 'START', true); 
          const dIcon = makeDotIcon('dot-green', 'END');

          let pm = L.marker([po.pickup.lat, po.pickup.lng], { icon: pIcon }).addTo(mapLayerGroup);
          if(po.pickup.note) pm.bindTooltip(po.pickup.note, { permanent: true, direction: 'top', offset: [0, -25], className: 'map-note-tooltip pickup-tooltip' }).openTooltip();

          let dm = L.marker([po.dropoff.lat, po.dropoff.lng], { icon: dIcon }).addTo(mapLayerGroup);
          if(po.dropoff.note) dm.bindTooltip(po.dropoff.note, { permanent: true, direction: 'top', offset: [0, -25], className: 'map-note-tooltip dropoff-tooltip' }).openTooltip();

          mapPolyline = L.polyline([
              [po.pickup.lat, po.pickup.lng],
              [po.dropoff.lat, po.dropoff.lng]
          ], { color: '#3b82f6', weight: 4, dashArray: '8 8', opacity: 0.8 }).addTo(mapLayerGroup);
          
          map.fitBounds(mapPolyline.getBounds(), { padding: [40, 40] });
      } else {
          previewOrderId = null;
          renderMap(); 
      }
    } else {
      let bounds = [];
      availableOrders.forEach(o => {
         let m = L.marker([o.pickup.lat, o.pickup.lng], { icon: makeDotIcon('dot-red', 'NEW', true) }).addTo(mapLayerGroup);
         m.bindTooltip(`Task: ${o.orderId}`, { permanent: false, direction: 'top', offset: [0, -25], className: 'map-note-tooltip pickup-tooltip' });
         bounds.push([o.pickup.lat, o.pickup.lng]);
      });
      if (bounds.length > 0) {
         map.fitBounds(bounds, { padding: [40, 40] });
      }
    }
  }

  function createNotesHtml(o) {
      let notesHtml = '';
      if (o.pickup.note || o.dropoff.note) {
        notesHtml = `<div class="card-notes-container">`;
        if (o.pickup.note) {
            notesHtml += `
            <div class="card-note-box">
                <span class="card-note-label" style="color:#fca5a5;">Start Location Note</span>
                <div class="card-note-row"><span>${o.pickup.note}</span></div>
            </div>`;
        }
        if (o.dropoff.note) {
            notesHtml += `
            <div class="card-note-box">
                <span class="card-note-label" style="color:#6ee7b7;">End Location Note</span>
                <div class="card-note-row"><span>${o.dropoff.note}</span></div>
            </div>`;
        }
        notesHtml += `</div>`;
      }
      return notesHtml;
  }

  window.previewOrder = function(dbKey) {
      if (previewOrderId === dbKey) {
          previewOrderId = null; 
      } else {
          previewOrderId = dbKey;
      }
      currentMapStateStr = null; 
      renderMap();
      renderAvailableOrders(); 
      
      if (previewOrderId) {
         document.getElementById('mapCardTop').scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
  };

  function renderAvailableOrders() {
    availableCount.textContent = `${availableOrders.length} Pending`;
    availableOrdersList.innerHTML = '';
    
    if(availableOrders.length === 0) {
      availableOrdersList.innerHTML = '<div style="text-align:center; padding:30px; color:var(--muted); font-size:13px;">No available tasks nearby.</div>';
      return;
    }

    availableOrders.forEach(o => {
      const isPreviewing = previewOrderId === o.dbKey;
      const card = document.createElement('div');
      card.className = 'order-card';
      
      card.innerHTML = `
        <div class="order-card-header">
          <span class="order-id">${o.orderId}</span>
          <span class="status-badge status-pending">New Request</span>
        </div>
        ${createNotesHtml(o)}
        <div style="margin-top:8px; display:flex; gap:8px;">
          <button class="btn-action" 
                  style="flex:1; background: ${isPreviewing ? 'rgba(59,130,246,0.15)' : 'rgba(255,255,255,0.05)'}; 
                         border: 1px solid ${isPreviewing ? 'rgba(59,130,246,0.3)' : 'rgba(255,255,255,0.1)'}; 
                         color: ${isPreviewing ? '#93c5fd' : '#fff'}; font-size:12px;" 
                  onclick="window.previewOrder('${o.dbKey}')">
             ${isPreviewing ? 'Hide Map' : 'View on Map'}
          </button>
          <button class="btn-action btn-primary" style="flex:1; font-size:12px;" onclick="window.acceptOrder('${o.customerId}', '${o.dbKey}')">Accept Task</button>
        </div>
      `;
      availableOrdersList.appendChild(card);
    });
  }

  function renderCompletedOrders() {
    completedOrdersList.innerHTML = '';
    
    // Flat Rate €4.50 per task
    const total = completedOrders.length * 4.50;
    earningsTotal.textContent = `€${total.toFixed(2)}`;

    if(completedOrders.length === 0) {
      completedOrdersList.innerHTML = '<div style="text-align:center; padding:30px; color:var(--muted); font-size:13px;">No completed tasks yet.</div>';
      return;
    }

    completedOrders.forEach(o => {
      const card = document.createElement('div');
      card.className = 'order-card completed-card';
      
      card.innerHTML = `
        <div class="order-card-header">
          <span class="order-id">${o.orderId}</span>
          <span class="pin-badge">Earned: €4.50</span>
        </div>
        <div class="timeline">
           <div class="tl-step tl-done">✓ Task Completed <span class="tl-time">${formatTime(o.createdAt)}</span></div>
        </div>
      `;
      completedOrdersList.appendChild(card);
    });
  }

  function renderActiveOrder() {
    if (!activeOrder) {
      activeDeliverySection.style.display = 'none';
      availableOrdersSection.style.display = 'flex';
      lastRenderedActiveStateStr = null;
      activeOrderList.innerHTML = '';
      return;
    }

    const o = activeOrder;
    activeDeliverySection.style.display = 'flex';
    availableOrdersSection.style.display = 'none'; 

    let unreadCount = 0;
    const chatPath = `customerOrders/${o.customerId}/${o.dbKey}/chat`;
    if (o.chat) {
        const lastRead = lastReadTimestamps[chatPath] || 0;
        Object.values(o.chat).forEach(msg => {
            if (msg.sender === 'customer' && msg.timestamp > lastRead) unreadCount++;
        });
    }

    const targetStateStr = `${o.dbKey}_${o.status}_${o.pickup.note}_${o.dropoff.note}`;
    
    if (lastRenderedActiveStateStr === targetStateStr) {
        const badgeEl = document.getElementById('chatBadgeCounter');
        if (badgeEl) {
            badgeEl.style.display = unreadCount > 0 ? 'inline-flex' : 'none';
            badgeEl.textContent = unreadCount;
        }
        return; 
    }
    lastRenderedActiveStateStr = targetStateStr;
    
    activeOrderList.innerHTML = '';
    const card = document.createElement('div');
    card.className = 'order-card active-card';
    
    let timelineHtml = '<div class="timeline">';
    let currentIdx = STATUS_FLOW.findIndex(s => s.key === o.status);
    for(let i = 1; i <= currentIdx; i++) { 
        const step = STATUS_FLOW[i];
        if (i < currentIdx) {
            timelineHtml += `<div class="tl-step tl-done">✓ ${step.label} - DONE</div>`;
        } else {
            timelineHtml += `<div class="tl-step tl-active">➤ ${step.label}... </div>`;
        }
    }
    timelineHtml += '</div>';

    let actionHtml = '';
    if (o.status === 'started') {
       actionHtml = `<button class="btn-action btn-primary" onclick="window.updateOrderStatus('${o.customerId}', '${o.dbKey}', 'arrived')">I Have Arrived</button>`;
    } else if (o.status === 'arrived') {
       actionHtml = `<button class="btn-action btn-primary" onclick="window.updateOrderStatus('${o.customerId}', '${o.dbKey}', 'picked_up')">Start Task</button>`;
    } else if (o.status === 'picked_up') {
       actionHtml = `
         <div style="font-size:11px; text-transform:uppercase; letter-spacing:0.5px; color:#6ee7b7; margin-bottom:4px;">Verify Requester PIN</div>
         <div class="pin-input-group">
            <input type="text" id="deliveryPinInput" class="pin-input" placeholder="****" maxlength="4" autocomplete="off" />
            <button class="btn-action btn-primary" style="width:auto; padding:0 20px;" onclick="window.completeDelivery('${o.customerId}', '${o.dbKey}', '${o.receivingPin}')">Complete Task</button>
         </div>
       `;
    }

    const badgeHtml = `<span id="chatBadgeCounter" class="chat-badge" style="position:absolute; right:16px; display:${unreadCount > 0 ? 'inline-flex' : 'none'};">${unreadCount}</span>`;

    card.innerHTML = `
      <div class="order-card-header">
        <span class="order-id">${o.orderId}</span>
      </div>
      ${timelineHtml}
      ${createNotesHtml(o)}
      <div style="margin-top:10px; display:flex; flex-direction:column; gap:8px;">
        ${actionHtml}
        <button class="btn-action" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); position:relative;" onclick="window.openChat('${o.customerId}', '${o.dbKey}')">
          💬 Chat with Requester ${badgeHtml}
        </button>
      </div>
    `;
    activeOrderList.appendChild(card);
  }

  // --- Data Fetching & Actions ---

  function listenToAllOrders() {
    if(allOrdersUnsub) allOrdersUnsub();
    allOrdersUnsub = onValue(ref(db, `customerOrders`), snap => {
      const data = snap.val() || {};
      availableOrders = [];
      completedOrders = [];
      activeOrder = null;

      Object.keys(data).forEach(custId => {
         const custOrders = data[custId];
         Object.keys(custOrders).forEach(orderKey => {
            let o = custOrders[orderKey];
            o.dbKey = orderKey;
            o.customerId = custId;
            
            if (o.status === 'pending') {
               availableOrders.push(o);
            } else if (['started', 'arrived', 'picked_up'].includes(o.status) && o.riderId === currentUserId) {
               activeOrder = o; 
            } else if (o.status === 'delivered' && o.riderId === currentUserId) {
               completedOrders.push(o);
            }
         });
      });

      availableOrders.sort((a,b) => b.createdAt - a.createdAt);
      completedOrders.sort((a,b) => b.createdAt - a.createdAt);

      renderAvailableOrders();
      renderCompletedOrders();
      renderActiveOrder();
      renderMap();
      hideLoader();
    });
  }

  window.acceptOrder = async function(custId, dbKey) {
    if (activeOrder) { showToast("You already have an active task."); return; }
    try {
       previewOrderId = null; 
       await update(ref(db, `customerOrders/${custId}/${dbKey}`), { 
           status: 'started', 
           riderId: currentUserId 
       });
       showToast("Task Accepted!");
       startLocationTracking(custId, dbKey);
    } catch(e) { showToast("Failed to accept task."); }
  };

  window.updateOrderStatus = async function(custId, dbKey, newStatus) {
    try {
       await update(ref(db, `customerOrders/${custId}/${dbKey}`), { status: newStatus });
       showToast("Status Updated!");
    } catch(e) { showToast("Error updating status."); }
  };

  window.completeDelivery = async function(custId, dbKey, correctPin) {
    const inputEl = document.getElementById('deliveryPinInput');
    const val = inputEl ? inputEl.value.trim() : '';
    if (val !== correctPin) {
       showToast("Incorrect PIN. Please ask the requester.");
       return;
    }
    try {
       await update(ref(db, `customerOrders/${custId}/${dbKey}`), { status: 'delivered' });
       showToast("Task Completed Successfully! 🎉");
       stopLocationTracking();
       activeOrder = null;
    } catch(e) { showToast("Error completing task."); }
  };

  // --- Location Tracking ---
  function startLocationTracking(custId, dbKey) {
    if (riderLocationWatch) return;
    if (navigator.geolocation) {
      riderLocationWatch = navigator.geolocation.watchPosition(pos => {
        const payload = { riderLocation: { lat: pos.coords.latitude, lng: pos.coords.longitude } };
        update(ref(db, `customerOrders/${custId}/${dbKey}`), payload);
        
        if (liveRiderMarker) liveRiderMarker.setLatLng([pos.coords.latitude, pos.coords.longitude]);
        else liveRiderMarker = L.marker([pos.coords.latitude, pos.coords.longitude], { icon: makeDotIcon('dot-blue', 'YOU'), zIndexOffset: 1000 }).addTo(mapLayerGroup);

      }, err => console.warn(err), { enableHighAccuracy: true });
    }
  }

  function stopLocationTracking() {
    if (riderLocationWatch && navigator.geolocation) {
      navigator.geolocation.clearWatch(riderLocationWatch);
      riderLocationWatch = null;
    }
    if (liveRiderMarker) { mapLayerGroup.removeLayer(liveRiderMarker); liveRiderMarker = null; }
  }


  // --- Chat Logic ---
  window.openChat = function(custId, dbKey) {
    activeChatPath = `customerOrders/${custId}/${dbKey}/chat`;
    markChatAsRead(activeChatPath);
    renderActiveOrder(); 
    
    chatBackdrop.classList.add('show');
    
    if (currentChatPath !== activeChatPath) {
      if (chatUnsub) { off(ref(db, currentChatPath)); }
      currentChatPath = activeChatPath;
      chatUnsub = onValue(ref(db, currentChatPath), snap => {
        renderChat(snap.val() || {});
      });
    }
    setTimeout(() => chatInput.focus(), 100);
  };

  chatCloseBtn.onclick = () => {
    chatBackdrop.classList.remove('show');
    activeChatPath = null;
  };

  chatSendBtn.onclick = async () => {
    const text = chatInput.value.trim();
    if (!text || !currentChatPath) return;
    chatInput.value = '';
    await push(ref(db, currentChatPath), {
      sender: 'rider',
      text: text,
      timestamp: Date.now()
    });
  };
  chatInput.addEventListener('keyup', (e) => { if (e.key === 'Enter') chatSendBtn.click(); });

  function renderChat(messagesObj) {
    if (activeChatPath && chatBackdrop.classList.contains('show')) {
        markChatAsRead(activeChatPath);
        const badgeEl = document.getElementById('chatBadgeCounter');
        if (badgeEl) badgeEl.style.display = 'none';
    }

    chatMessages.innerHTML = '';
    const msgs = Object.values(messagesObj).sort((a,b) => a.timestamp - b.timestamp);
    if(msgs.length === 0) {
      chatMessages.innerHTML = '<div style="text-align:center; color:var(--muted); font-size:11px; margin-top:10px;">Send a message to the requester.</div>';
      return;
    }
    msgs.forEach(m => {
      const isMine = m.sender === 'rider';
      const el = document.createElement('div');
      el.className = `chat-msg ${isMine ? 'mine' : ''}`;
      
      const time = new Date(m.timestamp);
      const timeStr = `${String(time.getHours()).padStart(2,'0')}:${String(time.getMinutes()).padStart(2,'0')}`;
      
      el.innerHTML = `
        <div class="chat-msg-meta">${isMine ? 'You' : 'Requester'} · ${timeStr}</div>
        <div>${m.text}</div>
      `;
      chatMessages.appendChild(el);
    });
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  // --- Auth & Init ---
  function hideLoader() { loaderOverlay.classList.add('hidden'); }

  btnAuthLogin.onclick = async () => {
    let u = userIdInput.value.toUpperCase().trim();
    const p = passwordInput.value;
    
    if (!u || !p) { loginError.textContent = 'Enter Tasker ID and password'; return; }
    if (!/^[A-Z0-9]{4,8}$/.test(u)) { loginError.textContent = 'Use 4-8 characters (e.g. LP2345)'; return; }
    
    btnAuthLogin.textContent = '...';
    try {
      const snap = await get(ref(db, `riders/${u}`));
      if (!snap.exists()) {
        loginError.textContent = 'User not found. Please register.';
      } else if (snap.val().password !== p) {
        loginError.textContent = 'Incorrect password.';
      } else {
        completeLogin(u);
      }
    } catch(e) {
      loginError.textContent = 'Connection error.';
    }
    btnAuthLogin.textContent = 'Login';
  };

  btnAuthRegister.onclick = async () => {
    let u = userIdInput.value.toUpperCase().trim();
    const p = passwordInput.value;
    
    if (!u || !p) { loginError.textContent = 'Enter Tasker ID and password'; return; }
    if (!/^[A-Z0-9]{4,8}$/.test(u)) { loginError.textContent = 'Use 4-8 characters (e.g. LP2345)'; return; }
    
    btnAuthRegister.textContent = '...';
    try {
      const snap = await get(ref(db, `riders/${u}`));
      if (snap.exists()) {
        loginError.textContent = 'Tasker ID already taken.';
      } else {
        await set(ref(db, `riders/${u}`), { password: p, createdAt: Date.now() });
        completeLogin(u);
      }
    } catch(e) {
      loginError.textContent = 'Connection error.';
    }
    btnAuthRegister.textContent = 'Register';
  };

  function completeLogin(id) {
    currentUserId = id;
    localStorage.setItem('riderId', id); // Kept key the same to not break existing auth state
    document.getElementById('userPillText').textContent = id;
    document.getElementById('userPill').style.display = 'flex';
    loginBackdrop.classList.remove('show');
    
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(pos => {
        map.setView([pos.coords.latitude, pos.coords.longitude], 13);
      }, () => {}, {timeout: 5000});
    }
    
    listenToAllOrders();
    hideLoader();
  }

  const savedId = localStorage.getItem('riderId');
  if (savedId) {
    completeLogin(savedId); 
  } else { 
    loginBackdrop.classList.add('show'); 
    hideLoader(); 
  }

  document.getElementById('changeUserBtn').onclick = () => {
    localStorage.removeItem('riderId');
    window.location.reload();
  };

</script>
</body>
</html>
