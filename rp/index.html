<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RotiPani</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Icons (Font Awesome CDN) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f4f5f4; /* Soft, minimal off-white/grey background */
      color: #222;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* Seamless Scrolling Background */
    .bg-animation-wrapper {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-evenly;
      opacity: 0.04; /* Very soft opacity */
      pointer-events: none; 
    }

    .scroll-row {
      display: flex;
      width: 200%;
    }

    .scroll-row.left {
      animation: slideLeft 40s linear infinite;
    }

    .scroll-row.right {
      animation: slideRight 40s linear infinite;
    }

    .scroll-row.slow {
      animation-duration: 55s;
    }

    .icon-set {
      display: flex;
      justify-content: space-around;
      width: 50%; 
    }

    .icon-set i {
      font-size: 70px;
      color: #01411C;
      padding: 0 40px;
    }

    @keyframes slideLeft {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    @keyframes slideRight {
      0% { transform: translateX(-50%); }
      100% { transform: translateX(0); }
    }

    /* Main Content - Fully Flat & Minimal */
    .container {
      max-width: 600px;
      padding: 40px;
      z-index: 2;
    }

    .logo {
      font-size: 72px;
      font-weight: bold;
      color: #01411C; 
      letter-spacing: 2px;
    }

    .logo span {
      color: #f4f5f4; /* Matches the soft background */
      background: #01411C;
      padding: 5px 10px;
      border-radius: 8px;
      margin-left: 5px;
    }

    .tagline {
      margin-top: 15px;
      font-size: 18px;
      color: #555;
      letter-spacing: 0.5px;
    }

    .divider {
      margin: 30px auto;
      width: 40px;
      height: 2px;
      background: #01411C;
    }

    .contact {
      margin-top: 20px;
      font-size: 16px;
      color: #444;
      line-height: 1.8;
    }

    .contact a {
      color: #01411C;
      text-decoration: none;
      font-weight: bold;
    }

    .contact a:hover {
      text-decoration: underline;
    }

    .icons {
      margin-top: 25px;
      font-size: 20px;
      color: #01411C;
    }

    .icons i {
      margin: 0 12px;
    }

    footer {
      position: absolute;
      bottom: 20px;
      width: 100%;
      font-size: 12px;
      color: #888;
      z-index: 2;
      letter-spacing: 0.5px;
    }
  </style>
</head>

<body>

  <!-- Animated Vector Background -->
  <div class="bg-animation-wrapper">
    <!-- Row 1: Slides Left -->
    <div class="scroll-row left">
      <div class="icon-set">
        <i class="fa-solid fa-bowl-rice"></i>
        <i class="fa-solid fa-utensils"></i>
        <i class="fa-solid fa-glass-water"></i>
        <i class="fa-solid fa-mug-hot"></i>
        <i class="fa-solid fa-burger"></i>
        <i class="fa-solid fa-pizza-slice"></i>
      </div>
      <div class="icon-set">
        <i class="fa-solid fa-bowl-rice"></i>
        <i class="fa-solid fa-utensils"></i>
        <i class="fa-solid fa-glass-water"></i>
        <i class="fa-solid fa-mug-hot"></i>
        <i class="fa-solid fa-burger"></i>
        <i class="fa-solid fa-pizza-slice"></i>
      </div>
    </div>

    <!-- Row 2: Slides Right (Slower) -->
    <div class="scroll-row right slow">
      <div class="icon-set">
        <i class="fa-solid fa-drumstick-bite"></i>
        <i class="fa-solid fa-bottle-water"></i>
        <i class="fa-solid fa-leaf"></i>
        <i class="fa-solid fa-ice-cream"></i>
        <i class="fa-solid fa-blender"></i>
        <i class="fa-solid fa-pepper-hot"></i>
      </div>
      <div class="icon-set">
        <i class="fa-solid fa-drumstick-bite"></i>
        <i class="fa-solid fa-bottle-water"></i>
        <i class="fa-solid fa-leaf"></i>
        <i class="fa-solid fa-ice-cream"></i>
        <i class="fa-solid fa-blender"></i>
        <i class="fa-solid fa-pepper-hot"></i>
      </div>
    </div>

    <!-- Row 3: Slides Left -->
    <div class="scroll-row left">
      <div class="icon-set">
        <i class="fa-solid fa-plate-wheat"></i>
        <i class="fa-solid fa-wine-glass"></i>
        <i class="fa-solid fa-bowl-food"></i>
        <i class="fa-solid fa-bread-slice"></i>
        <i class="fa-solid fa-cheese"></i>
        <i class="fa-solid fa-carrot"></i>
      </div>
      <div class="icon-set">
        <i class="fa-solid fa-plate-wheat"></i>
        <i class="fa-solid fa-wine-glass"></i>
        <i class="fa-solid fa-bowl-food"></i>
        <i class="fa-solid fa-bread-slice"></i>
        <i class="fa-solid fa-cheese"></i>
        <i class="fa-solid fa-carrot"></i>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="container">
    
    <div class="logo">Roti<span>Pani</span></div>

    <div class="tagline">
      Explore Pakistani Food
    </div>

    <div class="divider"></div>

    <div class="icons">
      <i class="fa-solid fa-utensils"></i>

    <div class="contact">
      To create your restaurant profile on <strong>rotipani.net</strong><br><br>

  </div>

  <footer>
    © 2026 rotipani.net
  </footer>

</body>
</html>
