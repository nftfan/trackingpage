

<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FlyerZip — Lokale diensten vinden</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root {
  --bg: #f8f7f5;
  --surface: #ffffff;
  --ink: #1a1816;
  --ink-muted: #5c5750;
  --ink-light: #9b9590;
  --line: #e8e4df;
  --accent: #c8440e;
  --accent-light: #fdf3ef;
  --radius: 14px;
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
body { background: var(--bg); color: var(--ink); line-height: 1.5; display: flex; flex-direction: column; min-height: 100vh; }

/* ---- Location / Top Banner ---- */
.loc-banner {
  background: var(--surface); border-bottom: 1px solid var(--line);
  padding: 10px 24px; display: flex; align-items: center; justify-content: space-between; gap: 12px;
  font-size: 14px; color: var(--ink-muted);
}
.loc-banner-left { display: flex; align-items: center; gap: 8px; }
.loc-banner-left i { color: var(--accent); font-size: 16px; }

.loc-banner-right { display: flex; align-items: center; gap: 10px; }

/* Language dropdown */
.lang-select {
  appearance: none; -webkit-appearance: none;
  background: var(--bg);
  border: 1.5px solid var(--line);
  border-radius: 99px;
  padding: 6px 32px 6px 14px;
  font-size: 13px; font-weight: 600; color: var(--ink);
  font-family: inherit; cursor: pointer;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.lang-select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
.lang-select:hover { border-color: var(--ink-muted); }
.loc-chevron {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  pointer-events: none; font-size: 14px; color: var(--ink-muted);
}
.lang-select-wrap { position: relative; display: flex; align-items: center; }
.lang-select-wrap i.lang-globe {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--accent); font-size: 15px; pointer-events: none;
}
.lang-select { padding-left: 34px; min-width: 118px; }

/* ---- Hero ---- */
.hero {
  background: var(--surface); border-bottom: 1px solid var(--line);
  padding: 48px 24px 56px; display: flex; flex-direction: column; align-items: center; text-align: center;
}
.hero-title { font-family: 'Instrument Serif', serif; font-size: 64px; color: var(--ink); line-height: 1; margin-bottom: 20px; }
.hero-title span { color: var(--accent); font-style: italic; }
.hero-region {
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-muted);
  background: var(--bg);
  border: 1px solid var(--line);
  padding: 3px 9px;
  border-radius: 99px;
  margin-left: 8px;
  vertical-align: middle;
  top: -0.3em;
  letter-spacing: 0.02em;
}
.hero-subtitle { color: var(--ink-muted); font-size: 16px; margin-bottom: 28px; }

.hero-search-box { width: 100%; max-width: 520px; }
.search-row { display: flex; gap: 8px; }
.search-row input {
  flex: 1; padding: 14px 18px; border: 1.5px solid var(--line); border-radius: 12px;
  font-size: 15px; outline: none; transition: 0.2s; background: var(--bg); font-family: inherit;
}
.search-row input:focus { border-color: var(--accent); background: var(--surface); box-shadow: 0 0 0 3px var(--accent-light); }
.btn-search {
  background: var(--ink); color: #fff; border: none; border-radius: 12px; padding: 0 20px;
  font-size: 20px; cursor: pointer; transition: 0.2s; display: flex; align-items: center;
}
.btn-search:hover { background: var(--accent); }

/* clear-search small button */
.btn-clear {
  background: var(--bg); color: var(--ink-muted); border: 1.5px solid var(--line);
  border-radius: 12px; padding: 0 16px; font-size: 18px; cursor: pointer;
  transition: 0.2s; display: none; align-items: center;
}
.btn-clear:hover { border-color: var(--ink); color: var(--ink); }
.btn-clear.show { display: flex; }

/* ---- Main ---- */
.main-container { max-width: 1200px; margin: 0 auto; padding: 28px 20px 60px; flex: 1; width: 100%; }

/* ---- Section heading ---- */
.section-head {
  display: flex; align-items: baseline; gap: 10px; margin-bottom: 18px; flex-wrap: wrap;
}
.section-head h2 {
  font-family: 'Instrument Serif', serif; font-size: 30px; color: var(--ink); line-height: 1.1;
}
.section-head h2 span { color: var(--accent); font-style: italic; }
.section-head .section-sub { font-size: 13px; color: var(--ink-light); }

/* ---- Grid ---- */
.flyer-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 18px; margin-bottom: 36px; }

/* ---- Card ---- */
.flyer-card {
  background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
  overflow: hidden; transition: 0.3s; display: flex; flex-direction: column;
}
.flyer-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.06); border-color: #d8d3cd; }

.flyer-img-wrap {
  position: relative;
  width: 100%; background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  border-bottom: 1px solid var(--line); cursor: zoom-in; overflow: hidden;
}
.flyer-img-wrap img { width: 100%; height: auto; display: block; transition: transform 0.3s ease; border-radius: 10px; }
.flyer-card:hover .flyer-img-wrap img { transform: scale(1.03); }

.flyer-info { padding: 14px; flex: 1; display: flex; flex-direction: column; }
.flyer-title { font-size: 14px; font-weight: 700; margin-bottom: 1px; color: var(--ink); line-height: 1.2; }
.flyer-category { font-size: 10px; font-weight: 500; color: var(--ink-light); margin-bottom: 6px; line-height: 1; letter-spacing: 0.01em; }
.flyer-loc { font-size: 12px; color: var(--ink-muted); display: flex; align-items: center; gap: 4px; margin-bottom: 12px; }

.card-buttons { margin-top: auto; }
.btn-card {
  display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%;
  padding: 9px; border-radius: 8px; font-weight: 600; font-size: 12px; text-decoration: none; cursor: pointer; transition: 0.2s;
  background: var(--bg); border: 1.5px solid var(--line); color: var(--ink); font-family: inherit;
}
.btn-card:hover { background: var(--surface); border-color: var(--ink); }

/* ---- Load More ---- */
.btn-load-more {
  display: inline-flex; align-items: center; justify-content: center; padding: 12px 28px;
  background: var(--surface); border: 1.5px solid var(--line); border-radius: 99px;
  font-size: 14px; font-weight: 600; color: var(--ink); cursor: pointer; transition: 0.2s; font-family: inherit;
}
.btn-load-more:hover { border-color: var(--ink); }
.load-more-wrap { text-align: center; display: none; }

/* ---- State boxes ---- */
.state-box { text-align: center; padding: 60px 20px; color: var(--ink-muted); grid-column: 1 / -1; }
.state-box i { font-size: 44px; color: var(--line); margin-bottom: 14px; display: block; }
.state-box h3 { font-family: 'Instrument Serif', serif; font-size: 26px; color: var(--ink); margin-bottom: 8px; }
@keyframes spin { 100% { transform: rotate(360deg); } }
.spin { animation: spin 1s linear infinite; display: inline-block; }

/* ---- Lightbox ---- */
.lightbox-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(10, 8, 6, 0.88);
  z-index: 9999;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  align-items: center;
  justify-content: center;
  padding: 12px;
}
.lightbox-overlay.active { display: flex; animation: lbFadeIn 0.22s ease; }
@keyframes lbFadeIn { from { opacity: 0; } to { opacity: 1; } }

.lightbox-shell {
  position: relative;
  width: 100%;
  max-width: 400px;
  height: 92vh;
  height: 92dvh;
  display: flex;
  flex-direction: column;
  border-radius: 18px;
  overflow: hidden;
  background: #111;
  box-shadow: 0 32px 80px rgba(0,0,0,0.7);
  animation: lbSlideUp 0.25s ease;
}
@keyframes lbSlideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

/* Top bar */
.lb-topbar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 10px;
  background: rgba(255,255,255,0.06);
  border-bottom: 1px solid rgba(255,255,255,0.1);
  gap: 10px;
  z-index: 2;
}
.lb-tabs {
  display: inline-flex;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 99px;
  padding: 3px;
}
.lb-tab {
  padding: 5px 16px;
  border-radius: 99px;
  font-size: 13px;
  font-weight: 600;
  color: rgba(255,255,255,0.45);
  cursor: pointer;
  transition: 0.2s;
  user-select: none;
}
.lb-tab.active { background: rgba(255,255,255,0.16); color: #fff; }

.lb-close {
  flex-shrink: 0;
  width: 32px; height: 32px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 50%;
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; cursor: pointer; transition: 0.2s;
  line-height: 1;
}
.lb-close:hover { background: rgba(255,255,255,0.22); }

/* Scrollable body */
.lb-body {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  display: flex;
  flex-direction: column;
}
.lb-body::-webkit-scrollbar { width: 4px; }
.lb-body::-webkit-scrollbar-track { background: transparent; }
.lb-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

/* Panes */
.lb-pane { display: none; }
.lb-pane.active { display: block; }

#pane-flyer {
  padding: 8px;
  background: #111;
  text-align: center;
  line-height: 0;
}
#pane-flyer img {
  display: block;
  width: 100%;
  height: auto;
  max-width: 100%;
  border-radius: 16px;
  margin: 0 auto;
}

#pane-services {
  padding: 18px;
  background: #111;
}
#pane-services h4 {
  font-family: 'Instrument Serif', serif;
  font-size: 22px; margin-bottom: 16px; color: #fff;
}
.lb-tags-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.lb-tag {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.14);
  padding: 6px 14px; border-radius: 8px;
  font-size: 13px; color: rgba(255,255,255,0.75); font-weight: 500;
}

/* Prev / Next navigation */
.lb-nav {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  background: rgba(255,255,255,0.04);
  border-top: 1px solid rgba(255,255,255,0.08);
}
.lb-nav-btn {
  display: flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.14);
  color: #fff; padding: 7px 16px; border-radius: 99px;
  font-size: 13px; font-weight: 600; font-family: inherit;
  cursor: pointer; transition: 0.2s;
}
.lb-nav-btn:hover { background: rgba(255,255,255,0.18); }
.lb-nav-btn:disabled { opacity: 0.28; cursor: not-allowed; }
.lb-nav-counter { font-size: 12px; color: rgba(255,255,255,0.4); font-weight: 500; }

.lb-nav-center {
  display: flex; align-items: center; gap: 10px;
}
.lb-action-btn {
  display: flex; align-items: center; justify-content: center;
  width: 34px; height: 34px;
  background: var(--accent);
  border: none;
  color: #fff;
  border-radius: 50%;
  cursor: pointer;
  transition: 0.2s;
  font-family: inherit;
}
.lb-action-btn:hover { background: #a8370a; transform: scale(1.05); }
.lb-action-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.lb-action-btn i { font-size: 17px; }
.lb-action-btn.is-loading i { animation: spin 1s linear infinite; }

.lb-share-btn {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
}
.lb-share-btn:hover { background: rgba(255,255,255,0.22); }

/* ---- Toast ---- */
.lb-toast {
  position: fixed;
  bottom: 26px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--ink);
  color: #fff;
  padding: 12px 22px;
  border-radius: 99px;
  font-size: 14px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.35);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease, transform 0.25s ease;
  z-index: 10001;
}
.lb-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.lb-toast i { color: #4ade80; font-size: 17px; }

/* ---- Footer ---- */
.footer { text-align: center; padding: 20px; border-top: 1px solid var(--line); background: var(--surface); color: var(--ink-light); font-size: 13px; margin-top: auto; }

/* ---- Mobile ---- */
@media (max-width: 767px) {
  .hero { padding: 32px 16px 40px; }
  .hero-title { font-size: 44px; margin-bottom: 12px; }
  .hero-region { font-size: 10px; padding: 2px 7px; margin-left: 6px; }
  .hero-subtitle { font-size: 14px; margin-bottom: 20px; }
  .loc-banner { padding: 10px 14px; flex-wrap: wrap; gap: 8px; }
  .lang-select { min-width: 104px; font-size: 12px; }
  .main-container { padding: 16px 10px 50px; }
  .section-head h2 { font-size: 24px; }
  .flyer-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .flyer-card { border-radius: 8px; }
  .flyer-info { padding: 8px 6px; }
  .flyer-title { font-size: 10px; margin-bottom: 1px; }
  .flyer-category { font-size: 7px; margin-bottom: 4px; }
  .flyer-loc { font-size: 8px; margin-bottom: 8px; }
  .btn-card { font-size: 8px; padding: 6px 4px; }

  .lightbox-overlay { padding: 8px; }
  .lightbox-shell {
    max-width: 94vw;
    height: 88vh;
    height: 88dvh;
    border-radius: 14px;
  }
  .lb-topbar { padding: 6px 8px; }
  .lb-tab { padding: 4px 14px; font-size: 12px; }
  .lb-close { width: 30px; height: 30px; font-size: 17px; }
  .lb-nav { padding: 6px 10px; }
  .lb-nav-btn { padding: 6px 12px; font-size: 12px; }
  .lb-action-btn { width: 32px; height: 32px; }
  .lb-action-btn i { font-size: 16px; }
  #pane-flyer { padding: 6px; }
  #pane-services { padding: 14px; }
}

@media (max-height: 640px) {
  .lightbox-shell {
    height: 94vh;
    height: 94dvh;
  }
  .lb-topbar { padding: 5px 8px; }
  .lb-nav { padding: 5px 10px; }
  .lb-tab { padding: 4px 12px; font-size: 12px; }
  .lb-nav-btn { padding: 5px 12px; font-size: 12px; }
  .lb-close { width: 28px; height: 28px; font-size: 16px; }
}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
</head>
<body>

<!-- Main App -->
<div id="appContent">

  <!-- Top Banner (city dropdown removed; language kept) -->
  <div class="loc-banner" id="locBanner">
    <div class="loc-banner-left">
      <i class="ti ti-map-pin"></i>
      <span data-i18n="banner_tagline">Lokale diensten in Nederland</span>
    </div>
    <div class="loc-banner-right">
      <div class="lang-select-wrap">
        <i class="ti ti-world lang-globe"></i>
        <select class="lang-select" id="langDropdown" onchange="onLanguageChange()">
          <option value="nl">Nederlands</option>
          <option value="en">English</option>
        </select>
        <i class="ti ti-chevron-down loc-chevron"></i>
      </div>
    </div>
  </div>

  <!-- Hero -->
  <div class="hero">
    <h1 class="hero-title">Flyer<span>Zip</span><sup class="hero-region">Nederland</sup></h1>
    <p class="hero-subtitle" data-i18n="hero_subtitle">Waar ben je vandaag naar op zoek?</p>
    <div class="hero-search-box">
      <div class="search-row">
        <input type="text" id="searchInput" data-i18n-attr="placeholder" data-i18n="search_placeholder" placeholder="Zoek bedrijven, categorieën, diensten of plaats…" oninput="onSearchInput()" onkeypress="if(event.key==='Enter') filterData()">
        <button class="btn-clear" id="btnClear" onclick="clearSearch()" title="Wissen"><i class="ti ti-x"></i></button>
        <button class="btn-search" onclick="filterData()"><i class="ti ti-search"></i></button>
      </div>
    </div>
  </div>

  <div class="main-container">

    <!-- Section heading (changes by context: Latest / Search) -->
    <div class="section-head">
      <h2 id="sectionTitle"><span data-i18n="latest_title">Nieuwste</span></h2>
      <span class="section-sub" id="sectionSub" data-i18n="latest_sub">De nieuwste diensten en producten</span>
    </div>

    <div class="flyer-grid" id="flyerGrid">
      <div class="state-box">
        <i class="ti ti-loader spin"></i>
        <h3 data-i18n="loading">Flyers laden…</h3>
      </div>
    </div>
    <div class="load-more-wrap" id="loadMoreWrap">
      <button class="btn-load-more" onclick="loadMore()" data-i18n="load_more">Meer flyers laden</button>
    </div>
  </div>

  <footer class="footer">
    <p>&copy; <span data-i18n="footer">Copyright FlyerZip 2026. Alle rechten voorbehouden.</span></p>
  </footer>
</div>

<!-- Lightbox -->
<div class="lightbox-overlay" id="lightboxOverlay" onclick="onOverlayClick(event)">
  <div class="lightbox-shell" id="lightboxShell">

    <div class="lb-topbar">
      <div class="lb-tabs">
        <div class="lb-tab active" id="tab-flyer" onclick="switchLbTab('flyer')" data-i18n="tab_flyer">Flyer</div>
        <div class="lb-tab" id="tab-services" onclick="switchLbTab('services')" data-i18n="tab_services">Diensten</div>
      </div>
      <div class="lb-close" onclick="closeLightbox()" title="Sluiten">&times;</div>
    </div>

    <div class="lb-body">
      <div class="lb-pane active" id="pane-flyer">
        <img id="lightbox-img" src="" alt="Flyer">
      </div>
      <div class="lb-pane" id="pane-services">
        <h4 id="lb-services-title">Aangeboden diensten</h4>
        <div class="lb-tags-grid" id="lightbox-tags"></div>
      </div>
    </div>

    <div class="lb-nav">
      <button class="lb-nav-btn" id="lb-prev" onclick="lbNavigate(-1)">
        <i class="ti ti-arrow-left"></i> <span data-i18n="prev">Vorige</span>
      </button>
      <div class="lb-nav-center">
        <span class="lb-nav-counter" id="lb-counter">1 / 1</span>
        <button class="lb-action-btn lb-share-btn" id="lb-share" onclick="shareFlyer()" title="Flyer delen">
          <i class="ti ti-share"></i>
        </button>
        <button class="lb-action-btn" id="lb-download" onclick="downloadFlyer()" title="Flyer opslaan">
          <i class="ti ti-download"></i>
        </button>
      </div>
      <button class="lb-nav-btn" id="lb-next" onclick="lbNavigate(1)">
        <span data-i18n="next">Volgende</span> <i class="ti ti-arrow-right"></i>
      </button>
    </div>

  </div>
</div>

<!-- Toast -->
<div class="lb-toast" id="lbToast">
  <i class="ti ti-circle-check"></i>
  <span id="lbToastText">Link gekopieerd naar klembord</span>
</div>

<script>
/* ============================================================
   TRANSLATIONS  (Dutch default, English)
   ============================================================ */
const TRANSLATIONS = {
  nl: {

    hero_subtitle: "Waar ben je vandaag naar op zoek?",
    search_placeholder: "Zoek bedrijven, categorieën, diensten of plaats…",
    loading: "Flyers laden…",
    load_more: "Meer flyers laden",
    footer: "Copyright FlyerZip 2026. Alle rechten voorbehouden.",
    tab_flyer: "Flyer",
    tab_services: "Diensten",
    prev: "Vorige",
    next: "Volgende",
    latest_title: "Nieuwste",
    latest_sub: "De nieuwste diensten en producten",
    search_title: "Zoekresultaten",
    search_sub: "Resultaten voor “{q}”",
    no_flyers_title: "Geen flyers gevonden",
    no_flyers_desc: "Geen resultaten gevonden. Probeer een andere zoekopdracht.",
    services_offered: "Aangeboden diensten",
    no_services: "Geen diensten vermeld.",
    view_map: "Bekijk kaart",
    no_map: "Geen kaart",
    toast_copied: "Link gekopieerd naar klembord",
    toast_copy_fail: "Kon link niet kopiëren",
    untitled: "Naamloos",
    share_text: "Bekijk {name} op FlyerZip"
  },
  en: {
    banner_tagline: "Local services in the Netherlands",
    hero_subtitle: "What are you looking for today?",
    search_placeholder: "Search businesses, categories, services or place…",
    loading: "Loading flyers…",
    load_more: "Load more flyers",
    footer: "Copyright FlyerZip 2026. All rights reserved.",
    tab_flyer: "Flyer",
    tab_services: "Services",
    prev: "Prev",
    next: "Next",
    latest_title: "Latest",
    latest_sub: "The newest services and products",
    search_title: "Search results",
    search_sub: "Results for “{q}”",
    no_flyers_title: "No flyers found",
    no_flyers_desc: "No results found. Try a different search.",
    services_offered: "Services Offered",
    no_services: "No services listed.",
    view_map: "View Map",
    no_map: "No Map",
    toast_copied: "Link copied to clipboard",
    toast_copy_fail: "Could not copy link",
    untitled: "Untitled",
    share_text: "Check out {name} on FlyerZip"
  }
};

let currentLang = 'nl';

function detectDefaultLang() {
  const nav = (navigator.language || navigator.userLanguage || 'nl').toLowerCase();
  if (nav.startsWith('en')) return 'en';
  return 'nl';
}

function t(key) {
  const dict = TRANSLATIONS[currentLang] || TRANSLATIONS.nl;
  return dict[key] !== undefined ? dict[key] : (TRANSLATIONS.nl[key] || key);
}

function applyTranslations() {
  document.documentElement.lang = currentLang;

  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    const attr = el.getAttribute('data-i18n-attr');
    const value = t(key);
    if (attr) {
      el.setAttribute(attr, value);
    } else {
      el.textContent = value;
    }
  });

  const langDropdown = document.getElementById('langDropdown');
  if (langDropdown) langDropdown.value = currentLang;

  if (dataLoaded) {
    renderGrid();
    if (document.getElementById('lightboxOverlay').classList.contains('active')) {
      renderLightboxItem();
    }
  }
}

function setLanguage(lang) {
  if (!TRANSLATIONS[lang]) return;
  currentLang = lang;
  applyTranslations();
}

function onLanguageChange() {
  setLanguage(document.getElementById('langDropdown').value);
}

/* ============================================================
   FIREBASE
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyBWPCkYNw7gT_T7kcwbp5laZgIHac18bvE",
  authDomain: "expandlf.firebaseapp.com",
  databaseURL: "https://expandlf-default-rtdb.firebaseio.com",
  projectId: "expandlf",
  storageBucket: "expandlf.firebasestorage.app",
  messagingSenderId: "890066961009",
  appId: "1:890066961009:web:3a2ed1e7c2cf797f3751d0",
  measurementId: "G-QPRSX7ZVZ5"
};

let db = null;
let refListings = null;

const LATEST_LIMIT = 6; // home page shows the 6 newest

let allListings = [];
let currentFiltered = [];
let displayLimit = 12;
let dataLoaded = false;
let lbIndex = 0;
let pendingShareId = null;

function toTitleCase(str) {
  return str.replace(/\w\S*/g, t => t.charAt(0).toUpperCase() + t.substr(1).toLowerCase());
}

/* Normalizer used for case/accent-insensitive search */
function normalizeText(str) {
  return (str || '')
    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/['’`]/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function getFlyerIdFromUrl() {
  const params = new URLSearchParams(window.location.search);
  return params.get('flyer');
}

/* ============================================================
   FIREBASE LISTENER
   ============================================================ */
function showLoadError(kind, detail) {
  const grid = document.getElementById('flyerGrid');
  const lmw = document.getElementById('loadMoreWrap');
  if (lmw) lmw.style.display = 'none';
  if (!grid) return;

  let title, msg;
  if (kind === 'sdk') {
    title = 'Verbinding mislukt';
    msg = 'De database-bibliotheek (Firebase) kon niet worden geladen. Controleer je internetverbinding of schakel een eventuele ad-blocker / privacy-extensie uit en herlaad de pagina.';
  } else if (kind === 'permission') {
    title = 'Kan gegevens niet laden';
    msg = 'De database weigerde de leesopdracht. Controleer dat de Realtime Database-regels leesrechten geven op het pad "nederlandszip/listings".';
  } else {
    title = 'Er ging iets mis';
    msg = 'Er trad een fout op bij het tonen van de flyers.';
  }

  grid.innerHTML =
    '<div class="state-box">' +
      '<i class="ti ti-alert-triangle" style="color:var(--accent)"></i>' +
      '<h3>' + title + '</h3>' +
      '<p>' + msg + (detail ? '<br><br><code style="font-size:11px;color:var(--ink-light)">' + detail + '</code>' : '') + '</p>' +
    '</div>';
}

function onFirebaseValue(snapshot) {
  try {
    const data = snapshot.val();
    allListings = [];
    if (data) {
      allListings = Object.keys(data).map(key => ({ id: key, ...data[key] }));

      allListings.sort((a, b) => {
        const ta = Date.parse(a.timestamp);
        const tb = Date.parse(b.timestamp);
        const aValid = !isNaN(ta);
        const bValid = !isNaN(tb);
        if (aValid && bValid && tb !== ta) return tb - ta;
        return String(b.id).localeCompare(String(a.id));
      });
    }
    dataLoaded = true;
    filterData();
    maybeOpenSharedFlyer();
  } catch (err) {
    console.error('Render error:', err);
    showLoadError('render', err.message);
  }
}

function startFirebase() {
  if (typeof firebase === 'undefined' || !firebase.initializeApp) {
    console.error('Firebase SDK not available.');
    showLoadError('sdk');
    return;
  }
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    refListings = db.ref('nederlandszip/listings');
    refListings.on('value', onFirebaseValue, err => {
      console.error('Firebase read failed:', err);
      showLoadError('permission', err && err.message);
    });
  } catch (err) {
    console.error('Firebase init failed:', err);
    showLoadError('sdk', err.message);
  }

  setTimeout(function () {
    if (!dataLoaded) showLoadError('permission', 'Time-out — geen reactie van de database.');
  }, 12000);
}

/* ============================================================
   SEARCH INPUT helpers
   ============================================================ */
function onSearchInput() {
  const val = document.getElementById('searchInput').value.trim();
  document.getElementById('btnClear').classList.toggle('show', val !== '');
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  onSearchInput();
  filterData();
}

/* ============================================================
   FILTER LOGIC
   - Search query: searches across ALL data (name, category,
     location, keywords). Multi-word: every term must appear
     somewhere in the listing.
   - Empty query: show the latest 6.
   ============================================================ */
function filterData() {
  const rawQuery = document.getElementById('searchInput').value.trim();
  displayLimit = 12;
  onSearchInput();

  if (rawQuery !== '') {
    const terms = normalizeText(rawQuery).split(/\s+/).filter(Boolean);

    currentFiltered = allListings.filter(item => {
      const haystack = normalizeText([
        item.business_info?.name || '',
        item.search_data?.category || '',
        item.search_data?.location || '',
        (item.search_data?.services_and_keywords || []).join(' ')
      ].join(' '));

      // Every typed word must appear somewhere in the listing
      return terms.every(term => haystack.includes(term));
    });
  } else {
    // HOME / LATEST MODE — only the 6 newest across all data
    currentFiltered = allListings.slice(0, LATEST_LIMIT);
  }

  renderGrid();
}

/* ============================================================
   SECTION HEADING — reflects current view
   ============================================================ */
function updateSectionHeading() {
  const q = document.getElementById('searchInput').value.trim();
  const titleEl = document.getElementById('sectionTitle');
  const subEl = document.getElementById('sectionSub');

  if (q !== '') {
    titleEl.innerHTML = `<span>${t('search_title')}</span>`;
    subEl.textContent = t('search_sub').replace('{q}', q);
  } else {
    titleEl.innerHTML = `<span>${t('latest_title')}</span>`;
    subEl.textContent = t('latest_sub');
  }
}

/* ============================================================
   RENDER GRID
   ============================================================ */
function renderGrid() {
  updateSectionHeading();

  const grid = document.getElementById('flyerGrid');
  const lmw = document.getElementById('loadMoreWrap');

  if (currentFiltered.length === 0) {
    grid.innerHTML = `
      <div class="state-box">
        <i class="ti ti-mood-empty"></i>
        <h3>${t('no_flyers_title')}</h3>
        <p>${t('no_flyers_desc')}</p>
      </div>`;
    lmw.style.display = 'none';
    return;
  }

  const toShow = currentFiltered.slice(0, displayLimit);
  let html = '';

  toShow.forEach((item, idx) => {
    const bInfo = item.business_info || {};
    const sData = item.search_data || {};
    const imgUrl = item.flyer_url || 'https://via.placeholder.com/400x560?text=No+Image';
    const mapUrl = sData.google_map_url || '#';
    const hasMap = mapUrl !== '#';

    html += `
      <div class="flyer-card">
        <div class="flyer-img-wrap" onclick="openLightboxByIndex(${idx})">
          <img src="${imgUrl}" alt="${bInfo.name || ''} flyer" loading="lazy">
        </div>
        <div class="flyer-info">
          <h3 class="flyer-title">${bInfo.name || t('untitled')}</h3>
          ${sData.category ? `<div class="flyer-category">${sData.category}</div>` : ''}
          <div class="flyer-loc"><i class="ti ti-map-pin"></i> ${sData.location || '—'}</div>
          <div class="card-buttons">
            ${hasMap
              ? `<a href="${mapUrl}" target="_blank" rel="noopener noreferrer" class="btn-card"><i class="ti ti-brand-google-maps"></i> ${t('view_map')}</a>`
              : `<button class="btn-card" disabled style="opacity:0.45;cursor:not-allowed;"><i class="ti ti-map-pin-off"></i> ${t('no_map')}</button>`
            }
          </div>
        </div>
      </div>`;
  });

  grid.innerHTML = html;

  // "Load more" never appears in the latest (home) view, since it's capped at 6
  const isLatestView = (document.getElementById('searchInput').value.trim() === '');
  lmw.style.display = (!isLatestView && currentFiltered.length > displayLimit) ? 'block' : 'none';
}

function loadMore() {
  displayLimit += 12;
  renderGrid();
}

/* ============================================================
   LIGHTBOX
   ============================================================ */
function switchLbTab(tab) {
  ['flyer', 'services'].forEach(name => {
    document.getElementById('tab-' + name).classList.toggle('active', name === tab);
    document.getElementById('pane-' + name).classList.toggle('active', name === tab);
  });
}

function openLightboxByIndex(idx) {
  lbIndex = idx;
  renderLightboxItem();
  document.getElementById('lightboxOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
  updateUrlForCurrentFlyer();
}

function renderLightboxItem() {
  const visibleCount = Math.min(displayLimit, currentFiltered.length);
  const item = currentFiltered[lbIndex];
  if (!item) return;

  document.getElementById('lightbox-img').src = item.flyer_url || '';

  const bInfo = item.business_info || {};
  const kws = item.search_data?.services_and_keywords || [];
  document.getElementById('lb-services-title').textContent = bInfo.name || t('services_offered');
  document.getElementById('lightbox-tags').innerHTML = kws.length
    ? kws.map(k => `<span class="lb-tag">${toTitleCase(k.trim())}</span>`).join('')
    : `<span style="color:rgba(255,255,255,0.4);font-size:14px;">${t('no_services')}</span>`;

  document.getElementById('lb-counter').textContent = `${lbIndex + 1} / ${visibleCount}`;
  document.getElementById('lb-prev').disabled = lbIndex === 0;
  document.getElementById('lb-next').disabled = lbIndex >= visibleCount - 1;

  switchLbTab('flyer');

  const body = document.querySelector('.lb-body');
  if (body) body.scrollTop = 0;
}

function lbNavigate(dir) {
  const visibleCount = Math.min(displayLimit, currentFiltered.length);
  const next = lbIndex + dir;
  if (next < 0 || next >= visibleCount) return;
  lbIndex = next;
  renderLightboxItem();
  updateUrlForCurrentFlyer();
}

function buildShareUrl(flyerId) {
  const base = window.location.origin + window.location.pathname;
  return `${base}?flyer=${encodeURIComponent(flyerId)}`;
}

function updateUrlForCurrentFlyer() {
  const item = currentFiltered[lbIndex];
  if (!item || !item.id) return;
  history.replaceState({ flyer: item.id }, '', buildShareUrl(item.id));
}

function clearFlyerFromUrl() {
  const base = window.location.origin + window.location.pathname;
  history.replaceState({}, '', base);
}

async function shareFlyer() {
  const item = currentFiltered[lbIndex];
  if (!item || !item.id) return;

  const shareUrl = buildShareUrl(item.id);
  const title = item.business_info?.name || 'Flyer';
  const text = t('share_text').replace('{name}', title);

  if (navigator.share) {
    try {
      await navigator.share({ title, text, url: shareUrl });
      return;
    } catch (err) {
      if (err.name === 'AbortError') return;
    }
  }

  try {
    await navigator.clipboard.writeText(shareUrl);
    showToast(t('toast_copied'));
  } catch (err) {
    const tmp = document.createElement('input');
    tmp.value = shareUrl;
    document.body.appendChild(tmp);
    tmp.select();
    try { document.execCommand('copy'); showToast(t('toast_copied')); }
    catch (e) { showToast(t('toast_copy_fail')); }
    document.body.removeChild(tmp);
  }
}

let toastTimer = null;
function showToast(message) {
  const toast = document.getElementById('lbToast');
  document.getElementById('lbToastText').textContent = message;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
}

/* ============================================================
   SHARED-FLYER DEEP LINK
   ============================================================ */
function maybeOpenSharedFlyer() {
  if (pendingShareId === null) {
    pendingShareId = getFlyerIdFromUrl();
  }
  if (!pendingShareId) return;

  const item = allListings.find(l => l.id === pendingShareId);
  if (!item) {
    pendingShareId = null;
    clearFlyerFromUrl();
    return;
  }

  currentFiltered = allListings.slice();
  const idx = currentFiltered.findIndex(l => l.id === pendingShareId);
  if (idx === -1) { pendingShareId = null; return; }

  if (idx + 1 > displayLimit) displayLimit = idx + 1;

  renderGrid();
  openLightboxByIndex(idx);
  pendingShareId = null;
}

/* ============================================================
   DOWNLOAD / SAVE FLYER
   ============================================================ */
async function downloadFlyer() {
  const item = currentFiltered[lbIndex];
  if (!item || !item.flyer_url) return;

  const btn = document.getElementById('lb-download');
  const icon = btn.querySelector('i');
  const originalIconClass = icon.className;

  btn.classList.add('is-loading');
  icon.className = 'ti ti-loader-2';
  btn.disabled = true;

  try {
    const response = await fetch(item.flyer_url, { mode: 'cors' });
    if (!response.ok) throw new Error('Fetch failed');
    const blob = await response.blob();

    const bizName = (item.business_info?.name || 'flyer').replace(/[^a-z0-9]+/gi, '_').toLowerCase();
    const ext = (blob.type.split('/')[1] || 'jpg').replace('jpeg', 'jpg');
    const filename = `${bizName}_flyer.${ext}`;

    if (navigator.canShare) {
      const file = new File([blob], filename, { type: blob.type });
      if (navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({ files: [file], title: item.business_info?.name || 'Flyer' });
          showDownloadSuccess(btn, icon, originalIconClass);
          return;
        } catch (shareErr) {
          if (shareErr.name === 'AbortError') {
            restoreDownloadBtn(btn, icon, originalIconClass);
            return;
          }
        }
      }
    }

    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);

    showDownloadSuccess(btn, icon, originalIconClass);
  } catch (err) {
    window.open(item.flyer_url, '_blank', 'noopener');
    restoreDownloadBtn(btn, icon, originalIconClass);
  }
}

function showDownloadSuccess(btn, icon, originalIconClass) {
  btn.classList.remove('is-loading');
  icon.className = 'ti ti-check';
  setTimeout(() => restoreDownloadBtn(btn, icon, originalIconClass), 1500);
}

function restoreDownloadBtn(btn, icon, originalIconClass) {
  btn.classList.remove('is-loading');
  icon.className = originalIconClass;
  btn.disabled = false;
}

function closeLightbox() {
  document.getElementById('lightboxOverlay').classList.remove('active');
  document.body.style.overflow = 'auto';
  clearFlyerFromUrl();
  setTimeout(() => {
    document.getElementById('lightbox-img').src = '';
    document.getElementById('lightbox-tags').innerHTML = '';
  }, 220);
}

function onOverlayClick(e) {
  if (e.target === document.getElementById('lightboxOverlay')) closeLightbox();
}

document.addEventListener('keydown', e => {
  const overlay = document.getElementById('lightboxOverlay');
  if (!overlay.classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') lbNavigate(-1);
  if (e.key === 'ArrowRight') lbNavigate(1);
});

/* ============================================================
   INIT
   ============================================================ */
currentLang = detectDefaultLang();
applyTranslations();
startFirebase();
</script>
